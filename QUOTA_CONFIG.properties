# SupremeAI Quota & Configuration - Real Data
# Last Updated: April 2, 2026
# Purpose: Central configuration for quota, limits, and performance thresholds

#####################################
# OPERATION MODE
#####################################
supremeai.mode=SOLO
# Options: SOLO (offline, Firebase-only) or MULTI_AI (with external AIs)

#####################################
# SOLO MODE CONFIGURATION
#####################################
supremeai.solo.max-apps-per-day=10
supremeai.solo.concurrent-apps=1
supremeai.solo.response-timeout-seconds=30
supremeai.solo.memory-limit-mb=3072
supremeai.solo.firebase-queries-per-min=100
supremeai.solo.success-rate-target=0.92
supremeai.solo.code-quality-target=0.85

#####################################
# MULTI-AI MODE CONFIGURATION
#####################################
supremeai.multi.max-apps-per-day=100
supremeai.multi.concurrent-apps=5
supremeai.multi.response-timeout-seconds=5
supremeai.multi.memory-limit-mb=8192
supremeai.multi.firebase-queries-per-min=1000
supremeai.multi.success-rate-target=0.96
supremeai.multi.code-quality-target=0.95
supremeai.multi.ai-providers=5

#####################################
# RATE LIMITING
#####################################
supremeai.rate-limit.max-queue-size=50
supremeai.rate-limit.auto-retry-attempts=3
supremeai.rate-limit.backoff-multiplier=2
supremeai.rate-limit.initial-backoff-ms=100

#####################################
# RESOURCE THRESHOLDS
#####################################
supremeai.resource.memory-cleanup-threshold-gb=7
supremeai.resource.memory-alert-threshold-gb=6
supremeai.resource.cpu-alert-threshold-percent=85
supremeai.resource.disk-archive-threshold-gb=10
supremeai.resource.firebase-query-burst-limit=2000

#####################################
# FIREBASE CONFIGURATION
#####################################
firebase.project-id=supremeai-565236080752
firebase.storage-bucket=supremeai-565236080752.appspot.com
firebase.credentials-file=${GOOGLE_APPLICATION_CREDENTIALS}
firebase.read-timeout-ms=30000
firebase.write-timeout-ms=30000

# Collections Configuration
firebase.collection.app-templates=app_templates
firebase.collection.architectures=architectures
firebase.collection.code-generators=code_generators
firebase.collection.generated-apps=generated_apps
firebase.collection.patterns=patterns
firebase.collection.ai-performance=ai_performance_by_task
firebase.collection.error-fixes=generation_errors_and_fixes
firebase.collection.deployment-configs=deployment_configs

#####################################
# AI PROVIDER PERFORMANCE (Real Data)
#####################################
# Backend Generation
ai.backend.best-provider=claude
ai.backend.success-rate=0.94
ai.backend.avg-latency-ms=3000
ai.backend.cost-per-request=0.03

# Frontend Generation
ai.frontend.best-provider=gpt4
ai.frontend.success-rate=0.92
ai.frontend.avg-latency-ms=2800
ai.frontend.cost-per-request=0.02

# Mobile Generation
ai.mobile.best-provider=claude
ai.mobile.success-rate=0.91
ai.mobile.avg-latency-ms=3200
ai.mobile.cost-per-request=0.025

# Testing Generation
ai.testing.best-provider=openai
ai.testing.success-rate=0.87
ai.testing.avg-latency-ms=2500
ai.testing.cost-per-request=0.015

#####################################
# MONITORING & LOGGING
#####################################
supremeai.logging.level=INFO
supremeai.logging.retention-days=30
supremeai.logging.archive-old-logs=true
supremeai.logging.structured-json=true

supremeai.monitoring.enabled=true
supremeai.monitoring.metrics-export-interval-ms=10000
supremeai.monitoring.dashboard-port=8000
supremeai.monitoring.admin-port=8001

#####################################
# GENERATION PERFORMANCE TARGETS
#####################################
# Real data from 4 generations
supremeai.generation.avg-duration-seconds=115
supremeai.generation.avg-lines-of-code=2500
supremeai.generation.backend-lines=850
supremeai.generation.frontend-lines=620
supremeai.generation.mobile-lines=650
supremeai.generation.test-lines=380
supremeai.generation.avg-test-coverage=0.845

#####################################
# ERROR HANDLING & AUTO-FIXES
#####################################
supremeai.errors.autofix-enabled=true
supremeai.errors.autofix-confidence-threshold=0.95
supremeai.errors.known-errors-count=8
supremeai.errors.known-errors-autofix-rate=1.0
supremeai.errors.retry-failed-fixes=true

# Known Error Fixes (Real Data)
error.entity-annotation.confidence=0.99
error.entity-annotation.auto-fix=true
error.react-hooks.confidence=0.96
error.react-hooks.auto-fix=true
error.firebase-credentials.confidence=0.99
error.firebase-credentials.auto-fix=true
error.port-in-use.confidence=0.95
error.port-in-use.auto-fix=true
error.jwt-expired.confidence=0.98
error.jwt-expired.auto-fix=true
error.flutter-dependency.confidence=0.94
error.flutter-dependency.auto-fix=true
error.cors-policy.confidence=0.97
error.cors-policy.auto-fix=true
error.node-heap.confidence=0.92
error.node-heap.auto-fix=true

#####################################
# CACHING & PERFORMANCE
#####################################
supremeai.cache.enabled=true
supremeai.cache.ttl-minutes=60
supremeai.cache.max-size-mb=512
supremeai.cache.patterns-ttl-minutes=1440

supremeai.patterns.total-learned=90
supremeai.patterns.high-confidence-count=47
supremeai.patterns.avg-confidence=0.92

#####################################
# STORAGE & ARCHIVING
#####################################
supremeai.storage.daily-backup-time=02:00
supremeai.storage.daily-backup-location=gs://supremeai-backup/daily/
supremeai.storage.daily-backup-retention-days=30

supremeai.storage.monthly-archive-time=00:00
supremeai.storage.monthly-archive-day=1
supremeai.storage.monthly-archive-location=gs://supremeai-archive/
supremeai.storage.monthly-archive-retention-years=2

#####################################
# COST TRACKING (Monthly Budget)
#####################################
supremeai.cost.firebase-monthly=$30
supremeai.cost.openai-monthly=$50
supremeai.cost.anthropic-monthly=$20
supremeai.cost.google-ai-monthly=$10
supremeai.cost.total-budget-monthly=$110
supremeai.cost.budget-alert-threshold=0.8

#####################################
# SCALING & GROWTH PROJECTIONS
#####################################
supremeai.projection.apps-per-month-solo=300
supremeai.projection.apps-per-month-multi=3000
supremeai.projection.storage-growth-gb-per-month=0.15
supremeai.projection.annual-cost-solo=0
supremeai.projection.annual-cost-multi=1320

#####################################
# FEATURE FLAGS
#####################################
supremeai.feature.multi-ai-voting=true
supremeai.feature.auto-pattern-learning=true
supremeai.feature.error-auto-fixing=true
supremeai.feature.performance-monitoring=true
supremeai.feature.cost-optimization=true
supremeai.feature.parallel-generation=true
supremeai.feature.ml-predictions=true
supremeai.feature.hybrid-mode=false

#####################################
# DEPLOYMENT CONFIGURATION
#####################################
supremeai.deployment.platform=GOOGLE_CLOUD_RUN
supremeai.deployment.region=us-central1
supremeai.deployment.memory-mb=512
supremeai.deployment.timeout-seconds=300
supremeai.deployment.auto-scale-min=0
supremeai.deployment.auto-scale-max=100

#####################################
# END OF CONFIGURATION
#####################################
