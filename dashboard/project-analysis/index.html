<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 SupremeAI Project Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #888; }
        
        /* Input Section */
        .input-section {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        button:hover { transform: scale(1.05); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }
        .card h3 { margin-bottom: 15px; color: #667eea; }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        
        /* Health Score */
        .health-score {
            text-align: center;
            padding: 40px;
        }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            margin: 20px auto;
            position: relative;
        }
        .score-excellent { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .score-good { background: linear-gradient(135deg, #667eea, #764ba2); }
        .score-fair { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .score-poor { background: linear-gradient(135deg, #eb3349, #f45c43); }
        
        /* Issues & Suggestions */
        .issue-item, .suggestion-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
        }
        .severity-critical { border-left: 4px solid #ff4757; }
        .severity-high { border-left: 4px solid #ff6348; }
        .severity-medium { border-left: 4px solid #ffa502; }
        .severity-low { border-left: 4px solid #2ed573; }
        
        .priority-high { border-left: 4px solid #ff4757; }
        .priority-medium { border-left: 4px solid #ffa502; }
        .priority-low { border-left: 4px solid #2ed573; }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Language Stats */
        .lang-bar {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .lang-name { width: 100px; }
        .lang-progress {
            flex: 1;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .lang-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .lang-percent { width: 60px; text-align: right; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 SupremeAI Project Analyzer</h1>
            <p class="subtitle">AI-Powered Code Analysis & Suggestions</p>
        </header>
        
        <div class="input-section">
            <h3>📁 Analyze Your Project</h3>
            <div class="input-group">
                <input type="text" id="projectPath" placeholder="Enter project path (e.g., C:/Users/project)" 
                       value="c:/Users/Nazifa/supremeai">
                <button onclick="analyzeProject()" id="analyzeBtn">🔍 Analyze</button>
                <button onclick="quickHealth()" id="healthBtn">🏥 Health Check</button>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing your project with AI...</p>
        </div>
        
        <div id="results" class="hidden">
            <div class="results-grid">
                <!-- Health Score Card -->
                <div class="card health-score">
                    <h3>🏥 Health Score</h3>
                    <div class="score-circle" id="scoreCircle">
                        <span id="scoreValue">--</span>
                    </div>
                    <p id="healthStatus">--</p>
                </div>
                
                <!-- Quick Stats -->
                <div class="card">
                    <h3>📊 Statistics</h3>
                    <div class="metric">
                        <span>Total Files</span>
                        <strong id="totalFiles">--</strong>
                    </div>
                    <div class="metric">
                        <span>Lines of Code</span>
                        <strong id="totalLines">--</strong>
                    </div>
                    <div class="metric">
                        <span>Project Type</span>
                        <strong id="projectType">--</strong>
                    </div>
                    <div class="metric">
                        <span>Issues Found</span>
                        <strong id="issuesCount">--</strong>
                    </div>
                </div>
                
                <!-- Language Distribution -->
                <div class="card">
                    <h3>🔧 Languages</h3>
                    <div id="languageStats"></div>
                </div>
            </div>
            
            <!-- Issues Section -->
            <div class="card" id="issuesCard">
                <h3>⚠️ Issues Found</h3>
                <div id="issuesList"></div>
            </div>
            
            <!-- Suggestions Section -->
            <div class="card" id="suggestionsCard">
                <h3>💡 AI Suggestions</h3>
                <div id="suggestionsList"></div>
            </div>
            
            <!-- Summary -->
            <div class="card">
                <h3>📝 Analysis Summary</h3>
                <pre id="summaryText" style="white-space: pre-wrap; color: #aaa;"></pre>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
