apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: supremeai
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '100'
        autoscaling.knative.dev/minScale: '1'
    spec:
      containerConcurrency: 80
      containers:
      - image: gcr.io/supremeai-a/supremeai:latest
        env:
        - name: PORT
          value: '8080'
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: supremeai-secrets
              key: firebase-project-id
        - name: app.jwtSecret
          valueFrom:
            secretKeyRef:
              name: supremeai-secrets
              key: jwt-secret
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 10
          failureThreshold: 60  # Allows up to 5 minutes (60 * 5s) for startup
      serviceAccountName: supremeai-sa
      timeoutSeconds: 300
