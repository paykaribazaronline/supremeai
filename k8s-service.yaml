apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: supremeai
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '100'
        autoscaling.knative.dev/minScale: '1'
    spec:
      containerConcurrency: 80
      containers:
      - image: gcr.io/supremeai-a/supremeai:latest
        env:
        - name: PORT
          value: '8080'
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: supremeai-secrets
              key: firebase-project-id
        - name: app.jwtSecret
          valueFrom:
            secretKeyRef:
              name: supremeai-secrets
              key: jwt-secret
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/status/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/apps/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      serviceAccountName: supremeai-sa
      timeoutSeconds: 300
