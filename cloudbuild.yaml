steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/supremeai-a/supremeai-repo/supremeai:latest",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/supremeai-a/supremeai-repo/supremeai:latest",
      ]
  - name: "gcr.io/google-appengine/exec-wrapper"
    args:
      [
        "-i",
        "us-central1-docker.pkg.dev/supremeai-a/supremeai-repo/supremeai:latest",
        "-e",
        "SPRING_PROFILES_ACTIVE=cloud",
        "-e",
        "FIREBASE_PROJECT_ID=supremeai-a",
        "--",
        "gcloud",
        "run",
        "deploy",
        "supremeai",
        "--image",
        "us-central1-docker.pkg.dev/supremeai-a/supremeai-repo/supremeai:latest",
        "--platform",
        "managed",
        "--region",
        "us-central1",
        "--allow-unauthenticated",
        "--memory",
        "2Gi",
        "--cpu",
        "2",
        "--timeout",
        "300",
      ]
images:
  - "us-central1-docker.pkg.dev/supremeai-a/supremeai-repo/supremeai:latest"