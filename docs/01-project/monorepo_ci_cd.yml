name: SupremeAI Monorepo CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────
  # BACKEND (Python/FastAPI)
  # ───────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      steps.skip_check.outputs.should_skip != 'true'
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.11']
      fail-fast: false
    steps:
      - name: Check if job should be skipped
        id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # Run if previous run failed OR files changed
          cancel_others: false
          skip_after_successful_duplicate: true
          paths: "['backend/**', 'packages/shared-types/**']"
          do_not_skip: "['workflow_dispatch', 'schedule']"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'backend/pyproject.toml'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dependencies
        working-directory: backend
        run: |
          poetry install --no-interaction --no-ansi

      - name: Run linting (Ruff)
        working-directory: backend
        run: poetry run ruff check . --output-format=github

      - name: Run type check (MyPy)
        working-directory: backend
        run: poetry run mypy core/ brain/ api/ memory/ --ignore-missing-imports

      - name: Run tests with coverage
        working-directory: backend
        run: |
          poetry run pytest --cov=core --cov=brain --cov=tools --cov=api --cov=memory             --cov-report=xml --cov-report=term-missing --cov-fail-under=38 -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

  # ───────────────────────────────────────────────
  # FRONTEND BUILDS (React, VSCode)
  # ───────────────────────────────────────────────
  frontend-build:
    name: ${{ matrix.name }} Build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      steps.skip_check.outputs.should_skip != 'true'
    timeout-minutes: 15
    strategy:
      matrix:
        # Define paths for each matrix entry
        include:
          - name: "Studio Client"
            package: "studio"
            filter: "studio-client"
          - name: "Web Chat"
            package: "webchat"
            filter: "web-chat"
          - name: "VS Code Extension"
            package: "vscode"
            filter: "vscode-extension"
    steps:
      - name: Check if job should be skipped
        id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          cancel_others: false
          skip_after_successful_duplicate: true
          # Dynamically set paths based on matrix
          paths: "${{ (matrix.package == 'studio' && '[\'apps/studio-client/**\', \'packages/**\']') || (matrix.package == 'webchat' && '[\'apps/web-chat/**\', \'packages/**\']') || (matrix.package == 'vscode' && '[\'tools/vscode-extension/**\']') }}"
          do_not_skip: "['workflow_dispatch', 'schedule']"

      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Ensure this matches your package.json engine

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, Lint, and Test
        run: pnpm turbo run build lint test --filter=${{ matrix.filter }}

  # ───────────────────────────────────────────────
  # MOBILE (Flutter)
  # ───────────────────────────────────────────────
  mobile-ci:
    name: 📱 Mobile App Analysis
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Check if job should be skipped
        id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          cancel_others: false
          skip_after_successful_duplicate: true
          paths: "['apps/mobile/**']"
          do_not_skip: "['workflow_dispatch', 'schedule']"

      - uses: actions/checkout@v4
        if: steps.skip_check.outputs.should_skip != 'true'

      - name: Set up Flutter
        if: steps.skip_check.outputs.should_skip != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

  # ───────────────────────────────────────────────
  # DEPLOY (Only on main branch)
  # ───────────────────────────────────────────────
  deploy-gcp:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check GCP credentials
        id: check_creds
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "GCP_SA_KEY not set. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP
        if: steps.check_creds.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.check_creds.outputs.skip != 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to Cloud Run
        if: steps.check_creds.outputs.skip != 'true'
        run: |
          gcloud run deploy supremeai-api \
            --source backend \
            --region ${{ vars.GCP_REGION || 'us-central1' }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --set-env-vars "ENV=production"

      - name: Deploy studio client to Firebase
        if: steps.check_creds.outputs.skip != 'true'
        run: |
          cd apps/studio-client
          pnpm install
          pnpm run build
          firebase deploy --only hosting --project ${{ secrets.GCP_PROJECT_ID }}

  # ───────────────────────────────────────────────
  # NOTIFICATION
  # ───────────────────────────────────────────────
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, mobile-analyze]
    if: always()
    steps:
      - name: Send Discord notification
        if: ${{ failure() }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "❌ SupremeAI CI/CD failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
