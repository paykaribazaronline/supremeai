# Add to your existing docker-compose.yml

  redis:
    image: redis:7-alpine
    container_name: supremeai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supremeai-celery
    command: celery -A core.celery_tasks worker --loglevel=info --beat
    depends_on:
      - redis
      - db
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@db:5432/supremeai
    volumes:
      - ./backend:/app
    networks:
      - supremeai-network

volumes:
  redis-data:
