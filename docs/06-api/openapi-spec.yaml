  /github/implement:
    post:
      summary: "Integrate discovered repo into project"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repo_url:
                  type: string
                  example: "https://github.com/TanStack/table"
                integration_method:
                  type: string
                  enum: ["npm", "submodule", "fork", "copy"]
                  example: "npm"
                target_project:
                  type: string
                  example: "customer-ecommerce-app"
      responses:
        '200':
          description: Repository integrated successfully.

