name: 🛠️ SupremeAI Maintenance Pipeline
# ═══════════════════════════════════════════════════════════════
# Consolidated maintenance pipeline — replaces:
#   - ai_review_cron.yml     (every 8h AI code review)
#   - ai_validation_cron.yml (nightly DeepEval validation)
#   - cleanup-runs.yml       (Sunday: delete old Cloud Run revisions)
#   - shared-cache-bridge.yml (Sunday: prune stale GH Actions caches)
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 */8 * * *'   # AI Review — every 8 hours
    - cron: '0 0 * * *'     # AI Validation — daily midnight UTC
    - cron: '0 2 * * 0'     # Cloud Run cleanup — Sunday 2 AM UTC
    - cron: '0 3 * * 0'     # Cache prune — Sunday 3 AM UTC
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ai-code-review
          - ai-validation
          - cleanup-runs
          - cache-maintenance

concurrency:
  group: maintenance-${{ github.ref }}
  cancel-in-progress: false   # Never cancel maintenance jobs mid-run

env:
  PYTHON_VERSION: '3.11'

# ═══════════════════════════════════════════════════════════════
# JOB 1 — AI CODE REVIEW (every 8 hours)
# Originally: ai_review_cron.yml
# ═══════════════════════════════════════════════════════════════
jobs:
  ai-code-review:
    name: 🤖 Scheduled AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on the every-8h cron OR manual dispatch requesting this job
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 */8 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'ai-code-review' || inputs.job == 'all'))
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Required so git diff HEAD~1 works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Gemini Code Review
        env:
          GEMINI_API_KEYS:    ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GEMINI_FREE_API_KEY:${{ secrets.GEMINI_FREE_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/review.py

      - name: Record result
        if: always()
        run: |
          echo "AI Code Review completed with status: ${{ job.status }}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — AI VALIDATION (nightly midnight UTC)
  # Originally: ai_validation_cron.yml
  # ═══════════════════════════════════════════════════════════════
  ai-validation:
    name: 🧪 Nightly AI Validation (DeepEval)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'ai-validation' || inputs.job == 'all'))
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install deepeval google-generativeai openai

      - name: Run DeepEval Validation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python .github/scripts/test_ai_reviewer.py

      - name: Record result
        if: always()
        run: |
          echo "AI Validation completed with status: ${{ job.status }}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — CLOUD RUN CLEANUP (Sunday 2 AM UTC)
  # Originally: cleanup-runs.yml
  # ═══════════════════════════════════════════════════════════════
  cleanup-runs:
    name: 🧹 Cloud Run Revision Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'cleanup-runs' || inputs.job == 'all'))
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required GCP secrets
        run: |
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "::error::Missing required secret: GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "${{ secrets.GCP_REGION }}" ]; then
            echo "::error::Missing required secret: GCP_REGION"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: >-
            projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Delete old Cloud Run revisions
        run: |
          SERVICE_NAME="supremeai-api"
          REGION="${{ secrets.GCP_REGION }}"
          echo "🧹 Cleaning old Cloud Run revisions for ${SERVICE_NAME} in ${REGION}…"
          # Keep newest 5 revisions, delete the rest
          gcloud run revisions list \
            --service=$SERVICE_NAME \
            --region=$REGION \
            --format="value(name)" \
            --sort-by="~createTime" | tail -n +6 | \
            xargs -r -I {} gcloud run revisions delete {} --region=$REGION --quiet
          echo "✅ Cloud Run revision cleanup complete"

      - name: Delete old Docker images from GCR
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE_NAME="supremeai-api"
          echo "🧹 Cleaning old Docker images from GCR…"
          # Keep newest 10 images, delete the rest
          gcloud container images list-tags \
            gcr.io/$PROJECT_ID/$IMAGE_NAME \
            --format='value(digest)' \
            --limit=999999 | tail -n +11 | \
            xargs -r -I {} gcloud container images delete \
              gcr.io/$PROJECT_ID/$IMAGE_NAME@{} --quiet
          echo "✅ GCR image cleanup complete"

  # ═══════════════════════════════════════════════════════════════
  # JOB 4 — CACHE MAINTENANCE (Sunday 3 AM UTC)
  # Originally: shared-cache-bridge.yml
  # ═══════════════════════════════════════════════════════════════
  cache-maintenance:
    name: 🗂️ GitHub Actions Cache Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'cache-maintenance' || inputs.job == 'all'))
    steps:
      - name: Prune stale caches
        run: |
          echo "🧹 Pruning stale GitHub Actions caches…"

          CACHES=$(gh cache list \
            --repo ${{ github.repository }} \
            --json id,key,createdAt,sizeInBytes \
            --limit 100 2>/dev/null || echo "[]")

          TOTAL_SIZE=$(echo "$CACHES" | jq '[.[].sizeInBytes] | add // 0')
          TOTAL_COUNT=$(echo "$CACHES" | jq 'length')
          echo "📊 Total caches: $TOTAL_COUNT, Total size: $(echo "scale=2; $TOTAL_SIZE / 1073741824" | bc) GB"

          # Delete caches older than 14 days
          CUTOFF=$(date -d '14 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || \
                   date -v-14d         +%Y-%m-%dT%H:%M:%S 2>/dev/null || echo "")

          if [ -n "$CUTOFF" ]; then
            echo "$CACHES" | jq -r --arg cutoff "$CUTOFF" \
              '.[] | select(.createdAt < $cutoff) | "\(.id)\t\(.key)\t\(.sizeInBytes)"' | \
            while IFS=$'\t' read -r cache_id cache_key cache_size; do
              if [ -n "$cache_id" ] && [ "$cache_id" != "null" ]; then
                SIZE_MB=$(echo "scale=1; $cache_size / 1048576" | bc 2>/dev/null || echo "?")
                echo "  🗑️  Deleting: $cache_key (${SIZE_MB} MB)"
                gh cache delete "$cache_id" --repo ${{ github.repository }} 2>/dev/null || true
              fi
            done
          fi

          # Also delete any old-format "poetry-" prefixed caches (the bloated 10GB ones)
          echo "$CACHES" | jq -r '.[] | select(.key | startswith("poetry-")) | "\(.id)\t\(.key)"' | \
          while IFS=$'\t' read -r cache_id cache_key; do
            if [ -n "$cache_id" ] && [ "$cache_id" != "null" ]; then
              echo "  🗑️  Deleting old poetry cache: $cache_key"
              gh cache delete "$cache_id" --repo ${{ github.repository }} 2>/dev/null || true
            fi
          done

          echo "✅ Cache maintenance complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # FINAL — SUMMARY (always runs, reports all job statuses)
  # ═══════════════════════════════════════════════════════════════
  maintenance-summary:
    name: 📊 Maintenance Summary
    runs-on: ubuntu-latest
    needs: [ai-code-review, ai-validation, cleanup-runs, cache-maintenance]
    if: always()
    steps:
      - name: Report Results
        run: |
          echo "## 🛠️ Maintenance Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🤖 AI Code Review  | ${{ needs.ai-code-review.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🧪 AI Validation   | ${{ needs.ai-validation.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🧹 Cloud Cleanup   | ${{ needs.cleanup-runs.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🗂️ Cache Prune    | ${{ needs.cache-maintenance.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Triggered by: \`${{ github.event_name }}\` at $(date -u +%Y-%m-%dT%H:%M:%SZ)_" >> "$GITHUB_STEP_SUMMARY"
