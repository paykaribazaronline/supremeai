name: Reusable Java CI

on:
  workflow_call:
    inputs:
      deploy:
        type: boolean
        default: false
    secrets:
      GCP_SERVICE_ACCOUNT_KEY:
        required: true
      GCP_PROJECT_ID:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    
    - name: Check Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "❌ gradlew not found!"
          exit 1
        fi

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - run: chmod +x gradlew
    - name: Build and Test
      run: ./gradlew clean build --no-daemon

    - name: Authenticate to Google Cloud
      if: inputs.deploy == true
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'

    - name: Set up Cloud SDK
      if: inputs.deploy == true
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GCP
      if: inputs.deploy == true
      run: gcloud auth configure-docker --quiet

    - name: Set up Docker Buildx
      if: inputs.deploy == true
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      if: inputs.deploy == true
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        docker buildx build \
          --cache-from=type=registry,ref=gcr.io/$GCP_PROJECT_ID/supremeai-backend:cache \
          --cache-to=type=registry,ref=gcr.io/$GCP_PROJECT_ID/supremeai-backend:cache,mode=max \
          -t gcr.io/$GCP_PROJECT_ID/supremeai-backend \
          --push .

    - name: Deploy to Cloud Run
      if: inputs.deploy == true
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        gcloud run deploy supremeai-backend \
          --image gcr.io/$GCP_PROJECT_ID/supremeai-backend \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --project $GCP_PROJECT_ID \
          --memory 2Gi \
          --cpu 2 \
          --timeout 300 \
          --set-env-vars "SPRING_PROFILES_ACTIVE=cloud" \
          --quiet
