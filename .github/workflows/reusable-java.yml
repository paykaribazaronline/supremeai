name: Reusable Java CI

on:
  workflow_call:
    inputs:
      deploy:
        type: boolean
        default: false
    secrets:
      GCP_SERVICE_ACCOUNT_KEY:
        required: true
      GCP_PROJECT_ID:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - run: chmod +x gradlew
    - run: ./gradlew clean build --no-daemon
    - run: ./gradlew test jacocoTestReport --no-daemon

    - name: Authenticate to Google Cloud
      if: inputs.deploy == true
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'

    - name: Set up Cloud SDK
      if: inputs.deploy == true
      uses: google-github-actions/setup-gcloud@v2

    - name: Build and Deploy to Cloud Run
      if: inputs.deploy == true
      run: |
        # Enable APIs if they are not enabled (this might also fail if no permissions, but good to have)
        gcloud services enable cloudbuild.googleapis.com run.googleapis.com
        
        # Build and Deploy
        gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/supremeai-backend --quiet
        gcloud run deploy supremeai-backend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/supremeai-backend \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --project ${{ secrets.GCP_PROJECT_ID }} --quiet
