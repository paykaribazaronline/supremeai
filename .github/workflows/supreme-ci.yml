# ═══════════════════════════════════════════════════════════════════════════════
# 🧠 SupremeAI Self-Evolving CI v3.0 — সিঙ্গেল পাইপলাইন
# ═══════════════════════════════════════════════════════════════════════════════
# বৈশিষ্ট্যসমূহ:
#   • Phase 0: SupremeAI API Health Check + Backup Status
#   • Phase 1: Path-based change detection + previous failure check
#   • Phase 2: Parallel test jobs with embedded SupremeAI-powered auto-fix
#   • Phase 3: CI Report with auto-fix status and confidence scores
#   • Phase 4: SupremeAI Evaluator (live API: /v1/ci/evaluate)
#   • Phase 5: Decision Engine (merge/retry/discard + human alert)
#   • Phase 6: Sequential deploy with failover to backup server
#   • Backup update: 24h delayed, scheduled via separate workflow
# ═══════════════════════════════════════════════════════════════════════════════

name: SupremeAI Self-Evolving CI v3

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'logs/**'
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'logs/**'
  schedule:
    # রুল ১৬ অনুযায়ী (Zero Maintenance Cost) গিটহাব ফ্রি মিনিট বাঁচাতে 
    # আমরা সিডিউল জব দিনে শুধুমাত্র ১ বার (রাত ১২টায়) রান করব।
    - cron: '0 0 * * *'       # AI Validation & Full Health Check — প্রতিদিন রাত ১২টায় UTC
    - cron: '0 2 * * 0'       # Cloud Cleanup — রবিবার ভোর ২টায় UTC
    - cron: '0 3 * * 0'       # Cache Prune — রবিবার ভোর ৩টায় UTC
  workflow_dispatch:
    inputs:
      maintenance_job:
        description: 'কোন মেইনটেন্যান্স জব রান করবেন (খালি রাখলে নরমাল CI)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - ai-code-review
          - ai-validation
          - cleanup-runs
          - cache-maintenance
          - emergency-failover
      build_artifacts:
        description: 'রিলিজ আর্টিফ্যাক্ট তৈরি করবেন? (APK, VSIX, EXE)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      forced_jobs:
        description: 'JSON array — কোন জবগুলো ফোর্স রান করবে'
        required: false
        default: '[]'
        type: string
      is_retry:
        description: 'এটি কি auto-fix এর রিট্রাই রান?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_all:
        description: 'সব জব ফোর্স রান করবে (ডিবাগিং এর জন্য)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      ai_api_provider:
        description: 'AI ফিক্সের জন্য কোন API ব্যবহার করবেন?'
        required: false
        default: 'supremeai'
        type: choice
        options:
          - 'supremeai'
          - 'openai'
          - 'gemini'
          - 'local'
      skip_backup_check:
        description: 'Backup health check স্কিপ করবেন? (emergency deploy এর জন্য)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '24'
  # ═══════════════════════════════════════════════════════════════
  # AI API কনফিগারেশন — SupremeAI primary, others fallback
  # ═══════════════════════════════════════════════════════════════
  SUPREMEAI_API_KEY: ${{ secrets.SUPREMEAI_API_KEY }}
  SUPREMEAI_API_URL: ${{ vars.SUPREMEAI_API_URL || 'https://supremeai-api-565236080752.us-central1.run.app' }}
  SUPREMEAI_EVALUATOR_ENDPOINT: ${{ vars.SUPREMEAI_EVALUATOR_ENDPOINT || '/v1/ci/evaluate' }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  AI_API_PROVIDER: ${{ github.event.inputs.ai_api_provider || 'supremeai' }}
  # ═══════════════════════════════════════════════════════════════
  # Backup server configuration
  # ═══════════════════════════════════════════════════════════════
  BACKUP_SERVICE_NAME: ${{ vars.BACKUP_SERVICE_NAME || 'supremeai-api-backup' }}
  BACKUP_REGION: ${{ vars.BACKUP_REGION || 'us-east1' }}
  MAIN_REGION: ${{ vars.MAIN_REGION || 'us-central1' }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  # ═══════════════════════════════════════════════════════════════
  # Alert webhooks (optional)
  # ═══════════════════════════════════════════════════════════════
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  # ═══════════════════════════════════════════════════════════════
  # Supabase Database Failover Configuration
  # ═══════════════════════════════════════════════════════════════
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SECRET_KEY || secrets.SUPABASE_KEY }}


jobs:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 0: SUPREMEAI HEALTH CHECK + BACKUP STATUS ⭐
  # ═══════════════════════════════════════════════════════════════
  health-check:
    name: 🩺 SupremeAI Health Check
    runs-on: ubuntu-latest
    # বাংলা মন্তব্য: সাপ্তাহিক গ্রুপ পিআর হওয়ার কারণে এখন ডিপেন্ডাবট পিআর-এ সিআই ও অটো-ফিক্স রান করতে দেওয়া হচ্ছে।
    # পূর্বে ফ্রি মিনিট বাঁচাতে এটি এড়ানো হয়েছিল: if: github.actor != 'dependabot[bot]'
    outputs:
      supremeai_available: ${{ steps.check.outputs.supremeai_available }}
      backup_available: ${{ steps.check.outputs.backup_available }}
      active_provider: ${{ steps.check.outputs.active_provider }}
      main_health_url: ${{ steps.check.outputs.main_health_url }}
      backup_health_url: ${{ steps.check.outputs.backup_health_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Python সেটআপ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: ডিপেন্ডেন্সি ইনস্টল (requests)
        run: pip install requests

      - name: 🕒 24-Hour Schedule Gap Check
        # Zero cost অপ্টিমাইজেশনের জন্য আমরা চেক করছি গত ২৪ ঘণ্টার মধ্যে কোনো রান হয়েছে কি না
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/enforce_24h_gap.py

      - name: SupremeAI API Health Check
        id: check
        env:
          SUPREMEAI_API_URL: ${{ env.SUPREMEAI_API_URL }}
          SUPREMEAI_API_KEY: ${{ env.SUPREMEAI_API_KEY }}
          BACKUP_SERVICE_NAME: ${{ env.BACKUP_SERVICE_NAME }}
          BACKUP_REGION: ${{ env.BACKUP_REGION }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ env.GCP_SA_KEY }}
          SKIP_BACKUP: ${{ github.event.inputs.skip_backup_check || 'true' }}
        run: |
          python .github/scripts/ci-health-check.py

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: DETECT CHANGES
  # ═══════════════════════════════════════════════════════════════
  detect-changes:
    name: 🔍 পরিবর্তন সনাক্তকরণ
    runs-on: ubuntu-latest
    needs: [health-check]
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      studio: ${{ steps.changes.outputs.studio }}
      mobile: ${{ steps.changes.outputs.mobile }}
      webchat: ${{ steps.changes.outputs.webchat }}
      vscode: ${{ steps.changes.outputs.vscode }}
      infra: ${{ steps.changes.outputs.infra }}
      config: ${{ steps.changes.outputs.config }}
      docker: ${{ steps.changes.outputs.docker }}
      lockfile_changed: ${{ steps.changes.outputs.lockfile }}
      workflow: ${{ steps.changes.outputs.workflow }}
      monorepo_config: ${{ steps.changes.outputs.monorepo_config }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: প্যাকেজ পরিবর্তন সনাক্তকরণ
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/shared-types/**'
              - '!backend/**/*.md'
              - '!backend/docs/**'
            studio:
              - 'apps/studio-client/**'
              - 'packages/**'
              - '!apps/studio-client/**/*.md'
            mobile:
              - 'apps/mobile/**'
              - '!apps/mobile/**/*.md'
            webchat:
              - 'apps/web-chat/**'
              - 'packages/**'
              - '!apps/web-chat/**/*.md'
            vscode:
              - 'tools/vscode-extension/**'
              - '!tools/vscode-extension/**/*.md'
            infra:
              - 'infrastructure/**'
              - '!infrastructure/**/*.md'
            config:
              - '**/.env*'
              - '**/config/**'
            docker:
              - '**/Dockerfile*'
              - '**/docker-compose*'
              - 'scripts/docker_ai_guard.py'
            lockfile:
              - 'backend/poetry.lock'
              - 'pnpm-lock.yaml'
            workflow:
              - '.github/workflows/supreme-ci.yml'
              - '.github/actions/**'
              - '.github/scripts/**'
            monorepo_config:
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1.5: CHECK PREVIOUS FAILURES
  # ═══════════════════════════════════════════════════════════════
  check-previous-failures:
    name: 🤔 আগের ফেইলার চেক
    runs-on: ubuntu-latest
    needs: [health-check]
    outputs:
      force_flags_b64: ${{ steps.check.outputs.force_flags_b64 }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Python সেটআপ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: আগের ফেইলার ও স্কিপ ডিটেক্ট
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: 'SupremeAI Self-Evolving CI v3'
        run: |
          python .github/scripts/detect-previous-failures.py

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1.6: COMBINE DECISIONS
  # ═══════════════════════════════════════════════════════════════
  combine-decisions:
    name: ⚙️ সিদ্ধান্ত একত্রীকরণ
    runs-on: ubuntu-latest
    needs: [detect-changes, check-previous-failures]
    outputs:
      backend_force: ${{ steps.force.outputs.backend_force }}
      studio_force: ${{ steps.force.outputs.studio_force }}
      mobile_force: ${{ steps.force.outputs.mobile_force }}
      webchat_force: ${{ steps.force.outputs.webchat_force }}
      vscode_force: ${{ steps.force.outputs.vscode_force }}
      prompt_force: ${{ steps.force.outputs.prompt_force }}
      backend_run: ${{ steps.combine.outputs.backend_run }}
      studio_run: ${{ steps.combine.outputs.studio_run }}
      mobile_run: ${{ steps.combine.outputs.mobile_run }}
      webchat_run: ${{ steps.combine.outputs.webchat_run }}
      vscode_run: ${{ steps.combine.outputs.vscode_run }}
      prompt_run: ${{ steps.combine.outputs.prompt_run }}
    steps:
      - name: ফোর্স ফ্ল্যাগ পড়ুন
        id: force
        run: |
          FLAGS_B64='${{ needs.check-previous-failures.outputs.force_flags_b64 }}'
          if [ -z "$FLAGS_B64" ] || [ "$FLAGS_B64" = "null" ]; then
            FLAGS='{"backend":false,"studio":false,"mobile":false,"webchat":false,"vscode":false,"prompt":false}'
          else
            FLAGS=$(echo "$FLAGS_B64" | base64 --decode)
          fi
          echo "backend_force=$(echo "$FLAGS" | jq -r '.backend // false')" >> $GITHUB_OUTPUT
          echo "studio_force=$(echo "$FLAGS" | jq -r '.studio // false')" >> $GITHUB_OUTPUT
          echo "mobile_force=$(echo "$FLAGS" | jq -r '.mobile // false')" >> $GITHUB_OUTPUT
          echo "webchat_force=$(echo "$FLAGS" | jq -r '.webchat // false')" >> $GITHUB_OUTPUT
          echo "vscode_force=$(echo "$FLAGS" | jq -r '.vscode // false')" >> $GITHUB_OUTPUT
          echo "prompt_force=$(echo "$FLAGS" | jq -r '.prompt // false')" >> $GITHUB_OUTPUT

      - name: রিট্রাই ইনপুট পড়ুন
        id: retry
        run: |
          FORCED='${{ github.event.inputs.forced_jobs || '[]' }}'
          if [ -z "$FORCED" ] || [ "$FORCED" = "[]" ]; then
            echo "forced_jobs=[]" >> $GITHUB_OUTPUT
          else
            echo "forced_jobs=$FORCED" >> $GITHUB_OUTPUT
          fi
          echo "is_retry=${{ github.event.inputs.is_retry || 'false' }}" >> $GITHUB_OUTPUT
          echo "force_all=${{ github.event.inputs.force_all || 'false' }}" >> $GITHUB_OUTPUT

      - name: চেঞ্জ + ফেইলার সিদ্ধান্ত একত্রীকরণ
        id: combine
        run: |
          FORCE_ALL="${{ steps.retry.outputs.force_all }}"
          if [ "$FORCE_ALL" = "true" ]; then
            echo "Final: force_all=true — সব জব রান হবে"
            for pkg in backend studio mobile webchat vscode prompt; do
              echo "${pkg}_run=true" >> $GITHUB_OUTPUT
              echo "${pkg}=true" >> $GITHUB_OUTPUT
            done
            exit 0
          fi

          echo "=== সিদ্ধান্ত লগ ==="
          if [ "${{ steps.retry.outputs.is_retry }}" = "true" ]; then
            echo "রিট্রাই মোড: ON"
          fi

          decide() {
            local pkg="$1"
            local changed="$2"
            local forced="$3"
            local workflow_changed="${{ needs.detect-changes.outputs.workflow }}"
            local monorepo_changed="${{ needs.detect-changes.outputs.monorepo_config }}"
            local forced_jobs="${{ steps.retry.outputs.forced_jobs }}"
            local in_forced_list="false"
            local is_retry="${{ steps.retry.outputs.is_retry }}"

            if echo "$forced_jobs" | jq -e --arg pkg "$pkg" 'map(ascii_downcase) | contains([$pkg | ascii_downcase])' >/dev/null 2>&1; then
              in_forced_list="true"
            fi
            if echo "$forced_jobs" | jq -e --arg pkg "$pkg" 'map(ascii_downcase) | contains([($pkg + "-test") | ascii_downcase]) or contains([($pkg + "-build") | ascii_downcase]) or contains([($pkg + "-analyze") | ascii_downcase])' >/dev/null 2>&1; then
              in_forced_list="true"
            fi

            # Check if this package should run based on changes or strict previous failure
            local run_it="false"
            local reason="Skipped"

            if [ "${{ github.event_name }}" = "schedule" ]; then
                run_it="true"
                reason="Scheduled Run"
            elif [ "$workflow_changed" = "true" ] || [ "$monorepo_changed" = "true" ]; then
                run_it="true"
                reason="Global config/workflow changed"
            elif [ "$changed" = "true" ]; then
                run_it="true"
                reason="Package code changed"
            elif [ "$forced" = "true" ]; then
                run_it="true"
                reason="Previous run failed (Strict Forced)"
            elif [ "$in_forced_list" = "true" ]; then
                run_it="true"
                reason="Manually forced via input"
            fi

            if [ "$run_it" = "true" ]; then
                echo "${pkg}_run=true" >> $GITHUB_OUTPUT
                echo "${pkg}=true" >> $GITHUB_OUTPUT
                echo "  [RUN] ${pkg}: চলবে ($reason)"
            else
                echo "${pkg}_run=false" >> $GITHUB_OUTPUT
                echo "${pkg}=false" >> $GITHUB_OUTPUT
                echo "  [SKIP] ${pkg}: চলবে না (No changes or failures)"
            fi
          }

          decide "backend" "${{ needs.detect-changes.outputs.backend }}" "${{ steps.force.outputs.backend_force }}"
          decide "studio" "${{ needs.detect-changes.outputs.studio }}" "${{ steps.force.outputs.studio_force }}"
          decide "mobile" "${{ needs.detect-changes.outputs.mobile }}" "${{ steps.force.outputs.mobile_force }}"
          decide "webchat" "${{ needs.detect-changes.outputs.webchat }}" "${{ steps.force.outputs.webchat_force }}"
          decide "vscode" "${{ needs.detect-changes.outputs.vscode }}" "${{ steps.force.outputs.vscode_force }}"

          PROMPT_FORCE="${{ steps.force.outputs.prompt_force }}"
          INFRA_CHANGED="${{ needs.detect-changes.outputs.infra }}"
          if [ "$PROMPT_FORCE" = "true" ] || [ "$INFRA_CHANGED" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "prompt_run=true" >> $GITHUB_OUTPUT
            echo "  [RUN] prompt: চলবে"
          else
            echo "prompt_run=false" >> $GITHUB_OUTPUT
            echo "  [SKIP] prompt: চলবে না"
          fi

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: PARALLEL TEST JOBS
  # ═══════════════════════════════════════════════════════════════
  # প্রতিটি জবের ভিতরে embedded auto-fix (SupremeAI API first)
  # ═══════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════
  # জব ২: ব্যাকএন্ড টেস্ট + EMBEDDED AUTO-FIX (SupremeAI powered)
  # ═══════════════════════════════════════════════════════════════
  backend-test:
    name: 🐍 ব্যাকএন্ড টেস্ট
    runs-on: ubuntu-latest
    needs: [health-check, detect-changes, combine-decisions]
    timeout-minutes: 15
    if: needs.combine-decisions.outputs.backend_run == 'true'
    outputs:
      job_status: ${{ steps.status.outputs.job_status }}
      fix_applied: ${{ steps.auto-fix.outputs.fix_applied }}
      fix_confidence: ${{ steps.auto-fix.outputs.confidence }}
      fix_branch: ${{ steps.auto-fix.outputs.fix_branch }}
      error_logs: ${{ steps.auto-fix.outputs.error_logs }}
    env:
      PYTHONPATH: ..:.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python সেটআপ
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ডিপেন্ডেন্সি ইনস্টল
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          # বাংলা মন্তব্য: 'tools' গ্রুপটি অন্তর্ভুক্ত করা হলো যাতে redis ও boto3 লাইব্রেরি ইনস্টল হয় এবং টেস্ট কালেকশন ফেইল না করে
          poetry install --no-interaction --no-ansi --no-root --with dev --without ml
          poetry run pip install "setuptools<82.0.0" 2>/dev/null || true
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: 🔍 Lint (Ruff)
        id: ruff
        working-directory: backend
        run: poetry run ruff check . --output-format=github

      - name: 🛡️ সিকিউরিটি স্ক্যান (Bandit)
        id: bandit
        working-directory: backend
        run: pipx run bandit -r core/ brain/ api/ memory/ -ll --exclude tests

      - name: 🔍 টাইপ চেক (MyPy)
        id: mypy
        working-directory: backend
        run: poetry run mypy core/ brain/ api/ memory/ --ignore-missing-imports --explicit-package-bases

      - name: 🧪 টেস্ট রান
        id: pytest
        working-directory: backend
        env:
          ENV: test
          PYTHONPATH: .
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: |
          # বাংলা মন্তব্য: দ্রুত রান করার জন্য pytest-xdist সহ সমান্তরালে (-n auto) টেস্ট চালানো হচ্ছে এবং কভারেজ লিমিট ২৪% করা হলো
          poetry run pytest \
            -n auto \
            --cov=core --cov=brain --cov=tools --cov=api --cov=memory \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=24 -q

      - name: কভারেজ আপলোড
        if: success()
        uses: codecov/codecov-action@v7
        with:
          files: backend/coverage.xml
          flags: backend

      - name: ✅ জব স্ট্যাটাস — PASSED
        if: success()
        id: status-pass
        run: |
          echo "job_status=success" >> $GITHUB_OUTPUT
          echo "✅ ব্যাকএন্ড টেস্ট PASSED"

      # ═══════════════════════════════════════════════════════════════
      # 🔧 EMBEDDED AUTO-FIX — SupremeAI API first, fallback chain
      # ═══════════════════════════════════════════════════════════════
      - name: 🔧 Auto-Fix Engine (ফেইল হলে)
        if: failure() && github.actor != 'dependabot[bot]'
        id: auto-fix
        env:
          FAILED_JOB: "backend-test"
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          AI_API_PROVIDER: ${{ needs.health-check.outputs.active_provider }}
          SUPREMEAI_API_KEY: ${{ env.SUPREMEAI_API_KEY }}
          SUPREMEAI_API_URL: ${{ env.SUPREMEAI_API_URL }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
        run: |
          python .github/scripts/ci-auto-fix-v3.py \
            --job backend-test \
            --mode fix \
            --run-id "$RUN_ID" \
            --branch "$BRANCH"

      - name: ❌ জব স্ট্যাটাস — FAILED
        if: failure()
        id: status-fail
        run: |
          echo "job_status=failure" >> $GITHUB_OUTPUT
          echo "❌ ব্যাকএন্ড টেস্ট FAILED — auto-fix চেষ্টা করা হয়েছে"

      - name: 📦 ক্যাশ সাইজ চেক
        if: always()
        run: |
          echo "📦 Virtualenv size:"
          du -sh backend/.venv 2>/dev/null || echo "No .venv found"

  # ═══════════════════════════════════════════════════════════════
  # জব ৩: স্টুডিও ক্লায়েন্ট বিল্ড + EMBEDDED AUTO-FIX
  # ═══════════════════════════════════════════════════════════════
  studio-build:
    name: 🎨 স্টুডিও ক্লায়েন্ট বিল্ড
    runs-on: ubuntu-latest
    needs: [health-check, detect-changes, combine-decisions]
    timeout-minutes: 10
    if: needs.combine-decisions.outputs.studio_run == 'true'
    outputs:
      job_status: ${{ steps.status.outputs.job_status }}
      fix_applied: ${{ steps.auto-fix.outputs.fix_applied }}
      fix_confidence: ${{ steps.auto-fix.outputs.confidence }}
      fix_branch: ${{ steps.auto-fix.outputs.fix_branch }}
      error_logs: ${{ steps.auto-fix.outputs.error_logs }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: pnpm ক্যাশ সেটআপ
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: স্টুডিও বিল্ড
        id: build
        run: pnpm turbo run build --filter=supremeai-studio-client
        env:
          NODE_ENV: production
          VITE_API_BASE: ${{ vars.VITE_API_BASE || vars.CLOUD_RUN_URL || 'https://supremeai-api-565236080752.us-central1.run.app' }}
          API_URL: ${{ vars.API_URL || 'http://127.0.0.1:8000' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY || '' }}

      - name: লিন্ট
        id: lint
        run: pnpm turbo run lint --filter=supremeai-studio-client

      - name: টেস্ট
        id: test
        run: pnpm turbo run test --filter=supremeai-studio-client

      - name: বিল্ড আর্টিফ্যাক্ট আপলোড
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: studio-build
          path: apps/studio-client/dist
          retention-days: 1

      - name: ✅ জব স্ট্যাটাস — PASSED
        if: success()
        id: status-pass
        run: echo "job_status=success" >> $GITHUB_OUTPUT

      - name: 🔧 Auto-Fix Engine (ফেইল হলে)
        if: failure() && github.actor != 'dependabot[bot]'
        id: auto-fix
        env:
          FAILED_JOB: "studio-build"
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          AI_API_PROVIDER: ${{ needs.health-check.outputs.active_provider }}
          SUPREMEAI_API_KEY: ${{ env.SUPREMEAI_API_KEY }}
          SUPREMEAI_API_URL: ${{ env.SUPREMEAI_API_URL }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
        run: |
          python .github/scripts/ci-auto-fix-v3.py \
            --job studio-build \
            --mode fix \
            --run-id "$RUN_ID" \
            --branch "$BRANCH"

      - name: ❌ জব স্ট্যাটাস — FAILED
        if: failure()
        id: status-fail
        run: echo "job_status=failure" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════
  # জব ৪: মোবাইল অ্যাপ অ্যানালাইসিস + EMBEDDED AUTO-FIX
  # ═══════════════════════════════════════════════════════════════
  mobile-analyze:
    name: 📱 মোবাইল অ্যাপ অ্যানালাইসিস
    runs-on: ubuntu-latest
    needs: [health-check, detect-changes, combine-decisions]
    timeout-minutes: 10
    if: needs.combine-decisions.outputs.mobile_run == 'true'
    outputs:
      job_status: ${{ steps.status.outputs.job_status }}
      fix_applied: ${{ steps.auto-fix.outputs.fix_applied }}
      fix_confidence: ${{ steps.auto-fix.outputs.confidence }}
      fix_branch: ${{ steps.auto-fix.outputs.fix_branch }}
      error_logs: ${{ steps.auto-fix.outputs.error_logs }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: pub ক্যাশ
        uses: actions/cache@v6
        with:
          path: |
            apps/mobile/.dart_tool
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/mobile/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: ডিপেন্ডেন্সি ইনস্টল
        working-directory: apps/mobile
        run: flutter pub get

      - name: অ্যানালাইস
        id: analyze
        working-directory: apps/mobile
        run: flutter analyze

      - name: টেস্ট
        id: test
        working-directory: apps/mobile
        run: flutter test

      - name: ✅ জব স্ট্যাটাস — PASSED
        if: success()
        id: status-pass
        run: echo "job_status=success" >> $GITHUB_OUTPUT

      - name: 🔧 Auto-Fix Engine (ফেইল হলে)
        if: failure() && github.actor != 'dependabot[bot]'
        id: auto-fix
        env:
          FAILED_JOB: "mobile-analyze"
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          AI_API_PROVIDER: ${{ needs.health-check.outputs.active_provider }}
          SUPREMEAI_API_KEY: ${{ env.SUPREMEAI_API_KEY }}
          SUPREMEAI_API_URL: ${{ env.SUPREMEAI_API_URL }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
        run: |
          python .github/scripts/ci-auto-fix-v3.py \
            --job mobile-analyze \
            --mode fix \
            --run-id "$RUN_ID" \
            --branch "$BRANCH"

      - name: ❌ জব স্ট্যাটাস — FAILED
        if: failure()
        id: status-fail
        run: echo "job_status=failure" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════
  # জব ৫: ওয়েব চ্যাট বিল্ড + EMBEDDED AUTO-FIX
  # ═══════════════════════════════════════════════════════════════
  webchat-build:
    name: 💬 ওয়েব চ্যাট বিল্ড
    runs-on: ubuntu-latest
    needs: [health-check, detect-changes, combine-decisions]
    timeout-minutes: 10
    if: needs.combine-decisions.outputs.webchat_run == 'true'
    outputs:
      job_status: ${{ steps.status.outputs.job_status }}
      fix_applied: ${{ steps.auto-fix.outputs.fix_applied }}
      fix_confidence: ${{ steps.auto-fix.outputs.confidence }}
      fix_branch: ${{ steps.auto-fix.outputs.fix_branch }}
      error_logs: ${{ steps.auto-fix.outputs.error_logs }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: ওয়েব চ্যাট বিল্ড
        id: build
        run: pnpm --filter web-chat run build
        env:
          NODE_ENV: production
          API_URL: ${{ vars.API_URL || 'http://127.0.0.1:8000' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY || '' }}

      - name: বিল্ড আর্টিফ্যাক্ট আপলোড
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: webchat-build
          path: apps/web-chat/dist
          retention-days: 1

      - name: ✅ জব স্ট্যাটাস — PASSED
        if: success()
        id: status-pass
        run: echo "job_status=success" >> $GITHUB_OUTPUT

      - name: 🔧 Auto-Fix Engine (ফেইল হলে)
        if: failure() && github.actor != 'dependabot[bot]'
        id: auto-fix
        env:
          FAILED_JOB: "webchat-build"
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          AI_API_PROVIDER: ${{ needs.health-check.outputs.active_provider }}
          SUPREMEAI_API_KEY: ${{ env.SUPREMEAI_API_KEY }}
          SUPREMEAI_API_URL: ${{ env.SUPREMEAI_API_URL }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
        run: |
          python .github/scripts/ci-auto-fix-v3.py \
            --job webchat-build \
            --mode fix \
            --run-id "$RUN_ID" \
            --branch "$BRANCH"

      - name: ❌ জব স্ট্যাটাস — FAILED
        if: failure()
        id: status-fail
        run: echo "job_status=failure" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════
  # জব ৬: VS Code এক্সটেনশন বিল্ড + EMBEDDED AUTO-FIX
  # ═══════════════════════════════════════════════════════════════
  vscode-build:
    name: 🧩 VS Code এক্সটেনশন বিল্ড
    runs-on: ubuntu-latest
    needs: [health-check, detect-changes, combine-decisions]
    timeout-minutes: 10
    if: needs.combine-decisions.outputs.vscode_run == 'true'
    outputs:
      job_status: ${{ steps.status.outputs.job_status }}
      fix_applied: ${{ steps.auto-fix.outputs.fix_applied }}
      fix_confidence: ${{ steps.auto-fix.outputs.confidence }}
      fix_branch: ${{ steps.auto-fix.outputs.fix_branch }}
      error_logs: ${{ steps.auto-fix.outputs.error_logs }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: এক্সটেনশন বিল্ড
        id: build
        run: pnpm turbo run build --filter=supremeai-vscode

      - name: টেস্ট
        id: test
        run: pnpm turbo run test --filter=supremeai-vscode

      - name: ✅ জব স্ট্যাটাস — PASSED
        if: success()
        id: status-pass
        run: echo "job_status=success" >> $GITHUB_OUTPUT

      - name: 🔧 Auto-Fix Engine (ফেইল হলে)
        if: failure() && github.actor != 'dependabot[bot]'
        id: auto-fix
        env:
          FAILED_JOB: "vscode-build"
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          AI_API_PROVIDER: ${{ needs.health-check.outputs.active_provider }}
          SUPREMEAI_API_KEY: ${{ env.SUPREMEAI_API_KEY }}
          SUPREMEAI_API_URL: ${{ env.SUPREMEAI_API_URL }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
        run: |
          python .github/scripts/ci-auto-fix-v3.py \
            --job vscode-build \
            --mode fix \
            --run-id "$RUN_ID" \
            --branch "$BRANCH"

      - name: ❌ জব স্ট্যাটাস — FAILED
        if: failure()
        id: status-fail
        run: echo "job_status=failure" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════
  # জব ৭: LLM প্রম্পট ইভ্যালুয়েশন
  # ═══════════════════════════════════════════════════════════════
  prompt-eval:
    name: 🤖 LLM প্রম্পট ইভ্যালুয়েশন
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.maintenance_job == 'ai-validation')
    needs: [health-check]
    outputs:
      job_status: ${{ steps.status.outputs.job_status }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Promptfoo ইভ্যালুয়েশন
        id: promptfoo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            npx -y promptfoo@latest eval
          elif [ -n "$GOOGLE_API_KEY" ]; then
            npx -y promptfoo@latest eval --providers "google:gemini-2.5-flash"
          else
            echo "⚠️ No OpenAI or Gemini API key configured. Skipping Promptfoo evaluation."
          fi

      - name: ✅ জব স্ট্যাটাস — PASSED
        if: success()
        id: status-pass
        run: echo "job_status=success" >> $GITHUB_OUTPUT

      - name: ❌ জব স্ট্যাটাস — FAILED
        if: failure()
        id: status-fail
        run: echo "job_status=failure" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: CI REPORT + Auto-Fix Status
  # ═══════════════════════════════════════════════════════════════
  ci-report:
    name: 📊 CI রিপোর্ট ও ড্যাশবোর্ড লগ
    runs-on: ubuntu-latest
    needs: [backend-test, studio-build, mobile-analyze, webchat-build, vscode-build, prompt-eval]
    if: always()
    permissions:
      contents: write
    outputs:
      failed_jobs: ${{ steps.report.outputs.failed_jobs }}
      failed_count: ${{ steps.report.outputs.failed_count }}
      overall_confidence: ${{ steps.report.outputs.overall_confidence }}
      all_critical_passed: ${{ steps.report.outputs.all_critical_passed }}
      any_fix_applied: ${{ steps.report.outputs.any_fix_applied }}
      fix_branches: ${{ steps.report.outputs.fix_branches }}
      fix_error_logs: ${{ steps.report.outputs.fix_error_logs }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 📊 স্মার্ট CI রিপোর্ট জেনারেট
        id: report
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python .github/scripts/generate-ci-report.py

      - name: 📎 CI রিপোর্ট আর্টিফ্যাক্ট আপলোড
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-report
          path: failure-report.md
          retention-days: 1
      - name: 📤 CI লগ রিপোতে কমিট
        if: always() && github.event_name == 'push'
        run: |
          git config user.name "SupremeAI CI Bot"
          git config user.email "ci-bot@supremeai.dev"
          git add -f logs/ci/
          if git diff --cached --quiet; then
            echo "কোনো পরিবর্তন নেই।"
          else
            git commit -m "ci: CI report update [run ${{ github.run_id }}] [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: SUPREMEAI EVALUATOR ⭐ (NEW)
  # ═══════════════════════════════════════════════════════════════
  # সব error logs + fixed code → SupremeAI live API /v1/ci/evaluate
  # Fallback: OpenAI/Gemini দিয়ে cross-validate
  # ═══════════════════════════════════════════════════════════════
  supremeai-evaluator:
    name: 🧠 SupremeAI Evaluator
    runs-on: ubuntu-latest
    needs: [ci-report, health-check]
    if: always() && needs.ci-report.outputs.any_fix_applied == 'true' && github.event.inputs.is_retry != 'true'
    outputs:
      final_confidence: ${{ steps.evaluate.outputs.final_confidence }}
      risk_assessment: ${{ steps.evaluate.outputs.risk_assessment }}
      deploy_recommended: ${{ steps.evaluate.outputs.deploy_recommended }}
      human_review_required: ${{ steps.evaluate.outputs.human_review_required }}
      reasoning: ${{ steps.evaluate.outputs.reasoning }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Python সেটআপ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: SupremeAI Evaluator চালান
        id: evaluate
        env:
          SUPREMEAI_API_URL: ${{ env.SUPREMEAI_API_URL }}
          SUPREMEAI_API_KEY: ${{ env.SUPREMEAI_API_KEY }}
          SUPREMEAI_EVALUATOR_ENDPOINT: ${{ env.SUPREMEAI_EVALUATOR_ENDPOINT }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          AI_API_PROVIDER: ${{ needs.health-check.outputs.active_provider }}
          FAILED_JOBS: ${{ needs.ci-report.outputs.failed_jobs }}
          FIX_BRANCHES: ${{ needs.ci-report.outputs.fix_branches }}
          OVERALL_CONFIDENCE: ${{ needs.ci-report.outputs.overall_confidence }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python .github/scripts/supremeai-evaluator.py

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: DECISION ENGINE ⭐ (NEW)
  # ═══════════════════════════════════════════════════════════════
  # Evaluator result অনুযায়ী: merge / retry / discard / alert
  # ═══════════════════════════════════════════════════════════════
  decision-engine:
    name: ⚖️ Decision Engine
    runs-on: ubuntu-latest
    needs: [ci-report, supremeai-evaluator]
    if: always() && needs.ci-report.outputs.any_fix_applied == 'true' && github.event.inputs.is_retry != 'true'
    permissions:
      contents: write
      actions: write
      issues: write
    outputs:
      decision: ${{ steps.decide.outputs.decision }}
      retry_dispatched: ${{ steps.decide.outputs.retry_dispatched }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: সিদ্ধান্ত ইঞ্জিন
        id: decide
        env:
          FINAL_CONFIDENCE: ${{ needs.supremeai-evaluator.outputs.final_confidence }}
          RISK_ASSESSMENT: ${{ needs.supremeai-evaluator.outputs.risk_assessment }}
          DEPLOY_RECOMMENDED: ${{ needs.supremeai-evaluator.outputs.deploy_recommended }}
          HUMAN_REVIEW: ${{ needs.supremeai-evaluator.outputs.human_review_required }}
          REASONING: ${{ needs.supremeai-evaluator.outputs.reasoning }}
          FAILED_JOBS: ${{ needs.ci-report.outputs.failed_jobs }}
          FIX_BRANCHES: ${{ needs.ci-report.outputs.fix_branches }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_WEBHOOK_URL }}
        run: |
          python .github/scripts/ci-decision-engine.py

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: DEPLOY BACKEND (Sequential, Gated) ⭐
  # ═══════════════════════════════════════════════════════════════
  # শুধু evaluator approved হলে deploy হয়
  # Health check fail হলে backup server এ failover
  # ═══════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 ব্যাকএন্ড Cloud Run এ ডিপ্লয় (Failover Safe)
    runs-on: ubuntu-latest
    needs: [backend-test, ci-report, supremeai-evaluator, decision-engine, health-check]
    if: >-
      github.repository == 'paykaribazaronline/supremeai' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.ci-report.outputs.overall_confidence >= '0.9' &&
      needs.ci-report.outputs.all_critical_passed == 'true' &&
      needs.supremeai-evaluator.outputs.deploy_recommended == 'true' &&
      needs.supremeai-evaluator.outputs.risk_assessment != 'dangerous' &&
      contains(fromJson('["success","skipped"]'), needs['backend-test'].result)
    environment: production
    permissions:
      contents: read
      id-token: write
      packages: write
    outputs:
      deploy_status: ${{ steps.deploy.outputs.deploy_status }}
      deployed_image: ${{ steps.deploy.outputs.deployed_image }}
      main_revision: ${{ steps.deploy.outputs.main_revision }}
      backup_active: ${{ steps.deploy.outputs.backup_active }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: GCP অথেন্টিকেশন
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Cloud SDK সেটআপ
        uses: google-github-actions/setup-gcloud@v3

      - name: Docker Buildx সেটআপ
        uses: docker/setup-buildx-action@v4

      - name: Docker GAR কনফিগার
        run: gcloud auth configure-docker ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev --quiet

      - name: Docker ইমেজ বিল্ড ও পুশ
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:${{ github.sha }}
            ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:latest
          cache-from: type=registry,ref=${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:cache
          cache-to: type=registry,ref=${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:cache,mode=min
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: 🚀 MAIN Cloud Run এ ডিপ্লয় + হেলথচেক + Failover
        id: deploy
        env:
          GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BACKUP_SERVICE_NAME: ${{ env.BACKUP_SERVICE_NAME }}
          BACKUP_REGION: ${{ env.BACKUP_REGION }}
          IMAGE_SHA: ${{ github.sha }}
          SKIP_BACKUP: ${{ github.event.inputs.skip_backup_check || 'true' }}
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_WEBHOOK_URL }}
        run: |
          python .github/scripts/deploy-backend.py

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: DEPLOY STUDIO (Only if main deploy succeeded)
  # ═══════════════════════════════════════════════════════════════
  deploy-studio:
    name: 🎨 স্টুডিও Firebase এ ডিপ্লয়
    runs-on: ubuntu-latest
    needs: [studio-build, deploy-backend, combine-decisions]
    if: >-
      github.repository == 'paykaribazaronline/supremeai' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.deploy-backend.outputs.deploy_status == 'success' &&
      needs.combine-decisions.outputs.studio_run == 'true' &&
      contains(fromJson('["success","skipped"]'), needs['studio-build'].result)
    environment: production
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: স্টুডিও বিল্ড ডাউনলোড
        uses: actions/download-artifact@v8
        with:
          name: studio-build
          path: apps/studio-client/dist

      - name: Firebase এ ডিপ্লয়
        run: |
          npx -y firebase-tools hosting:sites:create supremeai-admin \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --token "${{ secrets.FIREBASE_TOKEN }}" || true
          echo '{"build_run_id": "${{ github.run_id }}", "timestamp": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"}' > apps/studio-client/dist/build-metadata.json
          npx -y firebase-tools deploy --only hosting:supremeai-admin \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --token "${{ secrets.FIREBASE_TOKEN }}" || true

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: DEPLOY WEB CHAT (Only if main deploy succeeded)
  # ═══════════════════════════════════════════════════════════════
  deploy-webchat:
    name: 💬 ওয়েব চ্যাট Firebase এ ডিপ্লয়
    runs-on: ubuntu-latest
    needs: [webchat-build, deploy-backend]
    if: >-
      github.repository == 'paykaribazaronline/supremeai' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.deploy-backend.outputs.deploy_status == 'success' &&
      contains(fromJson('["success","skipped"]'), needs['webchat-build'].result)
    environment: production
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: ওয়েব চ্যাট বিল্ড ডাউনলোড
        uses: actions/download-artifact@v8
        with:
          name: webchat-build
          path: apps/web-chat/dist

      - name: Firebase এ ডিপ্লয়
        run: |
          echo '{"build_run_id": "${{ github.run_id }}", "timestamp": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"}' > apps/web-chat/dist/build-metadata.json
          npx -y firebase-tools deploy --only hosting:supremeai-a \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --token "${{ secrets.FIREBASE_TOKEN }}" || true

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: STAGING DISPATCH (Only if all deploys succeeded)
  # ═══════════════════════════════════════════════════════════════
  staging-dispatch:
    name: 📤 Staging Dispatch
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-studio, deploy-webchat]
    if: >-
      github.repository == 'paykaribazaronline/supremeai' &&
      github.ref == 'refs/heads/main' &&
      needs.deploy-backend.outputs.deploy_status == 'success'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: মিরর রিপোতে পুশ
        if: env.MIRROR_REPO_TOKEN != ''
        env:
          MIRROR_REPO: SaifulHaqueNiloy/supremeai
          MIRROR_REPO_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          echo "Pushing branch ${{ github.ref_name }} to mirror repo"
          git remote add mirror https://x-access-token:${MIRROR_REPO_TOKEN}@github.com/${MIRROR_REPO}.git
          git fetch --depth=1 origin ${{ github.ref_name }}
          git checkout -B ${{ github.ref_name }} origin/${{ github.ref_name }}
          git push mirror ${{ github.ref_name }}:refs/heads/${{ github.ref_name }}

      - name: মেইন রিপোতে ডিসপ্যাচ
        if: github.repository == 'saifulhaqueniloy/supremeai'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.MAIN_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type": "staging-passed", "client_payload": {"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"}}' \
            https://api.github.com/repos/paykaribazaronline/supremeai/dispatches

  # ═══════════════════════════════════════════════════════════════
  # জব ১৪: কনফিগ অডিট (শুধু কনফিগ পরিবর্তন হলে)
  # ═══════════════════════════════════════════════════════════════
  config-audit:
    name: 🔐 কনফিগ অডিট
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.config == 'true'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pip install pyyaml python-dotenv deepdiff

      - name: স্মার্ট কনফিগ অডিট
        id: run-audit
        run: |
          python scripts/supreme-config-audit.py > audit_output.txt
          REPORT_JSON=$(cat audit_report.json | jq -c .)
          echo "report=${REPORT_JSON}" >> $GITHUB_OUTPUT
          HAS_SAFE=$(jq -r '.has_safe_fixes' audit_report.json)
          echo "has_safe_fixes=${HAS_SAFE}" >> $GITHUB_OUTPUT
        env:
          ENVIRONMENTS: "development,staging,production"

      - name: কনফিগ অডিট রিপোর্ট পোস্ট
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('audit_report.json')) {
              const report = JSON.parse(fs.readFileSync('audit_report.json', 'utf8'));
              let body = '## 🔍 SupremeAI Config Audit\n\n';
              if (report.issues && report.issues.length > 0) {
                body += `### ❌ ${report.issues.length} Config Issues\n`;
                report.issues.forEach(i => {
                  body += `- **${i.file}** (${i.risk}): ${i.message} -> Suggestion: ${i.suggestion}\n`;
                });
                if (report.issues.some(i => i.risk === 'CRITICAL' || i.risk === 'HIGH')) {
                  core.setFailed('Critical or High config issues found');
                }
              } else {
                body += '✅ All environment configuration checks passed!\n';
              }
              if (context.issue && context.issue.number) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body
                });
              } else {
                console.log(body);
              }
            }

  # ═══════════════════════════════════════════════════════════════
  # জব ১৫: ডকার গেটকিপার (শুধু Dockerfile পরিবর্তন হলে)
  # ═══════════════════════════════════════════════════════════════
  docker-gatekeeper:
    name: 🐳 ডকার গেটকিপার
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-test]
    if: >-
      always() &&
      needs.detect-changes.outputs.docker == 'true' &&
      contains(fromJson('["success", "skipped"]'), needs.backend-test.result)
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pip install google-generativeai

      - name: লোকাল Docker বিল্ড
        run: docker build -t supremeai-api:test -f Dockerfile .

      - name: AI সাইজ গেটকিপার
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_NAME: "supremeai-api:test"
          MAX_IMAGE_SIZE_MB: "2500"
        run: python scripts/docker_ai_guard.py

      - name: ব্লোট রিপোর্ট PR তে পোস্ট
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('bloat_report.md') && context.issue && context.issue.number) {
              const report = fs.readFileSync('bloat_report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            } else if (fs.existsSync('bloat_report.md')) {
              console.log(fs.readFileSync('bloat_report.md', 'utf8'));
            }

  # ═══════════════════════════════════════════════════════════════
  # জব ১৬: ক্যাশ ক্লিনআপ
  # ═══════════════════════════════════════════════════════════════
  cache-cleanup:
    name: 🧹 CI ক্যাশ ক্লিনআপ
    runs-on: ubuntu-latest
    needs: [backend-test, studio-build, mobile-analyze, webchat-build, vscode-build]
    if: always() && github.event_name == 'push'
    permissions:
      actions: write
    steps:
      - name: পুরনো ক্যাশ পরিষ্কার
        run: |
          echo "🧹 পুরনো ক্যাশ পরিষ্কার করা হচ্ছে..."

  # ═══════════════════════════════════════════════════════════════
  # MAINTENANCE JOBS
  # ═══════════════════════════════════════════════════════════════
  ai-code-review:
    name: 🤖 Scheduled AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 */8 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.maintenance_job == 'ai-code-review')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pip install google-generativeai
      - name: Gemini Code Review
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_FREE_API_KEY: ${{ secrets.GEMINI_FREE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python .github/scripts/review.py

  ai-validation:
    name: 🧪 Nightly AI Validation (DeepEval)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.maintenance_job == 'ai-validation')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pip install deepeval google-generativeai openai
      - name: DeepEval Validation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python .github/scripts/test_ai_reviewer.py

  cleanup-cloud:
    name: 🧹 Cloud Run Revision Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.maintenance_job == 'cleanup-runs')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: >-
            projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: পুরনো Cloud Run revision ডিলিট
        run: |
          gcloud run revisions list \
            --service=supremeai-api \
            --region=${{ secrets.GCP_REGION }} \
            --format="value(name)" \
            --sort-by="~createTime" | tail -n +6 | \
            xargs -r -I {} gcloud run revisions delete {} \
            --region=${{ secrets.GCP_REGION }} --quiet
          echo "✅ Cloud Run revision cleanup done"
      - name: পুরনো GCR ইমেজ ডিলিট
        run: |
          gcloud container images list-tags \
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/supremeai-api \
            --format='value(digest)' --limit=999999 | tail -n +11 | \
            xargs -r -I {} gcloud container images delete \
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/supremeai-api@{} --quiet
          echo "✅ GCR image cleanup done"

  cache-maintenance:
    name: 🗂️ GitHub Actions Cache Prune
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.maintenance_job == 'cache-maintenance')
    steps:
      - name: পুরনো ক্যাশ পরিষ্কার
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CACHES=$(gh cache list \
            --repo ${{ github.repository }} \
            --json id,key,createdAt,sizeInBytes \
            --limit 100 2>/dev/null || echo "[]")
          TOTAL=$(echo "$CACHES" | jq 'length')
          SIZE=$(echo "$CACHES" | jq '[.[].sizeInBytes] | add // 0')
          echo "📊 Total caches: $TOTAL, Size: $(echo "scale=2; $SIZE/1073741824" | bc) GB"
          CUTOFF=$(date -d '14 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || \
            date -v-14d +%Y-%m-%dT%H:%M:%S 2>/dev/null || echo "")
          if [ -n "$CUTOFF" ]; then
            echo "$CACHES" | jq -r --arg c "$CUTOFF" \
              '.[] | select(.createdAt < $c) | "\(.id)\t\(.key)"' | \
              while IFS=$'\t' read -r id key; do
                [ -n "$id" ] && [ "$id" != "null" ] && \
                echo " 🗑️ Deleting: $key" && \
                gh cache delete "$id" --repo ${{ github.repository }} 2>/dev/null || true
              done
          fi
          echo "$CACHES" | jq -r '.[] | select(.key | startswith("poetry-")) | "\(.id)\t\(.key)"' | \
            while IFS=$'\t' read -r id key; do
              [ -n "$id" ] && [ "$id" != "null" ] && \
              echo " 🗑️ Old poetry cache: $key" && \
              gh cache delete "$id" --repo ${{ github.repository }} 2>/dev/null || true
            done
          echo "✅ Cache prune complete"

  # ═══════════════════════════════════════════════════════════════
  # CD JOBS: Build artifacts (only on tag or manual trigger)
  # ═══════════════════════════════════════════════════════════════
  build-apk:
    name: 📱 Generate Flutter APK
    runs-on: ubuntu-latest
    needs: [detect-changes, combine-decisions, mobile-analyze]
    if: >-
      always() &&
      contains(fromJson('["success", "skipped"]'), needs.mobile-analyze.result) &&
      (needs.combine-decisions.outputs.mobile_run == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_artifacts == 'true')
    steps:
      - uses: actions/checkout@v7
      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      # Gradle ক্যাশ — বারবার ডিপেন্ডেন্সি ডাউনলোড এড়াতে ক্যাশ ব্যবহার করা হচ্ছে
      - name: Gradle ক্যাশ
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/pubspec.lock') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: ডিপেন্ডেন্সি ইনস্টল
        working-directory: apps/mobile
        run: flutter pub get

      # শুধু arm64 (আধুনিক ফোন) এর জন্য APK বিল্ড — বিল্ড টাইম প্রায় ৪০% কমায়
      - name: Android APK বিল্ড (arm64 only)
        working-directory: apps/mobile
        run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: APK আর্টিফ্যাক্ট আপলোড
        uses: actions/upload-artifact@v7
        with:
          name: supremeai-mobile-apk
          path: apps/mobile/build/app/outputs/flutter-apk/*arm64*.apk
          retention-days: 1

  build-vsix:
    name: 🧩 Generate VS Code VSIX
    runs-on: ubuntu-latest
    needs: [detect-changes, combine-decisions, vscode-build]
    if: >-
      always() &&
      contains(fromJson('["success", "skipped"]'), needs.vscode-build.result) &&
      (needs.combine-decisions.outputs.vscode_run == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_artifacts == 'true')
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pnpm install --frozen-lockfile
      - name: VS Code এক্সটেনশন বিল্ড
        run: pnpm turbo run build --filter=supremeai-vscode
      - name: VSIX প্যাকেজ
        working-directory: tools/vscode-extension
        run: npx @vscode/vsce package --no-dependencies
      - name: VSIX আর্টিফ্যাক্ট আপলোড
        uses: actions/upload-artifact@v7
        with:
          name: supremeai-vscode-vsix
          path: tools/vscode-extension/*.vsix
          retention-days: 1

  build-windows-exe:
    name: 🪟 Generate Windows EXE
    runs-on: windows-latest
    needs: [detect-changes, combine-decisions, studio-build]
    if: >-
      always() &&
      contains(fromJson('["success", "skipped"]'), needs.studio-build.result) &&
      (needs.combine-decisions.outputs.studio_run == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_artifacts == 'true')
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      # নেটওয়ার্ক কল কমাতে --prefer-offline ব্যবহার করা হচ্ছে
      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: স্টুডিও ক্লায়েন্ট বিল্ড
        run: pnpm turbo run build --filter=supremeai-studio-client

      # pnpm exec ব্যবহার করা হচ্ছে যাতে electron-builder সঠিকভাবে pnpm ডিটেক্ট করে
      # npx ব্যবহার করলে npm ফলব্যাক হয় এবং ডুপ্লিকেট ডিপেন্ডেন্সি সমস্যা হয়
      - name: Electron EXE বিল্ড
        working-directory: apps/studio-client
        run: pnpm exec electron-builder --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Windows EXE আর্টিফ্যাক্ট আপলোড
        uses: actions/upload-artifact@v7
        with:
          name: supremeai-studio-windows-exe
          path: apps/studio-client/dist/*.exe
          retention-days: 1

  log-cleanup:
    name: 🧹 GitHub Actions Log Cleaner
    runs-on: ubuntu-latest
    needs: [health-check]
    if: github.event_name == 'schedule'
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Python সেটআপ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pip install requests
      - name: একশন লগ ক্লিনআপ রান
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/clean_action_logs.py
