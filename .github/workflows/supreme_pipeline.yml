---
name: SupremeAI_Master_Pipeline

on:
  push:
    branches: ["main", "develop"]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_run_all:
        description: 'Force run all jobs regardless of changes'
        required: false
        default: 'false'
        type: boolean
      retry_failed_jobs:
        description: 'Retry only failed jobs from previous run'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect_Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      actions: read
    outputs:
      backend: "${{ steps.filter.outputs.backend }}"
      frontend: "${{ steps.filter.outputs.frontend }}"
      plugin: "${{ steps.filter.outputs.plugin }}"
      vscode_extension: "${{ steps.filter.outputs.vscode_extension }}"
      any_changes: "${{ steps.filter.outputs.any_changes }}"
      failed_jobs: "${{ steps.get-failed.outputs.failed_jobs }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get_Last_Successful_Commit
        id: last_success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_SHA=$(gh api repos/${{ github.repository }}/actions/workflows/supreme_pipeline.yml/runs?status=success\&branch=${{ github.ref_name }} -q '.workflow_runs | if length > 0 then .[0].head_sha else "" end' || echo "")
          if [ -z "$LAST_SHA" ] || [ "$LAST_SHA" == "null" ]; then
            echo "base=${{ github.event.before || github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "base=$LAST_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          base: ${{ steps.last_success.outputs.base }}
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'build.gradle*'
              - '.github/workflows/supreme_pipeline.yml'
              - 'gradle.properties'
              - 'settings.gradle*'
              - '**/*.gradle*'
            frontend:
              - 'supremeai/**'
              - 'supremeai/firebase.json'
              - '.github/workflows/supreme_pipeline.yml'
            plugin:
              - 'supremeai-intellij-plugin/**'
              - '.github/workflows/supreme_pipeline.yml'
            vscode_extension:
              - 'supremeai-vscode-extension/**'
              - '.github/workflows/supreme_pipeline.yml'

      - name: Get_Failed_Jobs_From_Previous_Run
        id: get-failed
        if: github.event.inputs.retry_failed_jobs == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the most recent workflow run (excluding current)
          PREVIOUS_RUN=$(gh api repos/${{ github.repository }}/actions/workflows/supreme_pipeline.yml/runs?branch=${{ github.ref_name }}\&per_page=5 -q '.workflow_runs | map(select(.status == "completed" and .id != ${{ github.run_id }})) | .[0]')
          PREVIOUS_ID=$(echo "$PREVIOUS_RUN" | jq -r '.id // empty')

          if [ -z "$PREVIOUS_ID" ]; then
            echo "No previous run found"
            echo "failed_jobs=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get failed jobs from previous run
          FAILED_JOBS=$(gh api repos/${{ github.repository }}/actions/runs/$PREVIOUS_ID/jobs -q '.jobs | map(select(.conclusion == "failure")) | map(.name) | join(",")')
          echo "Previous run ID: $PREVIOUS_ID"
          echo "Failed jobs: $FAILED_JOBS"
          echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT

  secret-scan:
    name: Secret_Scanning
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Secret_Scan
        uses: trufflesecurity/trufflehog@v3.80.1
        with:
          path: "./"
          extra_args: "--only-verified"

  codeql:
    name: CodeQL_Analysis
    needs: [changes]
    if: >-
      ${{ 
        github.event_name != 'pull_request' && 
        ((github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
         needs.changes.outputs.backend == 'true') 
      }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate_Gradle_Wrapper
        uses: gradle/actions/wrapper-validation@v3
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: CodeQL_Init
        uses: github/codeql-action/init@v3
        with:
          languages: "java"
          build-mode: "manual"
      - name: Clean_Build_For_CodeQL
        run: |
          ./gradlew clean compileJava
        
      - name: Run_CodeQL
        uses: github/codeql-action/analyze@v3

  java-build-and-test:
    name: Java_Build_And_Test
    needs: [changes, secret-scan]
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
        needs.changes.outputs.backend == 'true' ||
        (github.event.inputs.retry_failed_jobs == 'true' && contains(needs.changes.outputs.failed_jobs, 'Java_Build_And_Test'))
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Grant_Execute_Permission
        run: chmod +x gradlew
      - name: Build_And_Test
        run: |
          echo "Starting Java build process..."
          ./gradlew clean bootJar --no-daemon --stacktrace
          # The bootJar task now outputs app.jar directly, ensure it exists
          if [ ! -f "build/libs/app.jar" ]; then
            echo "Error: app.jar not found in build/libs"
            ls -R build/libs
            echo "Build logs:"
            cat build/reports/build/build.log || echo "No build log found"
            exit 1
          else
            echo "Successfully built app.jar"
          fi
      - name: Generate_Coverage_Report
        run: ./gradlew jacocoTestReport
      - name: Upload_JAR
        uses: actions/upload-artifact@v4
        with:
          name: java-backend-jar
          path: build/libs/app.jar
          retention-days: 7
          if-no-files-found: error
      - name: Upload_Coverage_To_Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      - name: Upload_Test_Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          retention-days: 7
          path: build/test-results/test/
      - name: Upload_Coverage_Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          retention-days: 7
          path: build/reports/jacoco/test/

  flutter-build-and-test:
    name: Flutter_Build_And_Test
    needs: [changes, secret-scan]
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
        needs.changes.outputs.frontend == 'true' ||
        (github.event.inputs.retry_failed_jobs == 'true' && contains(needs.changes.outputs.failed_jobs, 'Flutter_Build_And_Test'))
      }}
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.set-paths.outputs.frontend_url }}
      apk_path: ${{ steps.set-paths.outputs.apk_path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Flutter_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool/flutter_build
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-
      - name: Setup_Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          cache: true
      - name: Get_Flutter_Dependencies
        working-directory: ./supremeai
        run: flutter pub get
      - name: Run_Tests
        working-directory: ./supremeai
        run: flutter test
      - name: Build_Web
        working-directory: ./supremeai
        run: flutter build web --release
      - name: Upload_Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-artifacts
          retention-days: 7
          path: |
            supremeai/build/web
            !**/**.map
          if-no-files-found: warn
      - name: Store_Artifact_Paths
        id: set-paths
        run: |
          echo "frontend_url=https://supremeai-a.web.app/" >> $GITHUB_OUTPUT

  plugin-build:
    name: Plugin_Build
    needs: [changes, secret-scan]
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
        needs.changes.outputs.plugin == 'true' ||
        (github.event.inputs.retry_failed_jobs == 'true' && contains(needs.changes.outputs.failed_jobs, 'Plugin_Build'))
      }}
    runs-on: ubuntu-latest
    outputs:
      plugin_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_Plugin
        run: "./gradlew :supremeai-intellij-plugin:buildPlugin"
      - name: Upload_Plugin_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supremeai-intellij-plugin
          retention-days: 7
          path: supremeai-intellij-plugin/build/distributions/*.zip
      - name: Store_Plugin_Path
        id: set-path
        run: echo "path=supremeai-intellij-plugin/build/distributions/*.zip" >> $GITHUB_OUTPUT

  vscode-extension-build:
    name: VSCode_Extension_Build
    needs: [changes, secret-scan]
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
        needs.changes.outputs.vscode_extension == 'true' ||
        (github.event.inputs.retry_failed_jobs == 'true' && contains(needs.changes.outputs.failed_jobs, 'VSCode_Extension_Build'))
      }}
    runs-on: ubuntu-latest
    outputs:
      vsix_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install_Dependencies
        working-directory: ./supremeai-vscode-extension
        run: npm install
      - name: Compile
        working-directory: ./supremeai-vscode-extension
        run: npm run compile
      - name: Upload_VSIX_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supremeai-vscode-extension
          retention-days: 7
          path: supremeai-vscode-extension/*.vsix
      - name: Store_VSIX_Path
        id: set-path
        run: echo "path=supremeai-vscode-extension/*.vsix" >> $GITHUB_OUTPUT

  deploy-backend:
    name: Deploy_Backend
    needs: [changes, java-build-and-test]
    if: >-
      ${{
        github.ref == 'refs/heads/main' &&
        ((github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
         needs.changes.outputs.backend == 'true' ||
         (github.event.inputs.retry_failed_jobs == 'true' && contains(needs.changes.outputs.failed_jobs, 'Deploy_Backend')))
      }}
    runs-on: ubuntu-latest
    outputs:
      admin_url: ${{ steps.set-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download_JAR
        uses: actions/download-artifact@v4
        with:
          name: java-backend-jar
          path: build/libs
      - name: Verify_JAR
        run: |
          echo "Verifying JAR download..."
          ls -la build/libs
          if [ -f "build/libs/app.jar" ]; then
            echo "✅ app.jar found, copying to repo root"
            cp build/libs/app.jar ./app.jar
            echo "✅ Copied to ./app.jar"
          else
            echo "❌ app.jar NOT found in build/libs"
            ls -R build/libs
            exit 1
          fi
      - name: Authenticate_GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
      - name: Setup_GCloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Verify_GCloud
        run: |
          echo "GCloud version:"
          gcloud --version
          echo "Authenticated project:"
          gcloud config get-value project
      - name: Build_And_Push_Container
        run: |
          BUILD_ID=$(gcloud builds submit --tag us-central1-docker.pkg.dev/supremeai-a/supremeai-repo/supremeai --async --format="value(id)")
          echo "Build started with ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --format="value(status)")
            echo "Current build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build completed successfully!"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
             fi
             sleep 10
           done

      - name: Deploy_To_Cloud_Run
        run: |
           echo "Starting Cloud Run deployment..."
           gcloud run deploy supremeai \
             --image us-central1-docker.pkg.dev/supremeai-a/supremeai-repo/supremeai \
             --platform managed \
             --region us-central1 \
             --allow-unauthenticated \
             --memory 4Gi \
             --cpu 2 \
             --timeout 600 \
             --set-env-vars="SPRING_PROFILES_ACTIVE=cloud,FIREBASE_PROJECT_ID=supremeai-a,spring.threads.virtual.enabled=true,GROQ_API_KEY=${GROQ_API_KEY_DEPLOYMENT_MONITOR:-${{ secrets.GROQ_API_KEY_DEPLOYMENT_MONITOR }}}" \
             --update-secrets FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account-json:latest,JWT_SECRET=jwt-secret:latest,GROQ_API_KEY=groq-api-key:latest \
             --max-instances 10 \
             --concurrency 80 \
             --quiet
           echo "Cloud Run deployment completed successfully."
      - name: Store_Admin_URL
        id: set-url
        run: |
          URL=$(gcloud run services describe supremeai --platform managed --region us-central1 --format='value(status.url)')
          echo "url=$URL/admin.html" >> $GITHUB_OUTPUT
      - name: Show_Logs_On_Failure
        if: failure()
        run: |
          echo "Fetching latest Cloud Run logs for troubleshooting..."
          gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=supremeai" --limit 50

  deploy-frontend:
    name: Deploy_Frontend
    needs: [changes, flutter-build-and-test]
    if: >-
      ${{
        github.ref == 'refs/heads/main' &&
        ((github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
         needs.changes.outputs.frontend == 'true' ||
         (github.event.inputs.retry_failed_jobs == 'true' && contains(needs.changes.outputs.failed_jobs, 'Deploy_Frontend')))
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download_Web
        uses: actions/download-artifact@v4
        with:
          name: flutter-artifacts
          path: supremeai/build/web
      - name: Authenticate_GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
          project_id: "supremeai-a"
      - name: Setup_Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install_Firebase_Tools
        run: npm install -g firebase-tools
      - name: Deploy_Firebase_Hosting
        run: |
          echo "Starting Firebase hosting deployment..."
          firebase deploy --project supremeai-a --only hosting --non-interactive
          echo "Firebase hosting deployment completed successfully."
      - name: Set_Working_Directory
        run: echo "WORK_DIR=./supremeai" >> $GITHUB_ENV

  workflow-summary:
    name: Workflow_Summary
    needs: [java-build-and-test, flutter-build-and-test, plugin-build, vscode-extension-build, deploy-backend, deploy-frontend, deploy-cloud-functions, health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate_Summary
        run: |
            echo "### Workflow Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            echo "| ☕ Java Backend | ${{ needs.java-build-and-test.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 📱 Flutter Frontend | ${{ needs.flutter-build-and-test.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔌 IntelliJ Plugin | ${{ needs.plugin-build.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 💻 VS Code Ext | ${{ needs.vscode-extension-build.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| ☁️ Deploy Backend | ${{ needs.deploy-backend.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 🌍 Deploy Frontend | ${{ needs.deploy-frontend.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚡ Cloud Functions | ${{ needs.deploy-cloud-functions.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 🏥 Health Check | ${{ needs.health-check.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "**Admin Dashboard:** ${{ needs.deploy-backend.outputs.admin_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY

  health-check:
    name: Health_Check
    needs: [deploy-backend, deploy-frontend]
    if: ${{ always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
       - name: Check_Deployment_Status
         id: status-check
         run: |
           FAILED=false
           echo "Checking frontend status..."
           if ! curl -sf https://supremeai-a.web.app/; then
             echo "frontend_failed=true" >> $GITHUB_ENV
             FAILED=true
           fi
           echo "Checking backend health endpoint..."
           if ! curl -sf https://supremeai-lhlwyikwlq-uc.a.run.app/api/health; then
             echo "backend_failed=true" >> $GITHUB_ENV
             FAILED=true
           fi
           if [ "$FAILED" = "true" ]; then
             exit 1
           fi
       - name: Rollback_On_Failure
         if: failure()
         run: |
           echo "### 🚨 Deployment Failure Detected! ###"
           if [ "$backend_failed" = "true" ]; then
             echo "Triggering rollback for backend..."
             # Uncomment to enable auto-rollback:
             # gcloud run services rollback supremeai --platform managed --region us-central1 --quiet
           fi
           if [ "$frontend_failed" = "true" ]; then
             echo "Triggering rollback for frontend..."
             # Uncomment to enable auto-rollback:
             # firebase hosting:rollback --project supremeai-a --quiet
           fi
           echo "Rollback initiated. Check logs for details."

  deploy-cloud-functions:
    name: Deploy_Cloud_Functions
    needs: [changes, secret-scan]
    if: >-
       ${{
         github.ref == 'refs/heads/main' &&
         ((github.event_name == 'workflow_dispatch' && github.event.inputs.force_run_all == 'true') ||
          needs.changes.outputs.backend == 'true' ||
          (github.event.inputs.retry_failed_jobs == 'true' && contains(needs.changes.outputs.failed_jobs, 'Deploy_Cloud_Functions')))
       }}
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v4
       - name: Setup_Node
         uses: actions/setup-node@v4
         with:
           node-version: "20"
       - name: Install_Firebase_Tools
         run: npm install -g firebase-tools
       - name: Authenticate_GCP
         uses: google-github-actions/auth@v2
         with:
           credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
           project_id: "supremeai-a"
       - name: Set_Function_Config
         run: |
           # Set Groq API key as function config (encrypted)
           firebase functions:config:set groq.api_key="${{ secrets.GROQ_API_KEY_DEPLOYMENT_MONITOR }}" --project supremeai-a
         continue-on-error: true  # Continue even if config set fails (might be pre-configured)
       - name: Deploy_Functions
         run: |
           cd functions
           npm install
           firebase deploy --project supremeai-a --only functions --non-interactive
         working-directory: ./functions

  notify:
    name: Notification
    needs: [java-build-and-test, flutter-build-and-test, plugin-build, vscode-extension-build, deploy-backend, deploy-frontend, deploy-cloud-functions, health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send_Webhook_To_Admin_Dashboard
        env:
          SUPREMEAI_WEBHOOK_SECRET: ${{ secrets.SUPREMEAI_WEBHOOK_SECRET }}
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            STATUS="failure"
          else
            STATUS="success"
          fi
          curl -X POST https://supremeai-lhlwyikwlq-uc.a.run.app/api/webhooks/github \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $SUPREMEAI_WEBHOOK_SECRET" \
            -d "{\"status\": \"$STATUS\", \"runId\": \"$GITHUB_RUN_ID\", \"repo\": \"$GITHUB_REPOSITORY\"}"

      - name: Status_Update
        if: always()
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "Pipeline failed! Check the summary for details."
            exit 1
          else
            echo "All deployments successful!"
          fi
