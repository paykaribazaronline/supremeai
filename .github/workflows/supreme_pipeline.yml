name: SupremeAI_Master_Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Cache keys for better cache hits
  GRADLE_CACHE_KEY: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/build.gradle.kts') }}
  NPM_CACHE_KEY: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
  FLUTTER_CACHE_KEY: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect_Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: "${{ steps.filter.outputs.backend }}"
      frontend: "${{ steps.filter.outputs.frontend }}"
      plugin: "${{ steps.filter.outputs.plugin }}"
      vscode_extension: "${{ steps.filter.outputs.vscode_extension }}"
      workflow_backend: "${{ steps.filter.outputs.workflow_backend }}"
      workflow_frontend: "${{ steps.filter.outputs.workflow_frontend }}"
      workflow_plugin: "${{ steps.filter.outputs.workflow_plugin }}"
      workflow_vscode_extension: "${{ steps.filter.outputs.workflow_vscode_extension }}"
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'build.gradle*'
            frontend:
              - 'supremeai/**'
              - 'supremeai/firebase.json'
            plugin:
              - 'supremeai-intellij-plugin/**'
            vscode_extension:
              - 'supremeai-vscode-extension/**'
            workflow_backend:
              - '.github/workflows/supreme_pipeline.yml'
              - 'cloudbuild.yaml'
              - 'Dockerfile'
            workflow_frontend:
              - '.github/workflows/supreme_pipeline.yml'
              - 'supremeai/firebase.json'
            workflow_plugin:
              - '.github/workflows/supreme_pipeline.yml'
            workflow_vscode_extension:
              - '.github/workflows/supreme_pipeline.yml'

  # Run security scans EARLY and IN PARALLEL
  secret-scan:
    name: Secret_Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Secret_Scan
        uses: trufflesecurity/trufflehog@v3.80.1
        with:
          path: "./"
          extra_args: "--only-verified"

  codeql:
    name: CodeQL_Analysis
    needs: [changes]
    if: github.event_name != 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow_backend == 'true')
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: CodeQL_Init
        uses: github/codeql-action/init@v4
        with:
          languages: "java"
          build-mode: "none"
      - name: Run_CodeQL
        uses: github/codeql-action/analyze@v4

  # ALL BUILD JOBS RUN IN PARALLEL - NO UNNECESSARY DEPENDENCIES
  java-build-and-test:
    name: Java_Build_And_Test
    needs: [changes, secret-scan]
    if: github.event_name == 'push' || (needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow_backend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Gradle_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.GRADLE_CACHE_KEY }}
          restore-keys: |
            ${{ env.GRADLE_CACHE_KEY }}
      - name: Setup_Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_And_Test
        run: "./gradlew build -x jacocoTestCoverageVerification"
      - name: Upload_JAR
        uses: actions/upload-artifact@v6
        with:
          name: java-backend-jar
          path: "build/libs/*.jar"

  flutter-build-and-test:
    name: Flutter_Build_And_Test
    needs: [changes, secret-scan]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow_frontend == 'true'
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.set-paths.outputs.frontend_url }}
      apk_path: ${{ steps.set-paths.outputs.apk_path }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Flutter_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool/flutter_build
          key: ${{ env.FLUTTER_CACHE_KEY }}
          restore-keys: |
            ${{ env.FLUTTER_CACHE_KEY }}
      - name: Setup_Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          cache: true
      - name: Get_Flutter_Dependencies
        working-directory: ./supremeai
        run: flutter pub get
      - name: Run_Tests
        working-directory: ./supremeai
        run: flutter test
      - name: Build_Web
        working-directory: ./supremeai
        run: flutter build web --release
      - name: Build_APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: ./supremeai
        run: flutter build apk --release --target-platform android-arm64 --split-debug-info=./debug-info
      - name: Upload_Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: flutter-artifacts
          path: |
            supremeai/build/web
            !**/**.map
          if-no-files-found: warn
      - name: Upload_APK_Artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: supremeai-android-apk
          path: supremeai/build/app/outputs/flutter-apk/app-release.apk
      - name: Store_Artifact_Paths
        id: set-paths
        run: |
          echo "frontend_url=https://supremeai-a.web.app/" >> $GITHUB_OUTPUT
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "apk_path=supremeai/build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "apk_path=N/A" >> $GITHUB_OUTPUT
          fi

  plugin-build:
    name: Plugin_Build
    needs: [changes, secret-scan]
    if: needs.changes.outputs.plugin == 'true' || needs.changes.outputs.workflow_plugin == 'true'
    runs-on: ubuntu-latest
    outputs:
      plugin_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Gradle_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.GRADLE_CACHE_KEY }}-plugin
          restore-keys: |
            ${{ env.GRADLE_CACHE_KEY }}-plugin
      - name: Setup_Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_Plugin
        run: "./gradlew :supremeai-intellij-plugin:buildPlugin"
      - name: Upload_Plugin_Artifact
        uses: actions/upload-artifact@v6
        with:
          name: supremeai-intellij-plugin
          path: supremeai-intellij-plugin/build/distributions/*.zip
      - name: Store_Plugin_Path
        id: set-path
        run: echo "path=supremeai-intellij-plugin/build/distributions/*.zip" >> $GITHUB_OUTPUT

  vscode-extension-build:
    name: VSCode_Extension_Build
    needs: [changes, secret-scan]
    if: needs.changes.outputs.vscode_extension == 'true' || needs.changes.outputs.workflow_vscode_extension == 'true'
    runs-on: ubuntu-latest
    outputs:
      vsix_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Node_Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ env.NPM_CACHE_KEY }}-vscode
          restore-keys: |
            ${{ env.NPM_CACHE_KEY }}-vscode
      - name: Setup_Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "supremeai-vscode-extension/package-lock.json"
      - name: Install_Dependencies
        working-directory: ./supremeai-vscode-extension
        run: npm ci
      - name: Lint_and_Compile
        working-directory: ./supremeai-vscode-extension
        run: |
          npm run lint
          npm run compile
      - name: Package_Extension
        working-directory: ./supremeai-vscode-extension
        run: npx vsce package --no-git-tag-version
      - name: Upload_VSIX_Artifact
        uses: actions/upload-artifact@v6
        with:
          name: supremeai-vscode-extension
          path: supremeai-vscode-extension/*.vsix
      - name: Store_VSIX_Path
        id: set-path
        run: echo "path=supremeai-vscode-extension/*.vsix" >> $GITHUB_OUTPUT

  # DEPLOYMENTS RUN IN PARALLEL - BACKEND AND FRONTEND AT SAME TIME
  deploy-backend:
    name: Deploy_Backend
    needs: [java-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.java-build-and-test.result == 'success'
    outputs:
      admin_url: ${{ steps.set-url.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - name: Authenticate_GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
      - name: Setup_GCloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Deploy_Backend_To_Cloud_Run
        id: build
        run: |
          # Retry deployment up to 2 times
          for i in {1..2}; do
            BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml --async --format='value(id)') && break
            if [ $i -lt 2 ]; then
              echo "Deployment attempt $i failed, retrying in 15 seconds..."
              sleep 15
            else
              echo "All deployment attempts failed" >&2
              exit 1
            fi
          done
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          # Wait for build completion with timeout
          set +e
          gcloud builds wait $BUILD_ID --timeout=1200s
          set -e
      - name: Store_Admin_URL
        id: set-url
        run: |
          # Retry getting service URL up to 5 times
          for i in {1..5}; do
            if URL=$(gcloud run services describe supremeai --platform managed --region us-central1 --format='value(status.url)' 2>/dev/null); then
              echo "url=$URL/admin.html" >> $GITHUB_OUTPUT
              echo "Successfully retrieved service URL: $URL"
              exit 0
            fi
            if [ $i -lt 5 ]; then
              echo "Attempt $i failed, retrying in 10 seconds..."
              sleep 10
            fi
          done
          echo "Failed to get service URL after 5 attempts" >&2
          exit 1
      - name: Show_Cloud_Build_Logs
        if: failure()
        run: |
          echo "Fetching latest Cloud Build logs..."
          BUILD_ID=${{ steps.build.outputs.build_id }}
          gcloud builds log $BUILD_ID --project=supremeai-a --limit=100 || echo "Could not fetch build logs"

  deploy-frontend:
    name: Deploy_Frontend
    needs: [flutter-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.flutter-build-and-test.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Download_Web
        uses: actions/download-artifact@v6
        with:
          name: flutter-artifacts
          path: supremeai/build/web
      - name: Authenticate_GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
          project_id: "supremeai-a"
      - name: Setup_Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Deploy_Firebase_Hosting
        run: npx firebase-tools@latest deploy --project supremeai-a --only hosting --non-interactive
        working-directory: ./supremeai

  # Summary and notification jobs
  workflow-summary:
    name: Workflow_Summary
    needs: [deploy-backend, deploy-frontend, plugin-build, vscode-extension-build, flutter-build-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate_Summary
        run: |
          echo "### Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Admin Dashboard URL:** ${{ needs.deploy-backend.outputs.admin_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Customer App URL:** ${{ needs.flutter-build-and-test.outputs.frontend_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK Path:** `${{ needs.flutter-build-and-test.outputs.apk_path || 'N/A' }}`" >> $GITHUB_STEP_SUMMARY
          echo "**Plugin Path:** `${{ needs.plugin-build.outputs.plugin_path || 'N/A' }}`" >> $GITHUB_STEP_SUMMARY
          echo "**VS Code Extension Path:** `${{ needs.vscode-extension-build.outputs.vsix_path || 'N/A' }}`" >> $GITHUB_STEP_SUMMARY

  health-check:
    name: Health_Check
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check_Status
        run: |
          echo "Checking frontend status..."
          curl -sf https://supremeai-a.web.app/ || echo 'Frontend site check failed or skipped'
          echo "Checking backend status..."
          ADMIN_URL="${{ needs.deploy-backend.outputs.admin_url }}"
          if [ -n "$ADMIN_URL" ] && [ "$ADMIN_URL" != "N/A" ]; then
            BACKEND_URL=$(echo "$ADMIN_URL" | sed 's/\/admin\.html$//')
            curl -sf "$BACKEND_URL/actuator/health" || echo 'Backend health check failed or skipped'
          else
            echo 'Backend URL not available for health check'
          fi

  notify:
    name: Notification
    needs: [health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Status_Update
        run: |
          HEALTH_STATUS="${{ needs.health-check.result }}"
          echo "Deployment process completed with health check status: $HEALTH_STATUS"
          if [ "$HEALTH_STATUS" = "success" ]; then
            echo "✅ All deployments successful!"
          else
            echo "⚠️ Deployment completed with some issues. Check logs for details."
          fi