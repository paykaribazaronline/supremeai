name: SupremeAI_Master_Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect_Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: "${{ steps.filter.outputs.backend }}"
      frontend: "${{ steps.filter.outputs.frontend }}"
      plugin: "${{ steps.filter.outputs.plugin }}"
      vscode_extension: "${{ steps.filter.outputs.vscode_extension }}"
      workflow_backend: "${{ steps.filter.outputs.workflow_backend }}"
      workflow_frontend: "${{ steps.filter.outputs.workflow_frontend }}"
      workflow_plugin: "${{ steps.filter.outputs.workflow_plugin }}"
      workflow_vscode_extension: "${{ steps.filter.outputs.workflow_vscode_extension }}"
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'build.gradle*'
            frontend:
              - 'supremeai/**'
              - 'supremeai/firebase.json'
            plugin:
              - 'supremeai-intellij-plugin/**'
            vscode_extension:
              - 'supremeai-vscode-extension/**'
            workflow_backend:
              - '.github/workflows/supreme_pipeline.yml'
              - 'cloudbuild.yaml'
              - 'Dockerfile'
            workflow_frontend:
              - '.github/workflows/supreme_pipeline.yml'
              - 'supremeai/firebase.json'
            workflow_plugin:
              - '.github/workflows/supreme_pipeline.yml'
            workflow_vscode_extension:
              - '.github/workflows/supreme_pipeline.yml'

  codeql:
    name: CodeQL_Analysis
    needs: [changes]
    if: github.event_name != 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow_backend == 'true')
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: CodeQL_Init
        uses: github/codeql-action/init@v3
        with:
          languages: "java"
          build-mode: "none"
      - name: Run_CodeQL
        uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Secret_Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Secret_Scan
        uses: trufflesecurity/trufflehog@v3.80.1
        with:
          path: "./"
          extra_args: "--only-verified"

  plugin-build:
    name: Plugin_Build
    needs: [changes, secret-scan]
    if: needs.changes.outputs.plugin == 'true' || needs.changes.outputs.workflow_plugin == 'true'
    runs-on: ubuntu-latest
    outputs:
      plugin_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_Plugin
        run: "./gradlew :supremeai-intellij-plugin:buildPlugin"
      - name: Upload_Plugin_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supremeai-intellij-plugin
          path: supremeai-intellij-plugin/build/distributions/*.zip
      - name: Store_Plugin_Path
        id: set-path
        run: echo "path=supremeai-intellij-plugin/build/distributions/*.zip" >> $GITHUB_OUTPUT

  vscode-extension-build:
    name: VSCode_Extension_Build
    needs: [changes, secret-scan]
    if: needs.changes.outputs.vscode_extension == 'true' || needs.changes.outputs.workflow_vscode_extension == 'true'
    runs-on: ubuntu-latest
    outputs:
      vsix_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "supremeai-vscode-extension/package-lock.json"
      - name: Install_Dependencies
        working-directory: ./supremeai-vscode-extension
        run: npm ci
      - name: Lint_and_Compile
        working-directory: ./supremeai-vscode-extension
        run: |
          npm run lint
          npm run compile
      - name: Package_Extension
        working-directory: ./supremeai-vscode-extension
        run: npx vsce package --no-git-tag-version
      - name: Store_VSIX_Path
        id: set-path
        run: echo "path=supremeai-vscode-extension/*.vsix" >> $GITHUB_OUTPUT

  java-build-and-test:
    name: Java_Build_And_Test
    needs: [changes, secret-scan]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_And_Test
        run: "./gradlew build -x jacocoTestCoverageVerification"
      - name: Upload_JAR
        uses: actions/upload-artifact@v4
        with:
          name: java-backend-jar
          path: "build/libs/*.jar"

  deploy-backend:
    name: Deploy_Backend
    needs: [java-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.java-build-and-test.result == 'success'
    outputs:
      admin_url: ${{ steps.set-url.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - name: Authenticate_GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
      - name: Setup_GCloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy_Backend_To_Cloud_Run
        id: build
        run: echo "build_id=$(gcloud builds submit --config cloudbuild.yaml --async --format='value(id)')" >> $GITHUB_OUTPUT
      - name: Store_Admin_URL
        id: set-url
        run: echo "url=$(gcloud run services describe supremeai --platform managed --region us-central1 --format='value(status.url)')/admin.html" >> $GITHUB_OUTPUT
      - name: Show_Cloud_Build_Logs
        if: failure()
        run: |
          echo "Fetching latest Cloud Build logs..."
          BUILD_ID=${{ steps.build.outputs.build_id }}
          gcloud builds log $BUILD_ID --project=supremeai-a

  flutter-build-and-test:
    name: Flutter_Build_And_Test
    needs: [changes, secret-scan]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow_frontend == 'true'
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.set-paths.outputs.frontend_url }}
      apk_path: ${{ steps.set-paths.outputs.apk_path }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          cache: true
      - name: Test_And_Build
        working-directory: ./supremeai
        run: |
          flutter pub get
          flutter test
          flutter build web --release
      - name: Build_APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: ./supremeai
        run: flutter build apk --release --target-platform android-arm64
      - name: Upload_Web
        uses: actions/upload-artifact@v4
        with:
          name: customer-web-build
          path: supremeai/build/web
      - name: Upload_APK_Artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: supremeai-android-apk
          path: supremeai/build/app/outputs/flutter-apk/app-release.apk
      - name: Store_Artifact_Paths
        id: set-paths
        run: |
          echo "frontend_url=https://supremeai-a.web.app/" >> $GITHUB_OUTPUT
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "apk_path=supremeai/build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "apk_path=N/A" >> $GITHUB_OUTPUT
          fi

  deploy-frontend:
    name: Deploy_Frontend
    needs: [flutter-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.flutter-build-and-test.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Download_Web
        uses: actions/download-artifact@v4
        with:
          name: customer-web-build
          path: supremeai/build/web
      - name: Firebase_Deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
          projectId: "supremeai-a"
          channelId: "live"
          entryPoint: "./supremeai"

  workflow-summary:
    name: Workflow_Summary
    needs: [deploy-backend, deploy-frontend, plugin-build, vscode-extension-build, flutter-build-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate_Summary
        run: |
          echo "### Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Admin Dashboard URL:** ${{ needs.deploy-backend.outputs.admin_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Customer App URL:** ${{ needs.flutter-build-and-test.outputs.frontend_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK Path:** `${{ needs.flutter-build-and-test.outputs.apk_path || 'N/A' }}`" >> $GITHUB_STEP_SUMMARY
          echo "**Plugin Path:** `${{ needs.plugin-build.outputs.plugin_path || 'N/A' }}`" >> $GITHUB_STEP_SUMMARY
          echo "**VS Code Extension Path:** `${{ needs.vscode-extension-build.outputs.vsix_path || 'N/A' }}`" >> $GITHUB_STEP_SUMMARY

  health-check:
    name: Health_Check
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check_Status
        run: "curl -sf https://supremeai-a.web.app/ || echo 'Site check skipped'"

  notify:
    name: Notification
    needs: [health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Status_Update
        run: "echo 'Deployment process completed with status: ${{ needs.health-check.result }}'"
