name: SupremeAI Master Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 🔍 Detect Changes
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'build.gradle*'
              - '.github/workflows/**'
            frontend:
              - 'supremeai/**'
              - 'flutter_admin_app/**'
              - 'firebase.json'
              - '.github/workflows/**'

  # ☕ Java Build
  java-build:
    name: java-build / build
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ⚙️ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 🔨 Build JAR
        run: ./gradlew build -x test

  # 🐦 Flutter Build
  flutter-build:
    name: flutter-build / build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          cache: true
      - name: 📦 Build Web & APK
        run: |
          cd supremeai
          flutter pub get
          flutter build web --release
          flutter build apk --release --target-platform android-arm64

  # 🚀 Deploy Backend
  deploy-backend:
    name: deploy-backend / build
    needs: java-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 GCloud Deploy
        run: echo "Deploying to Google Cloud Run..."

  # 🚀 Deploy Frontend
  deploy-frontend:
    name: deploy-frontend / deploy
    needs: flutter-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 Firebase Deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}'
          projectId: supremeai-a
          channelId: live

  # 🛡️ CodeQL Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: 🛡️ CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: none
      - name: 🔍 Run CodeQL
        uses: github/codeql-action/analyze@v3

  # 🛡️ Secret Scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🛡️ Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # 🛡️ Dependency Review
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: 🛡️ Dependency Review
        uses: actions/dependency-review-action@v4
