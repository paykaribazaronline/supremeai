---
name: SupremeAI_Master_Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect_Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: "${{ steps.filter.outputs.backend }}"
      frontend: "${{ steps.filter.outputs.frontend }}"
      plugin: "${{ steps.filter.outputs.plugin }}"
      vscode_extension: "${{ steps.filter.outputs.vscode_extension }}"
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'build.gradle*'
            frontend:
              - 'supremeai/**'
              - 'supremeai/firebase.json'
            plugin:
              - 'supremeai-intellij-plugin/**'
            vscode_extension:
              - 'supremeai-vscode-extension/**'

  secret-scan:
    name: Secret_Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret_Scan
        uses: trufflesecurity/trufflehog@v3.80.1
        with:
          path: "./"
          extra_args: "--only-verified"

  codeql:
    name: CodeQL_Analysis
    needs: [changes]
    if: github.event_name != 'pull_request' && needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: CodeQL_Init
        uses: github/codeql-action/init@v3
        with:
          languages: "java"
          build-mode: "manual"
      - name: Build_For_CodeQL
        run: ./gradlew compileJava
        
      - name: Run_CodeQL
        uses: github/codeql-action/analyze@v3

  java-build-and-test:
    name: Java_Build_And_Test
    needs: [changes, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Gradle_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_And_Test
        run: |
          ./gradlew clean build -x test -x jacocoTestCoverageVerification
          mkdir -p build/libs
          # Find the boot jar (usually ends with .jar and is not -plain.jar)
          BOOT_JAR=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          if [ -n "$BOOT_JAR" ]; then
            cp "$BOOT_JAR" build/libs/app.jar
          else
            echo "Error: No executable JAR found in build/libs"
            ls -R build/libs
            exit 1
          fi
      - name: Upload_JAR
        uses: actions/upload-artifact@v4
        with:
          name: java-backend-jar
          path: build/libs/app.jar
          if-no-files-found: error

  flutter-build-and-test:
    name: Flutter_Build_And_Test
    needs: [changes, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.set-paths.outputs.frontend_url }}
      apk_path: ${{ steps.set-paths.outputs.apk_path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Flutter_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool/flutter_build
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-
      - name: Setup_Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          cache: true
      - name: Get_Flutter_Dependencies
        working-directory: ./supremeai
        run: flutter pub get
      - name: Run_Tests
        working-directory: ./supremeai
        run: flutter test
      - name: Build_Web
        working-directory: ./supremeai
        run: flutter build web --release
      - name: Upload_Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-artifacts
          path: |
            supremeai/build/web
            !**/**.map
          if-no-files-found: warn
      - name: Store_Artifact_Paths
        id: set-paths
        run: |
          echo "frontend_url=https://supremeai-a.web.app/" >> $GITHUB_OUTPUT

  plugin-build:
    name: Plugin_Build
    needs: [changes, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      plugin_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Gradle_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_Plugin
        run: "./gradlew :supremeai-intellij-plugin:buildPlugin"
      - name: Upload_Plugin_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supremeai-intellij-plugin
          path: supremeai-intellij-plugin/build/distributions/*.zip
      - name: Store_Plugin_Path
        id: set-path
        run: echo "path=supremeai-intellij-plugin/build/distributions/*.zip" >> $GITHUB_OUTPUT

  vscode-extension-build:
    name: VSCode_Extension_Build
    needs: [changes, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      vsix_path: ${{ steps.set-path.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup_Node_Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Setup_Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "supremeai-vscode-extension/package-lock.json"
      - name: Install_Dependencies
        working-directory: ./supremeai-vscode-extension
        run: npm ci
      - name: Lint_and_Compile
        working-directory: ./supremeai-vscode-extension
        run: |
          npm run lint
          npm run compile
      - name: Upload_VSIX_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supremeai-vscode-extension
          path: supremeai-vscode-extension/*.vsix
      - name: Store_VSIX_Path
        id: set-path
        run: echo "path=supremeai-vscode-extension/*.vsix" >> $GITHUB_OUTPUT

  deploy-backend:
    name: Deploy_Backend
    needs: [java-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      admin_url: ${{ steps.set-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download_JAR
        uses: actions/download-artifact@v4
        with:
          name: java-backend-jar
          path: build/libs
      - name: Authenticate_GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
      - name: Setup_GCloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy_To_Cloud_Run
        run: |
          gcloud run deploy supremeai \
            --source . \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --timeout 3600 \
            --set-env-vars="SPRING_PROFILES_ACTIVE=cloud,FIREBASE_PROJECT_ID=supremeai-a,spring.threads.virtual.enabled=true" \
            --max-instances 10 \
            --concurrency 1000
      - name: Store_Admin_URL
        id: set-url
        run: |
          URL=$(gcloud run services describe supremeai --platform managed --region us-central1 --format='value(status.url)')
          echo "url=$URL/admin.html" >> $GITHUB_OUTPUT
      - name: Show_Logs_On_Failure
        if: failure()
        run: |
          echo "Fetching latest Cloud Run logs for troubleshooting..."
          gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=supremeai" --limit 50

  deploy-frontend:
    name: Deploy_Frontend
    needs: [flutter-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download_Web
        uses: actions/download-artifact@v4
        with:
          name: flutter-artifacts
          path: supremeai/build/web
      - name: Authenticate_GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
          project_id: "supremeai-a"
      - name: Setup_Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy_Firebase_Hosting
        run: npx firebase-tools@latest deploy --project supremeai-a --only hosting --non-interactive
        working-directory: ./supremeai

  workflow-summary:
    name: Workflow_Summary
    needs: [deploy-backend, deploy-frontend, plugin-build, vscode-extension-build, flutter-build-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate_Summary
        run: |
          echo "### Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Admin Dashboard URL:** ${{ needs.deploy-backend.outputs.admin_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY

  health-check:
    name: Health_Check
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check_Status
        run: |
          echo "Checking frontend status..."
          curl -sf https://supremeai-a.web.app/ || echo 'Frontend site check failed or skipped'
          echo "Checking backend status..."
          ADMIN_URL="${{ needs.deploy-backend.outputs.admin_url }}"
          if [ -n "$ADMIN_URL" ] && [ "$ADMIN_URL" != "N/A" ]; then
            BACKEND_URL=$(echo "$ADMIN_URL" | sed 's/\/admin\.html$//')
            curl -sf "$BACKEND_URL/actuator/health" || echo 'Backend health check failed or skipped'
          else
            echo 'Backend URL not available for health check'
          fi

  notify:
    name: Notification
    needs: [health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Status_Update
        run: |
          HEALTH_STATUS="${{ needs.health-check.result }}"
          echo "Deployment process completed with health check status: $HEALTH_STATUS"
          if [ "$HEALTH_STATUS" = "success" ]; then
            echo "✅ All deployments successful!"
          else
            echo "⚠️ Deployment completed with some issues. Check logs for details."
          fi
...