---
name: SupremeAI_Master_Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Cache keys for better cache hits
  GRADLE_CACHE_KEY: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/build.gradle.kts') }}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect_Changes
    runs-on: ubuntu-latest
    outputs:
      backend: "${{ steps.filter.outputs.backend }}"
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'build.gradle*'

  java-build-and-test:
    name: Java_Build_And_Test
    needs: [changes]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Setup_Java_Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.GRADLE_CACHE_KEY }}
          restore-keys: |
            ${{ env.GRADLE_CACHE_KEY }}
      - name: Setup_Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
      - name: Build_And_Test
        run: "./gradlew build -x jacocoTestCoverageVerification"
      - name: Upload_JAR
        uses: actions/upload-artifact@v6
        with:
          name: java-backend-jar
          path: "build/libs/*.jar"
...