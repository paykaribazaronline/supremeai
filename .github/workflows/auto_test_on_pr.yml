name: Auto Test on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Run CI tests, linters and type checks
        run: |
          bash ./scripts/ci/run_tests.sh
name: Auto Test on PR
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install auto-test-generator pytest
      - name: Generate tests
        run: |
          python -m auto_test_generator --source backend/ --output tests/generated/
      - name: Run tests
        run: |
          pytest tests/generated/ -v