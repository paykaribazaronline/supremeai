name: SupremeAI CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'src/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'Dockerfile'
            flutter:
              - 'flutter_admin_app/**'

  # Run Java CI
  java:
    needs: changes
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || needs.changes.outputs.java == 'true'
    uses: ./.github/workflows/reusable-java.yml
    with:
      deploy: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
    secrets:
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  # Run Flutter CI
  flutter:
    needs: changes
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || needs.changes.outputs.flutter == 'true'
    uses: ./.github/workflows/reusable-flutter.yml
    with:
      deploy: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

  # Deploy Staging (develop branch)
  deploy-staging:
    needs: [java, flutter]
    if: |
      always() && 
      github.ref == 'refs/heads/develop' && 
      needs.java.result == 'success' && 
      needs.flutter.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      firebase_project: 'supremeai-a'
    secrets:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}

  # Deploy Production (main branch)
  deploy-production:
    needs: [java, flutter]
    if: |
      always() && 
      github.ref == 'refs/heads/main' && 
      needs.java.result == 'success' && 
      needs.flutter.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      firebase_project: 'supremeai-a'
    secrets:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
