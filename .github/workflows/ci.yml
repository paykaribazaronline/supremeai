name: SupremeAI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java: ['src/**', 'build.gradle*', 'Dockerfile', '.github/workflows/reusable-java.yml']
            flutter: ['flutter_admin_app/**', '.github/workflows/reusable-flutter.yml']

  java-build:
    needs: changes
    if: needs.changes.outputs.java == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/reusable-java.yml
    with:
      deploy: false # Build & Test only
    secrets:
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  flutter-build:
    needs: changes
    if: needs.changes.outputs.flutter == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/reusable-flutter.yml
    with:
      deploy: false # Build only
