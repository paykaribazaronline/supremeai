name: 🔥 Self-Healing CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 * * * *'  # Every hour (24 runs/day) - continuous health monitoring
    # Previous: '*/5 * * * *' (every 5 min = 288 runs/day = ~$50-100/month)
    # Current: '0 * * * *' (hourly = 24 runs/day = ~$5-10/month)
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Trigger type'
        required: true
        default: 'manual_health_check'
        type: choice
        options:
          - manual_health_check
          - force_auto_repair
          - trigger_phoenix_regeneration
          - analyze_patterns

env:
  API_BASE_URL: ${{ secrets.API_BASE_URL }}
  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
  LOG_LEVEL: INFO

  # ⚠️ REQUIRED GITHUB SECRETS (add in GitHub Settings → Secrets & variables → Repository secrets):
  # - API_BASE_URL: https://supremeai-xxxxx.run.app (your Cloud Run URL)
  # - ADMIN_TOKEN: <your-jwt-admin-token> (get from POST /api/auth/login response)
  # Without these secrets, health checks will be SKIPPED (exit code 0, appears passing)

jobs:
  # ==============================================================================
  # PHASE 1: System Health Pulse (Every 5 minutes)
  # ==============================================================================
  health-check:
    name: 🫀 System Health Pulse
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Get system health status
        id: health
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping health check"
            echo "health={}" >> $GITHUB_OUTPUT
          else
            HEALTH=$(curl -sf "$API_BASE_URL/api/v1/self-healing/status" || echo '{"status":"unreachable"}')
            echo "health=$HEALTH" >> $GITHUB_OUTPUT
            echo "Health Status: $HEALTH"
          fi
      
      - name: Check critical metrics
        id: metrics
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping metrics check"
            echo "metrics={}" >> $GITHUB_OUTPUT
          else
            METRICS=$(curl -sf "$API_BASE_URL/api/v1/self-healing/metrics" || echo '{}')
            echo "metrics=$METRICS" >> $GITHUB_OUTPUT
            echo "Metrics: $METRICS"
          fi
      
      - name: Analyze system health
        run: |
          echo "System Health Analysis"
          echo "====================="
          echo "MTTR: $(echo ${{ steps.metrics.outputs.metrics }} | jq '.mttr')"
          echo "MTTD: $(echo ${{ steps.metrics.outputs.metrics }} | jq '.mttd')"
          echo "Availability: $(echo ${{ steps.metrics.outputs.metrics }} | jq '.availability')"
          echo "Auto-repair Success: $(echo ${{ steps.metrics.outputs.metrics }} | jq '.autoRepairSuccessRate')"
      
      - name: Store health snapshot
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping health snapshot"
          else
            curl -X POST "$API_BASE_URL/api/v1/self-healing/health-snapshot" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "timestamp": '$(($(date +%s)*1000))',
                "source": "github_actions",
                "trigger": "scheduled_health_check"
              }' || true
          fi

  # ==============================================================================
  # PHASE 2: Failure Prediction & Prevention
  # ==============================================================================
  predictions:
    name: 🔮 ML Failure Prediction
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: health-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Get failure predictions
        id: predictions
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping predictions"
            echo "predictions={\"predictions\":[]}" >> $GITHUB_OUTPUT
          else
            PREDICTIONS=$(curl -sf "$API_BASE_URL/api/v1/self-healing/predictions" \
              -H "Authorization: Bearer $ADMIN_TOKEN" || echo '{"predictions":[]}')
            echo "predictions=$PREDICTIONS" >> $GITHUB_OUTPUT
            echo "Predictions Retrieved:"
            echo "$PREDICTIONS" | jq '.'
          fi
      
      - name: Analyze high-confidence predictions
        run: |
          PREDICTIONS='${{ steps.predictions.outputs.predictions }}'
          HIGH_CONF=$(echo "$PREDICTIONS" | jq '[.predictions[] | select(.probability > 0.8)]')
          echo "High-confidence predictions (>80%):"
          echo "$HIGH_CONF" | jq '.'
          
          if [ $(echo "$HIGH_CONF" | jq 'length') -gt 0 ]; then
            echo "⚠️  HIGH CONFIDENCE FAILURES PREDICTED"
            echo "Triggering preemptive failover..."
          fi
      
      - name: Preemptive failover for critical services
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping failover"
            exit 0
          fi
          PREDICTIONS='${{ steps.predictions.outputs.predictions }}'
          echo "$PREDICTIONS" | jq -r '.predictions[] | select(.probability > 0.8) | .provider' | while read provider; do
            echo "Preemptively failing over: $provider"
            curl -X POST "$API_BASE_URL/api/v1/self-healing/failover" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -d "{\"provider\": \"$provider\", \"reason\": \"predictive_failover\"}" || true
          done

  # ==============================================================================
  # PHASE 3: Build & Compile Verification
  # ==============================================================================
  compile:
    name: 🔨 Compile & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test --no-daemon
      
      - name: Verify artifact
        run: |
          if ls build/libs/*.jar 2>/dev/null | grep -q .; then
            echo "✅ Artifact built successfully"
            ls -lh build/libs/
          else
            echo "❌ Artifact not found"
            exit 1
          fi

  # ==============================================================================
  # PHASE 4: Auto-Repair Trigger (Only if health check failed)
  # ==============================================================================
  auto-repair:
    name: 🔧 AI Auto-Repair
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: failure()  # Only run if previous jobs failed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Get failed component details
        id: failures
        run: |
          # Get last failed test or component
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured"
            echo "failed_component={}" >> $GITHUB_OUTPUT
          else
            FAILED_COMPONENT=$(curl -sf "$API_BASE_URL/api/v1/self-healing/last-failure" \
              -H "Authorization: Bearer $ADMIN_TOKEN" || echo '{}')
            echo "failed_component=$FAILED_COMPONENT" >> $GITHUB_OUTPUT
          fi
      
      - name: Trigger auto-repair
        run: |
          echo "🔧 Initiating AI auto-repair for failed component..."
          
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - cannot trigger auto-repair"
            exit 0
          fi
          
          REPAIR_RESULT=$(curl -sf -X POST "$API_BASE_URL/api/v1/self-healing/auto-repair" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "component": "DefaultComponent",
              "error": "Failure detected via CI/CD",
              "stackTrace": "GitHub Actions health check failed",
              "context": "Automated repair triggered by CI/CD pipeline"
            }' || echo '{"status":"unavailable"}')
          
          echo "Repair Result:"
          echo "$REPAIR_RESULT" | jq '.'
          
          # Check if repair succeeded
          STATUS=$(echo "$REPAIR_RESULT" | jq -r '.status')
          if [ "$STATUS" = "SUCCESS" ]; then
            echo "✅ Auto-repair SUCCESSFUL"
          else
            echo "⚠️  Auto-repair status: $STATUS"
          fi
      
      - name: Verify repair
        run: |
          echo "Verifying repair..."
          sleep 10
          
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping verification"
            exit 0
          fi
          HEALTH=$(curl -sf "$API_BASE_URL/api/v1/self-healing/status" || echo '{"status":"unknown"}')
          echo "System status after repair: $HEALTH" | jq '.'

  # ==============================================================================
  # PHASE 5: Self-Improvement Analysis (Hourly)
  # ==============================================================================
  self-improve:
    name: 🧠 Adaptive Self-Improvement
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Trigger pattern analysis
        run: |
          echo "🧠 Starting self-improvement cycle..."
          
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping pattern analysis"
            exit 0
          fi
          
          IMPROVE_RESULT=$(curl -sf -X POST "$API_BASE_URL/api/v1/self-healing/improve" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "action": "analyze_patterns",
              "autoApply": false
            }' || echo '{"status":"unavailable"}')
          
          echo "Self-improvement initiated:"
          echo "$IMPROVE_RESULT" | jq '.'
      
      - name: Get updated predictions
        run: |
          echo "📊 Fetching updated ML predictions..."
          
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping predictions"
            exit 0
          fi
          
          PREDICTIONS=$(curl -sf "$API_BASE_URL/api/v1/self-healing/predictions" \
            -H "Authorization: Bearer $ADMIN_TOKEN" || echo '{"predictions":[]}')
          
          echo "Current predictions:"
          echo "$PREDICTIONS" | jq '.predictions[] | {provider: .provider, probability: .probability}'
      
      - name: Report improvement metrics
        run: |
          echo "📈 Improvement Metrics Report"
          echo "=============================="
          
          if [ -z "$API_BASE_URL" ]; then
            echo "⚠️  API_BASE_URL not configured - skipping metrics report"
            exit 0
          fi
          
          curl -sf "$API_BASE_URL/api/v1/self-healing/metrics" \
            -H "Authorization: Bearer $ADMIN_TOKEN" | jq '.' || echo "Metrics unavailable"

  # ==============================================================================
  # PHASE 6: Phoenix Regeneration (Manual trigger only)
  # ==============================================================================
  phoenix-regenerate:
    name: 🔥 Phoenix Regeneration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.trigger == 'trigger_phoenix_regeneration'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      
      - name: Confirm regeneration
        run: |
          echo "⚠️  PHOENIX REGENERATION REQUEST"
          echo "This will completely rebuild a service using AI agents"
          echo "Service: ${{ github.event.inputs.service }}"
      
      - name: Trigger Phoenix regeneration
        id: phoenix
        run: |
          echo "🔥 Triggering Phoenix regeneration..."
          
          if [ -z "$API_BASE_URL" ]; then
            echo "❌ API_BASE_URL not configured - cannot trigger Phoenix regeneration"
            exit 1
          fi
          
          REGEN_RESULT=$(curl -sf -X POST \
            "$API_BASE_URL/api/v1/self-healing/regenerate/DefaultService" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" || echo '{"status":"FAILED"}')
          
          echo "Regeneration Result:"
          echo "$REGEN_RESULT" | jq '.'
          
          echo "regen_result=$REGEN_RESULT" >> $GITHUB_OUTPUT
      
      - name: Verify regenerated service
        run: |
          echo "Verifying regenerated service..."
          
          REGEN_RESULT='${{ steps.phoenix.outputs.regen_result }}'
          STATUS=$(echo "$REGEN_RESULT" | jq -r '.status')
          CONFIDENCE=$(echo "$REGEN_RESULT" | jq -r '.confidenceScore')
          
          echo "Regeneration Status: $STATUS"
          echo "Confidence Score: $CONFIDENCE"
          
          if [ "$STATUS" = "SUCCESS" ]; then
            echo "✅ Phoenix regeneration SUCCESSFUL"
          else
            echo "❌ Phoenix regeneration FAILED"
            exit 1
          fi

  # ==============================================================================
  # PHASE 7: Report & Logging
  # ==============================================================================
  report:
    name: 📊 Self-Healing Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [health-check, predictions, compile]
    
    steps:
      - name: Generate health report
        run: |
          echo "Self-Healing System Report"
          echo "=========================="
          echo "Report Time: $(date)"
          echo "Workflow Status: ${{ job.status }}"
          echo ""
          echo "Pipeline Status:"
          echo "  - Health Check: ${{ needs.health-check.result }}"
          echo "  - ML Predictions: ${{ needs.predictions.result }}"
          echo "  - Compilation: ${{ needs.compile.result }}"
      
      - name: Upload metrics
        run: |
          if [ -n "$API_BASE_URL" ]; then
            curl -X POST "$API_BASE_URL/api/v1/self-healing/ci-cd-metrics" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "runId": "${{ github.run_id }}",
                "timestamp": '$(($(date +%s)*1000))',
                "workflow": "self-healing-cicd",
                "status": "${{ job.status }}",
                "healthCheck": "${{ needs.health-check.result }}",
                "predictions": "${{ needs.predictions.result }}",
                "compilation": "${{ needs.compile.result }}"
              }' || true
          fi
      
      - name: Summary
        run: |
          echo "✅ Self-Healing CI/CD Pipeline Complete"
          echo ""
          echo "System is operating with full autonomous capabilities:"
          echo "  • Continuous health monitoring (every 5 minutes)"
          echo "  • ML-based failure prediction"
          echo "  • Automatic code repair"
          echo "  • Adaptive threshold tuning"
          echo "  • Phoenix service regeneration (on-demand)"
          echo "  • Self-improving architecture"
