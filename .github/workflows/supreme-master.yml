name: 🧠 SupremeAI Master CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore', 'logs/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '24'
  SUPREMEAI_API_URL: ${{ vars.SUPREMEAI_API_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: SMART ROUTER
  # ═══════════════════════════════════════════════════════════════
  detect-changes:
    name: 🔍 Smart Router
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend: ['backend/**', 'packages/shared-types/**', 'Dockerfile']
            frontend: ['apps/studio-client/**', 'apps/web-chat/**', 'tools/vscode-extension/**', 'packages/**']
            mobile: ['apps/mobile/**']

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: PARALLEL TEST & LINT 
  # ═══════════════════════════════════════════════════════════════
  backend-core:
    name: 🐍 Backend (Test & Auto-Fix)
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true
          poetry install --sync --with dev --without ml
      
      - name: Lint & Test
        working-directory: backend
        run: |
          poetry run ruff check .
          poetry run pytest -n auto --cov=core --cov-fail-under=24 -q
          
      - name: 🔧 SupremeAI Auto-Fix Engine
        if: failure() && github.actor != 'dependabot[bot]'
        env:
          SUPREMEAI_API_KEY: ${{ secrets.SUPREMEAI_API_KEY }}
        run: python .github/scripts/ci-auto-fix-v3.py --job backend-test --mode fix

  frontend-core:
    name: 🌐 Frontend Monorepo (Turbo)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install & Turbo Run
        run: |
          pnpm install --frozen-lockfile
          pnpm turbo run build lint test --filter=supremeai-studio-client --filter=@supremeai/web-chat --filter=supremeai-vscode
          
      - name: Upload Build Artifacts for Deployment
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: |
            apps/studio-client/dist
            apps/web-chat/dist
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: BUILD ARTIFACTS (Mobile & Desktop Apps)
  # ═══════════════════════════════════════════════════════════════
  build-artifacts:
    name: 📦 Build Native Artifacts
    needs: [backend-core, frontend-core]
    if: always() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [apk, vsix] 
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - name: 📱 Build APK (Arm64 Only)
        if: matrix.target == 'apk'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          cache: true
      - if: matrix.target == 'apk'
        working-directory: apps/mobile
        run: |
           flutter pub get
           dart run flutter_launcher_icons
           flutter build apk --release --target-platform android-arm64
      - if: matrix.target == 'apk'
        uses: actions/upload-artifact@v7
        with:
          name: supremeai-mobile-apk
          path: apps/mobile/build/app/outputs/flutter-apk/*release*.apk

      - name: 🧩 Build VSIX
        if: matrix.target == 'vsix'
        run: |
           npm i -g pnpm@9.0.0
           pnpm install --frozen-lockfile
           pnpm turbo run build --filter=supremeai-vscode
           cd tools/vscode-extension && npx @vscode/vsce package --no-dependencies
      - if: matrix.target == 'vsix'
        uses: actions/upload-artifact@v7
        with:
          name: supremeai-vscode-vsix
          path: tools/vscode-extension/*.vsix

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: MULTI-CLOUD DEPLOYMENT
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Production Rollout
    needs: [backend-core, frontend-core]
    if: github.ref == 'refs/heads/main' && always()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      
      - name: GCP Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: 🐳 Build & Push API Image (With GHA Cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Deploy API to Cloud Run
        run: |
          python .github/scripts/deploy-backend.py
          
      - name: ⬇️ Download Frontend Artifacts
        if: needs.frontend-core.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          
      - name: 🌐 Deploy Studio & WebChat to Firebase
        if: needs.frontend-core.result == 'success'
        run: |
          npx -y firebase-tools deploy --only hosting:supremeai-admin --project ${{ secrets.GCP_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}"
          npx -y firebase-tools deploy --only hosting:supremeai-a --project ${{ secrets.GCP_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}"
