name: Reusable Flutter CI

on:
  workflow_call:
    inputs:
      deploy:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: flutter-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4

    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.0'
        channel: 'stable'
        cache: true

    - name: 📦 Build Flutter Web
      working-directory: flutter_admin_app
      run: |
        set -e
        flutter pub get
        flutter analyze
        flutter test
        flutter build web --release --base-href /admin/

    - name: ⬆️ Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: flutter-web-build
        path: flutter_admin_app/build/web/
        retention-days: 1
