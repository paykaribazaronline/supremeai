name: SupremeAI Gatekeeper

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.env*'
      - '**/docker-compose*'
      - '**/Dockerfile*'
      - 'config/**'
      - '.supreme/skills/**'

jobs:
  # ─── Phase 1: Skill Discovery ──────────────────────
  discover-skills:
    runs-on: ubuntu-latest
    outputs:
      skills_needed: ${{ steps.discover.outputs.skills }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Detect Changed Files & Map to Skills
        id: discover
        run: |
          # Check changes using git diff
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          
          # Map file patterns to skills
          declare -A SKILL_MAP
          SKILL_MAP[".env"]="environment-config-audit"
          SKILL_MAP["Dockerfile"]="docker-gatekeeper"
          SKILL_MAP["docker-compose"]="docker-gatekeeper"
          SKILL_MAP[".github/workflows"]="ci-cd-audit"
          
          SKILLS="[]"
          for file in $CHANGED_FILES; do
            for pattern in "${!SKILL_MAP[@]}"; do
              if [[ "$file" == *"$pattern"* ]]; then
                skill="${SKILL_MAP[$pattern]}"
                if [[ "$SKILLS" != *"$skill"* ]]; then
                  SKILLS=$(echo "$SKILLS" | jq ". + [\"$skill\"]")
                fi
              fi
            done
          done
          
          echo "skills=$SKILLS" >> $GITHUB_OUTPUT

  # ─── Phase 2: Dynamic Skill Loading ─────────────────
  load-skills:
    needs: discover-skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install PyYAML
      
      - name: Load SupremeAI Skills
        id: load
        run: |
          SKILLS='${{ needs.discover-skills.outputs.skills_needed }}'
          
          for skill in $(echo "$SKILLS" | jq -r '.[]'); do
            SKILL_PATH=".supreme/skills/$skill/SKILL.md"
            
            if [ -f "$SKILL_PATH" ]; then
              echo "✅ Loading skill: $skill"
            else
              echo "⚠️ Skill not found: $skill"
              echo "🔧 Auto-generating..."
              python .supreme/scripts/supreme-skill-generator.py "$skill"
            fi
          done

  # ─── Phase 3: Environment Config Audit ──────────────
  config-audit:
    needs: [discover-skills, load-skills]
    if: contains(needs.discover-skills.outputs.skills_needed, 'environment-config-audit')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install python-dotenv deepdiff PyYAML

      - name: Run Supreme Config Audit
        id: audit
        run: |
          python .supreme/skills/environment-config-audit/scripts/audit.py
        env:
          ENVIRONMENTS: "development,staging,production"
      
      - name: Post Audit Report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('audit_report.json')) {
              const report = JSON.parse(fs.readFileSync('audit_report.json', 'utf8'));
              let body = '## 🔍 SupremeAI Config Audit\n\n';
              
              if (report.issues && report.issues.length > 0) {
                body += `### ❌ ${report.issues.length} Config Issues\n`;
                report.issues.forEach(i => {
                  body += `- **${i.file}** (${i.risk}): ${i.message} -> Suggestion: ${i.suggestion}\n`;
                });
                if (report.issues.some(i => i.risk === 'CRITICAL' || i.risk === 'HIGH')) {
                  core.setFailed('Critical or High config issues found');
                }
              } else {
                body += '✅ All environment configuration checks passed!\n';
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }

  # ─── Phase 4: Docker Gatekeeper ─────────────────────
  docker-gatekeeper:
    needs: [discover-skills, load-skills]
    if: contains(needs.discover-skills.outputs.skills_needed, 'docker-gatekeeper')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install PyYAML google-generativeai

      - name: Run Security Check
        run: python .supreme/skills/docker-gatekeeper/scripts/security_check.py
        
      - name: Run Compliance Check
        run: python .supreme/skills/docker-gatekeeper/scripts/compliance_check.py

  # ─── Phase 5: Supreme Approval ──────────────────────
  supreme-approval:
    needs: [config-audit, docker-gatekeeper]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Final Decision
        run: |
          CONFIG_STATUS="${{ needs.config-audit.result }}"
          DOCKER_STATUS="${{ needs.docker-gatekeeper.result }}"
          
          if [ "$CONFIG_STATUS" == "failure" ] || [ "$DOCKER_STATUS" == "failure" ]; then
            echo "::error::❌ SupremeAI Gate: BLOCKED"
            exit 1
          fi
          
          echo "✅ SupremeAI Gate: APPROVED"
