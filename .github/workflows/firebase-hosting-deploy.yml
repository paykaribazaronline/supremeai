# SupremeAI Firebase Hosting Deploy with Verification
# Implements best practices for Firebase deployments with SupremeAI AI integration

name: Firebase Hosting Deploy (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  verify:
    name: 🔍 Pre-deployment Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 🔑 Validate Firebase Credentials
        run: |
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "⚠️  FIREBASE_TOKEN not set"
            exit 0
          fi
          
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "❌ GCP_PROJECT_ID not set"
            exit 1
          fi
          
          echo "✅ Firebase credentials validated"

      - name: 📋 Validate Required Secrets
        run: |
          required_secrets=("GEMINI_API_KEY" "JWT_SECRET")
          for secret in "${required_secrets[@]}"; do
            value_var="$(echo $secret)"
            if [ -z "${!value_var}" ]; then
              echo "⚠️  Optional secret not set: $secret"
            else
              echo "✅ $secret is configured"
            fi
          done
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  build-flutter-admin:
    name: 📱 Build Flutter Admin App
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: 📦 Get Flutter Dependencies
        run: |
          cd flutter_admin_app
          flutter pub get

      - name: 🏗️ Build Flutter Web with Admin Prefix
        run: |
          cd flutter_admin_app
          flutter build web --base-href "/admin/" --release --dart-define=ENVIRONMENT=production

      - name: ✅ Verify Flutter Build Output
        run: |
          if [ ! -d "flutter_admin_app/build/web" ]; then
            echo "❌ Flutter build output not found"
            exit 1
          fi
          
          FILE_COUNT=$(find flutter_admin_app/build/web -type f | wc -l)
          echo "✅ Flutter build successful: $FILE_COUNT files generated"

      - name: 📤 Upload Flutter Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-admin-build
          path: flutter_admin_app/build/web/
          retention-days: 1

  build-backend:
    name: ☕ Build Java Backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔐 Grant Execute Permission
        run: chmod +x gradlew

      - name: ⚙️ Configure Gradle Properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties

      - name: 🔨 Build Backend JAR
        run: |
          set +e
          for attempt in 1 2; do
            echo "Build attempt $attempt..."
            ./gradlew bootJar --no-daemon -x test --stacktrace
            if [ $? -eq 0 ]; then
              echo "✅ Build successful"
              exit 0
            fi
            if [ $attempt -lt 2 ]; then
              echo "⚠️  Build failed, retrying..."
              sleep 10
            fi
          done
          echo "❌ Build failed after 2 attempts"
          exit 1
        env:
          SUPREMEAI_SELFHEALING_PHOENIX_ENABLED: 'true'

      - name: ✅ Verify Backend Build
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v -- '-plain\.jar$' | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ Backend JAR not found"
            exit 1
          fi
          
          JAR_SIZE=$(du -h "$JAR_FILE" | cut -f1)
          echo "✅ Backend build successful: $JAR_SIZE"

      - name: 📤 Upload Backend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: build/libs/*.jar
          retention-days: 1

  build-react-dashboard:
    name: 🎨 Build React Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: 📦 Install Dependencies
        run: |
          cd dashboard
          npm ci

      - name: 🏗️ Build React Dashboard
        run: |
          cd dashboard
          npm run build --if-present

      - name: ✅ Verify React Build Output
        run: |
          if [ ! -d "dashboard/dist" ]; then
            echo "❌ React build output not found"
            exit 1
          fi
          
          FILE_COUNT=$(find dashboard/dist -type f | wc -l)
          echo "✅ React build successful: $FILE_COUNT files generated"

      - name: 📤 Upload React Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dashboard-build
          path: dashboard/dist/
          retention-days: 1

  combine-and-deploy:
    name: 📦 Combine & Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-flutter-admin, build-backend, build-react-dashboard]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 🔨 Combine All Builds into Hosting Directory
        run: |
          mkdir -p combined_deploy
          echo "📦 Combining builds..."
          
          # Copy React dashboard as root
          if [ -d "artifacts/react-dashboard-build" ]; then
            cp -r artifacts/react-dashboard-build/* combined_deploy/ || true
            echo "✅ React dashboard copied to root"
          fi
          
          # Copy Flutter admin app to /admin
          mkdir -p combined_deploy/admin
          if [ -d "artifacts/flutter-admin-build" ]; then
            cp -r artifacts/flutter-admin-build/* combined_deploy/admin/ || true
            echo "✅ Flutter admin app copied to /admin"
          fi
          
          # Verify structure
          echo ""
          echo "📋 Final Hosting Directory Structure:"
          find combined_deploy -type f -name "*.html" -o -name "*.js" -o -name "*.json" | head -20

      - name: ✅ Verify Combined Output
        run: |
          if [ ! -f "combined_deploy/index.html" ] && [ ! -f "combined_deploy/admin/index.html" ]; then
            echo "❌ Neither root nor admin index.html found"
            exit 1
          fi
          
          echo "✅ Hosting directory structure verified"

      - name: 📝 Create Deployment Manifest
        run: |
          cat > combined_deploy/deployment-manifest.json << 'EOF'
          {
            "version": "${{ github.sha }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "branch": "${{ github.ref }}",
            "author": "${{ github.actor }}",
            "deployments": {
              "root": "React Dashboard",
              "admin": "Flutter Admin App"
            }
          }
          EOF
          echo "✅ Deployment manifest created"

      - name: 🔐 Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: ✅ Verify Firebase Project
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          if [ -z "$PROJECT_ID" ]; then
            echo "❌ GCP_PROJECT_ID not set"
            exit 1
          fi
          
          firebase projects:list --token "$FIREBASE_TOKEN" | grep -q "supremeai-a" || {
            echo "⚠️  Firebase project 'supremeai-a' not found in list"
            echo "Attempting deployment anyway..."
          }

      - name: ☁️ Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --only hosting \
            --project supremeai-a \
            --token "$FIREBASE_TOKEN" \
            --message "Deploy ${{ github.sha }} - ${{ github.actor }}" \
            --non-interactive

      - name: 🌐 Get Deployment URLs
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "## 🚀 Firebase Hosting Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| [Main App](https://supremeai-a.web.app) | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| [Admin Panel](https://supremeai-a.web.app/admin/) | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: 🏥 Health Check
        continue-on-error: true
        run: |
          sleep 10
          
          echo "Checking Main App..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://supremeai-a.web.app" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Main app is accessible"
          else
            echo "⚠️  Main app health check: $HTTP_CODE"
          fi
          
          echo "Checking Admin Panel..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://supremeai-a.web.app/admin/" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Admin panel is accessible"
          else
            echo "⚠️  Admin panel health check: $HTTP_CODE"
          fi

      - name: 🔔 Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Firebase Hosting Deployment Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* ${{ job.status }}\n*App:* https://supremeai-a.web.app\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
