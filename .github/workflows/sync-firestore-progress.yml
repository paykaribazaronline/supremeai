name: Sync Firestore Progress to Master Doc

on:
  repository_dispatch:
    types: [firestore_update]
  workflow_dispatch:

jobs:
  sync-progress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Run Synchronization Script
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Create temporary credentials file from GitHub Secret
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > github-service-account.json
          export FIREBASE_CREDENTIALS_FILE=$(pwd)/github-service-account.json
          python scripts/tools/update_master_doc_progress.py
          rm github-service-account.json

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: sync plan status and progress from firestore"
          file_pattern: 'docs/04_Plans_and_Specs/main plan/SupremeAI_Complete_Documentation.md'
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"