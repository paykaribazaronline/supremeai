name: SupremeAI CI Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # ড্যাশবোর্ড থেকে ম্যানুয়ালি CI চেক ট্রিগার করার জন্য

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-scan:
    name: Build, Test & Scan
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write # .last_coverage ফাইল অটো-কমিট করার জন্য
      id-token: write # ভবিষ্যতে OIDC অথেন্টিকেশনের প্রয়োজন হলে
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Clean Build Directory
        run: ./gradlew clean

      - name: Build and Run Tests
        run: |
          ./gradlew build --stacktrace
        # এটি ইউনিট এবং ইন্টিগ্রেশন টেস্ট রান করবে।

      - name: Generate JaCoCo Coverage Report
        run: ./gradlew jacocoTestReport --stacktrace

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: "JUnit Test Results"
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: 'false'
        # গিটহাবে সুন্দর চার্ট আকারে টেস্ট রিপোর্ট দেখানোর জন্য

      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always() # বিল্ড ফেইল করলেও যেন টেস্ট রিপোর্ট পাওয়া যায়
        with:
          name: junit-test-results
          path: build/test-results/test/TEST-*.xml

      - name: Enforce Progressive Test Coverage
        run: |
          python scripts/tools/read_coverage.py
          # যদি পুশ ইভেন্ট হয় এবং কভারেজ পাস করে, তবে নতুন টার্গেট অটো-কমিট করবে
          if [ "${{ github.event_name }}" == "push" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add scripts/tools/.last_coverage
            # যদি .last_coverage ফাইল পরিবর্তিত হয়, তবেই কমিট এবং পুশ করবে
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update coverage target to $(cat scripts/tools/.last_coverage)% [skip ci]" && git push)
          fi

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0' # CI চেক ফেইল না করার জন্য 0 করা হলো, তবে এটি রিপোর্ট করবে।
          severity: 'CRITICAL,HIGH'
        # এটি নিশ্চিত করবে যে হ্যাক হওয়ার মতো কোনো দুর্বলতা প্রোডাকশনে যাচ্ছে না।