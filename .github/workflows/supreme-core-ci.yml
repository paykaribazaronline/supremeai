name: 🧠 SupremeAI Core CI

on:
  push:
    branches: [main, develop]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore', 'logs/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '24'
  SUPREMEAI_API_URL: ${{ vars.SUPREMEAI_API_URL }}

jobs:
  circuit-breaker:
    name: 🛑 Detect Previous Failure
    runs-on: ubuntu-latest
    outputs:
      previous_failed: ${{ steps.check.outputs.previous_failed }}
    steps:
      - name: Check Last Completed Run Status
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_FILENAME="supreme-core-ci.yml"
          
          # GitHub REST API দিয়ে সর্বশেষ 'completed' হওয়া পাইপলাইনের স্ট্যাটাস বের করা
          LAST_CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILENAME/runs?status=completed&per_page=1" --jq '.workflow_runs[0].conclusion' 2>/dev/null || echo "null")
          
          echo "Previous run conclusion: $LAST_CONCLUSION"
          
          # Check if the commit message contains [bypass-breaker]
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" == *"[bypass-breaker]"* ]]; then
            echo "⚠️ Bypass flag detected in commit message. Skipping circuit breaker check!"
            echo "previous_failed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "$LAST_CONCLUSION" == "failure" ]; then
            echo "❌ ERROR: The previous run of SupremeAI Core CI failed!"
            echo "Pipeline Blocked: You must fix the previous breaking changes before running a new pipeline."
            echo "To bypass this and deploy a fix, include '[bypass-breaker]' in your commit message."
            echo "previous_failed=true" >> $GITHUB_OUTPUT
            # exit 1 # Disabled auto detect and failover per user request
          elif [ "$LAST_CONCLUSION" == "null" ]; then
            echo "✅ No previous completed runs found. Proceeding!"
            echo "previous_failed=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Previous run was successful. Proceeding with the pipeline!"
            echo "previous_failed=false" >> $GITHUB_OUTPUT
          fi

  detect-changes:
    name: 🔍 Smart Router
    needs: circuit-breaker
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend: ['backend/**', 'packages/shared-types/**', 'Dockerfile', '.github/workflows/**', '.github/scripts/**']
            frontend: ['apps/studio-client/**', 'apps/web-chat/**', 'apps/desktop/**', 'tools/vscode-extension/**', 'packages/**', '.github/workflows/**', '.github/scripts/**']

  backend-core:
    name: 🐍 Backend (Test & Auto-Fix)
    needs: [detect-changes, circuit-breaker]
    if: |
      needs.detect-changes.outputs.backend == 'true' || 
      needs.circuit-breaker.outputs.previous_failed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true
          poetry install --sync --with dev --without ml
      
      - name: 🧹 Lint Code (Auto-Fix & Warning Mode)
        working-directory: backend
        run: |
          poetry run ruff check . --fix
          poetry run ruff format .
 
      - name: 🧪 Run Tests
        id: backend_tests
        working-directory: backend
        env:
          SUPREMEAI_ENCRYPTION_KEY: "CwE60g_bA67m-mock-encryption-key-padded-len="
          PYTHONPATH: ${{ github.workspace }}/backend
        run: poetry run pytest -n auto --cov=core --cov-fail-under=50 -q
          
      - name: 🔧 SupremeAI Auto-Fix Engine
        if: failure() && steps.backend_tests.outcome == 'failure'
        working-directory: backend
        env:
          SUPREMEAI_API_KEY: ${{ secrets.SUPREMEAI_API_KEY }}
        run: poetry run python ../.github/scripts/ci-auto-fix-v3.py --job backend-test --mode fix

  security-audit:
    name: 🛡️ CodeQL Security Scan
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'python, javascript'
          paths-ignore: |
            infrastructure/firebase_functions/ocrTrigger.ts
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python,javascript"

  frontend-core:
    name: 🌐 Frontend Monorepo (Turbo)
    needs: [detect-changes, circuit-breaker]
    if: |
      needs.detect-changes.outputs.frontend == 'true' || 
      needs.circuit-breaker.outputs.previous_failed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
      
      - name: Install & Turbo Run
        env:
          VITE_API_URL: ${{ env.SUPREMEAI_API_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm turbo run build lint test --filter=supremeai-studio-client --filter=@supremeai/web-chat --filter=supremeai-vscode
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: |
            apps/studio-client/dist
            apps/web-chat/dist
          retention-days: 1

  deploy-backend:
    name: 🚀 Deploy Backend (Cloud Run)
    needs: [detect-changes, circuit-breaker, backend-core]
    if: |
      always() && 
      github.ref == 'refs/heads/main' && 
      (needs.detect-changes.outputs.backend == 'true' || needs.circuit-breaker.outputs.previous_failed == 'true') &&
      needs.backend-core.result != 'failure' && needs.backend-core.result != 'cancelled'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      
      - name: GCP Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate Docker to GCP Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}
      
      - uses: docker/setup-buildx-action@v4
      
      - name: Build & Push API Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: 🚀 Deploy API to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
        run: python .github/scripts/deploy-backend.py

  deploy-frontend:
    name: 🌐 Deploy Frontend (Firebase)
    needs: [detect-changes, circuit-breaker, frontend-core]
    if: |
      always() && 
      github.ref == 'refs/heads/main' && 
      (needs.detect-changes.outputs.frontend == 'true' || needs.circuit-breaker.outputs.previous_failed == 'true') &&
      needs.frontend-core.result != 'failure' && needs.frontend-core.result != 'cancelled'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      
      - name: 📥 Download Frontend Artifacts
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: apps

      - name: 🌐 Deploy to Firebase
        run: |
          npx -y firebase-tools deploy --only hosting --project ${{ secrets.GCP_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}" || true

  sync-mirror:
    name: 📤 Sync to Secondary Repo
    # বাংলা মন্তব্য: সিকিউরিটি অডিট (CodeQL) সফল হওয়ার পর সেকেন্ডারি রিপোতে সিঙ্ক হবে
    needs: [detect-changes, deploy-backend, deploy-frontend, security-audit]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.deploy-backend.result != 'failure' && needs.deploy-backend.result != 'cancelled' &&
      needs.deploy-frontend.result != 'failure' && needs.deploy-frontend.result != 'cancelled' &&
      needs.security-audit.result != 'failure' && needs.security-audit.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: 📤 Sync to Secondary Repo (Staging Dispatch)
        if: env.MIRROR_REPO_TOKEN != ''
        env:
          MIRROR_REPO_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          git remote add mirror https://x-access-token:${MIRROR_REPO_TOKEN}@github.com/SaifulHaqueNiloy/supremeai.git
          git push mirror main:refs/heads/main

  generate-codebase-docs:
    name: 📝 Auto-Generate Codebase Docs
    # বাংলা মন্তব্য: মেইন বা ডেভেলপ ব্রাঞ্চে পুশ করা হলে স্বয়ংক্রিয়ভাবে কোডবেসের মার্কডাউন ফাইল জেনারেট হয়ে পুশ হবে
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Generate Codebase Markdown
        run: python scripts/generate_codebase_markdown.py
      - name: Commit and Push Docs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/codebase_dump.md
          git diff-index --quiet HEAD || (git commit -m "docs: auto-generate codebase markdown analysis [skip ci]" && git push)

  ci-report:
    name: 📊 Generate Smart CI Report
    needs: [deploy-backend, deploy-frontend, sync-mirror, generate-codebase-docs]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Generate Report
        run: python .github/scripts/generate-ci-report.py --type core
