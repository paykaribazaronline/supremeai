name: Monitor Failed Workflows

on:
  workflow_run:
    workflows: ["SupremeAI_Master_Pipeline"]
    types:
      - completed
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  check-failures:
    name: Check For Failed Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_retry: ${{ steps.check.outputs.should_retry }}
      failed_runs: ${{ steps.check.outputs.failed_runs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Failed Workflow Run
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRIGGERED_RUN_ID="${{ github.event.workflow_run.id }}"
          EVENT_NAME="${{ github.event_name }}"
          echo "Event: $EVENT_NAME"
          echo "Checking triggered run: $TRIGGERED_RUN_ID"

          if [ -z "$TRIGGERED_RUN_ID" ]; then
            echo "No workflow_run.id is available for this event. Skipping retry check."
            echo "should_retry=false" >> $GITHUB_OUTPUT
            echo "failed_runs=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CONCLUSION=$(gh api \
            "repos/${{ github.repository }}/actions/runs/$TRIGGERED_RUN_ID" \
            -q '.conclusion')
          
          echo "Conclusion: $CONCLUSION"
          
          if [ "$CONCLUSION" == "failure" ] || [ "$CONCLUSION" == "cancelled" ]; then
            # Get workflow runs with proper pagination and filtering
            RECENT_RUNS=$(gh api \
              "repos/${{ github.repository }}/actions/runs?workflow=SupremeAI_Master_Pipeline&per_page=10" \
              -q '.workflow_runs | sort_by(.created_at) | reverse')

            # Find the most recent completed run before the current one
            PREVIOUS_RUN=$(echo "$RECENT_RUNS" | jq -r --arg current_id "$TRIGGERED_RUN_ID" \
              '[.[] | select(.id != ($current_id | tonumber) and .status == "completed")] | .[0]')

            PREVIOUS_CONCLUSION=$(echo "$PREVIOUS_RUN" | jq -r '.conclusion // empty')
            PREVIOUS_ID=$(echo "$PREVIOUS_RUN" | jq -r '.id // empty')

            echo "Previous run ID: $PREVIOUS_ID"
            echo "Previous conclusion: $PREVIOUS_CONCLUSION"

            if [ "$PREVIOUS_CONCLUSION" == "failure" ] || [ "$PREVIOUS_CONCLUSION" == "cancelled" ]; then
              echo "Previous run also failed. Already retrying. Not retrying again to avoid infinite loop."
              echo "should_retry=false" >> $GITHUB_OUTPUT
              echo "failed_runs=0" >> $GITHUB_OUTPUT
            else
              echo "First failure detected. Triggering retry..."
              echo "should_retry=true" >> $GITHUB_OUTPUT
              echo "failed_runs=$TRIGGERED_RUN_ID" >> $GITHUB_OUTPUT
            fi
          else
            echo "No failures found in triggered run"
            echo "should_retry=false" >> $GITHUB_OUTPUT
            echo "failed_runs=0" >> $GITHUB_OUTPUT
          fi

  trigger-retry:
    name: Trigger Pipeline Retry
    needs: check-failures
    if: needs.check-failures.outputs.should_retry == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check retry count
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RETRY_COUNT=$(gh api \
            "repos/${{ github.repository }}/actions/runs?workflow=SupremeAI_Master_Pipeline&per_page=20" | \
            jq '[.workflow_runs[] | select(.conclusion == "failure")] | length')

          if [ "$RETRY_COUNT" -ge 3 ]; then
            echo "Too many retries. Aborting."
            exit 1
          fi
      - name: Retry SupremeAI Master Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Re-triggering SupremeAI_Master_Pipeline due to previous failure..."
          gh workflow run supreme_pipeline.yml \
            --ref ${{ github.ref_name }} \
            -f "force_run_all=true"

          echo "Retry triggered. Check Actions tab for new run."

  notify:
    name: Notification
    needs: [check-failures, trigger-retry]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Status Update
        run: |
          if [ "${{ needs.check-failures.outputs.should_retry }}" == "true" ]; then
            echo "✅ Failure detected and retry triggered automatically."
          else
            echo "ℹ️ No failures found in recent workflow runs."
          fi
