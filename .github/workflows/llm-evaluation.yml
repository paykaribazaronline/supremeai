name: LLM Prompt Evaluation (PromptOps)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  prompt-eval:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Run Promptfoo Evaluation
        run: |
          # Promptfoo evaluation checks for Prompt Drift and output quality
          npx -y promptfoo@latest eval --providers openai:gpt-4o,google:gemini-1.5-flash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
