name: SupremeAI Unified Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: supremeai
  GAR_LOCATION: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai
  DOCKER_BUILDKIT: 1

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Clean Build Directory
        run: ./gradlew clean

      - name: Build and Run Tests
        run: ./gradlew build --stacktrace

      - name: Generate JaCoCo Coverage Report
        run: ./gradlew jacocoTestReport --stacktrace

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: "JUnit Test Results"
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: 'false'

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: build/test-results/test/TEST-*.xml

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: github.event_name == 'push'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        if: github.event_name == 'push'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}:${{ github.sha }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=cloud
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            FIREBASE_TOKEN=${{ secrets.FIREBASE_TOKEN }}
          flags: '--cpu-boost'
