name: Auto Rollback

on:
  workflow_run:
    workflows: ["Blue-Green Deploy"]
    types:
      - completed

jobs:
  rollback:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get previous revision
        id: previous
        run: |
          REGION="${{ vars.REGION || secrets.GCP_REGION }}"
          if [ -z "$REGION" ]; then
            echo "::error::No region configured. Set REGION var or GCP_REGION secret."
            exit 1
          fi
          PROJECT_ID="${{ vars.PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          REVISIONS=$(gcloud run revisions list --service "${{ vars.SERVICE || 'supremeai-api' }}" --region "$REGION" ${PROJECT_ID:+--project "$PROJECT_ID"} --format="value(metadata.name)" --limit 2)
          FIRST=$(echo "$REVISIONS" | head -n 1)
          SECOND=$(echo "$REVISIONS" | sed -n '2p')
          echo "previous=$SECOND" >> "$GITHUB_OUTPUT"
          echo "Failed revision: $FIRST"

      - name: Rollback to previous revision
        if: always() && steps.previous.outputs.previous != ''
        run: |
          REGION="${{ vars.REGION || secrets.GCP_REGION }}"
          PROJECT_ID="${{ vars.PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          gcloud run services update-traffic "${{ vars.SERVICE || 'supremeai-api' }}" --region "$REGION" ${PROJECT_ID:+--project "$PROJECT_ID"} --to-revisions "${{ steps.previous.outputs.previous }}=100"
