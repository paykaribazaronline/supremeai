name: CodeQL Static Security Scanning Pipeline

on:
  push:
    branches:
      - 'feature/auto-*'
  pull_request:
    branches:
      - main

jobs:
  analyze:
    name: CodeQL Scan Validation
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL Analysis Context
        uses: github/codeql-action/init@v4
        with:
          languages: python, javascript
          paths-ignore:
            - 'infrastructure/firebase_functions/ocrTrigger.ts'

      - name: Perform Autobuild Setup
        uses: github/codeql-action/autobuild@v4

      - name: Execute CodeQL Static Scanning
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
