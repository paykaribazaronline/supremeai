name: SupremeAI Unified Pipeline

# SupremeAI Unified CI/CD Pipeline Configuration
# Version: 2.4.0 (Fixed Dependency Deadlock)
# Author: Antigravity
# Description: Self-healing, storage-optimized, and multi-component delivery pipeline.

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/codeflow-reports/**'
      - 'docs/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_run_all:
        description: 'Force run all jobs regardless of changes'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: write
  security-events: write
  id-token: write

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.27.0'
  GCP_PROJECT_ID: 'supremeai-a'
  GCP_REGION: 'us-central1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: "true"

jobs:
  initialize:
    name: Initialize & Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      mobile: ${{ steps.filter.outputs.mobile }}
      functions: ${{ steps.filter.outputs.functions }}
      extensions: ${{ steps.filter.outputs.extensions }}
      any_changes: ${{ steps.filter.outputs.any_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'build.gradle*'
              - 'gradle/**'
              - 'settings.gradle*'
            dashboard:
              - 'dashboard/**'
              - 'public/**'
            mobile:
              - 'supremeai/**'
            functions:
              - 'functions/**'
            extensions:
              - 'supremeai-vscode-extension/**'
              - 'supremeai-intellij-plugin/**'
            any_changes:
              - '**'

  backend-build:
    name: Backend Build
    needs: [initialize]
    if: needs.initialize.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || github.event.inputs.force_run_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      - run: ./gradlew build jacocoTestReport --no-daemon

  backend-deploy:
    name: Backend Deploy
    needs: [backend-build]
    if: always() && (needs.backend-build.result == 'success' || (needs.backend-build.result == 'skipped' && needs.initialize.outputs.backend == 'false')) && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request' && (needs.initialize.outputs.backend == 'true' || github.event.inputs.force_run_all == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build, Push & Deploy
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/supremeai-repo/backend \
            --project=${{ env.GCP_PROJECT_ID }} \
            .
          gcloud beta run deploy supremeai-backend \
            --image us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/supremeai-repo/backend \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 2 \
            --set-env-vars="SPRING_PROFILES_ACTIVE=cloud,FIREBASE_PROJECT_ID=${{ env.GCP_PROJECT_ID }}" \
            --update-secrets "JWT_SECRET=jwt-secret:latest,FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account-json:latest"

  frontend-build:
    name: Frontend Build
    needs: [initialize]
    if: needs.initialize.outputs.dashboard == 'true' || needs.initialize.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch' || github.event.inputs.force_run_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Build Dashboard
        working-directory: dashboard
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'supremeai-a.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'supremeai-a' }}
        run: |
          npm ci
          npm run build
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Build Mobile Web
        working-directory: supremeai
        run: |
          flutter pub get
          flutter build web --release --base-href /mobile/
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: |
            dashboard/dist/
            supremeai/build/web/

  frontend-deploy:
    name: Frontend Deploy
    needs: [frontend-build]
    if: always() && (needs.frontend-build.result == 'success' || (needs.frontend-build.result == 'skipped' && needs.initialize.outputs.dashboard == 'false')) && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request' && (needs.initialize.outputs.dashboard == 'true' || needs.initialize.outputs.mobile == 'true' || github.event.inputs.force_run_all == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage for Firebase Hosting
        run: |
          mkdir -p public/admin public/mobile

          # Dashboard — prefer local artifacts, fall back to non-local path
          DASHBOARD_SRC=""
          if [ -d "dashboard/dist" ]; then
            DASHBOARD_SRC="dashboard/dist"
          elif [ -d "dist" ]; then
            DASHBOARD_SRC="dist"
          else
            echo "::error::Dashboard build output not found (expected dashboard/dist or dist)."
            exit 1
          fi
          cp -r "$DASHBOARD_SRC"/* public/admin/

          # Mobile web — prefer local artifacts, fall back to non-local path
          MOBILE_SRC=""
          if [ -d "supremeai/build/web" ]; then
            MOBILE_SRC="supremeai/build/web"
          elif [ -d "build/web" ]; then
            MOBILE_SRC="build/web"
          else
            echo "::error::Mobile build output not found (expected supremeai/build/web or build/web)."
            exit 1
          fi
          cp -r "$MOBILE_SRC"/* public/mobile/

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        run: |
          firebase deploy \
            --project ${{ env.GCP_PROJECT_ID }} \
            --only hosting \
            --non-interactive

  health-check:
    name: Health Check
    needs: [backend-deploy, frontend-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Pipeline finished."