# SupremeAI Unified CI/CD Pipeline Configuration
# Version: 2.0.0
# Author: Antigravity

name: 🚀 SupremeAI Unified Pipeline

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deployment_env:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: write
  pull-requests: write
  actions: read
  security-events: write
  id-token: write

env:
  # Tool Versions
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.24.0'
  
  # Project IDs & Regions
  GCP_PROJECT_ID: 'supremeai-a'
  GCP_REGION: 'us-central1'
  
  # Build Optimization
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  # --------------------------------------------------------------------------------
  # 🔍 PHASE 1: INITIALIZATION & ANALYSIS
  # --------------------------------------------------------------------------------
  initialize:
    name: 🔍 Initialize & Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      mobile: ${{ steps.filter.outputs.mobile }}
      functions: ${{ steps.filter.outputs.functions }}
      extensions: ${{ steps.filter.outputs.extensions }}
      any_changes: ${{ steps.filter.outputs.any_changes }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕵️ Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'build.gradle*'
              - 'gradle/**'
              - 'settings.gradle*'
            dashboard:
              - 'dashboard/**'
              - 'public/**'
            mobile:
              - 'supremeai/**'
            functions:
              - 'functions/**'
            extensions:
              - 'supremeai-vscode-extension/**'
              - 'supremeai-intellij-plugin/**'

  security-scan:
    name: 🛡️ Security & Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      - name: 🔍 Scan for Secrets
        uses: trufflesecurity/trufflehog@v3.82.2
        with:
          path: ./
          extra_args: "--only-verified"

  # --------------------------------------------------------------------------------
  # 🏗️ PHASE 2: BUILD & TEST
  # --------------------------------------------------------------------------------
  
  backend-service:
    name: ☕ Backend (Spring Boot)
    needs: [initialize, security-scan]
    if: needs.initialize.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: 🔨 Build & Test
        run: ./gradlew clean build jacocoTestReport --no-daemon
        
      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: build/reports/tests/test
          
      - name: 📦 Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar

  dashboard-web:
    name: ⚛️ Dashboard (React)
    needs: [initialize, security-scan]
    if: needs.initialize.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
          
      - name: 🔨 Install & Build
        working-directory: dashboard
        run: |
          npm ci
          npm run build
          
      - name: 📦 Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

  mobile-app:
    name: 💙 Mobile (Flutter)
    needs: [initialize, security-scan]
    if: needs.initialize.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          
      - name: 🔨 Build Web
        working-directory: supremeai
        run: |
          flutter pub get
          flutter build web --release --base-href /mobile/
          
      - name: 📦 Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-dist
          path: supremeai/build/web

  cloud-functions:
    name: ⚡ Cloud Functions
    needs: [initialize, security-scan]
    if: needs.initialize.outputs.functions == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
          
      - name: 🔨 Install & Lint
        working-directory: functions
        run: |
          npm ci
          npm run lint || echo "Linting skipped or failed"

  # --------------------------------------------------------------------------------
  # 🚀 PHASE 3: DEPLOYMENT (Main/Master Only)
  # --------------------------------------------------------------------------------
  
  deploy-backend:
    name: 🚀 Deploy Backend
    needs: [backend-service]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 📥 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: .
          
      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
          
      - name: 🛠️ Setup GCloud
        uses: google-github-actions/setup-gcloud@v2
        
      - name: 🐳 Build & Push Container
        run: |
          # Use the JAR from artifact for the container build
          mv *.jar app.jar
          gcloud builds submit --tag us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/supremeai-repo/backend --quiet
          
      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy supremeai-backend \
            --image us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/supremeai-repo/backend \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --set-env-vars="SPRING_PROFILES_ACTIVE=cloud,FIREBASE_PROJECT_ID=${{ env.GCP_PROJECT_ID }}" \
            --update-secrets "JWT_SECRET=jwt-secret:latest,FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account-json:latest" \
            --quiet

  deploy-frontend:
    name: 🚀 Deploy Frontend & Mobile
    needs: [dashboard-web, mobile-app]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 📥 Download Dashboard
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: public/admin
          
      - name: 📥 Download Mobile Web
        uses: actions/download-artifact@v4
        with:
          name: mobile-web-dist
          path: public/mobile
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
          
      - name: 🚀 Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --project ${{ env.GCP_PROJECT_ID }} --only hosting --non-interactive

  deploy-functions:
    name: 🚀 Deploy Functions
    needs: [cloud-functions]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
          
      - name: 🚀 Deploy Firebase Functions
        run: |
          npm install -g firebase-tools
          cd functions
          npm ci
          firebase deploy --project ${{ env.GCP_PROJECT_ID }} --only functions --non-interactive
