# ═══════════════════════════════════════════════════════════════════════════════
# 🔄 SupremeAI Backup Server Update — 24h Delayed
# ═══════════════════════════════════════════════════════════════════════════════
# এই workflow:
#   • প্রতি 24 ঘণ্টায় চলে (schedule: 0 4 * * *)
#   • Main server এর সর্বশেষ deploy manifest পড়ে
#   • চেক করে: main deploy 24h+ আগে হয়েছে কিনা
#   • Main server healthy কিনা চেক করে
#   • সব ঠিক থাকলে backup server এ same image deploy করে
#   • Backup deploy manifest লিখে
# ═══════════════════════════════════════════════════════════════════════════════

name: SupremeAI Backup Update (24h Delayed)

on:
  schedule:
    - cron: '0 4 * * *'  # প্রতিদিন ভোর ৪টায় UTC (24h cycle)
  workflow_dispatch:
    inputs:
      force_update:
        description: 'ফোর্স আপডেট? (skip 24h check)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GCP_BACKUP_REGION: ${{ vars.GCP_BACKUP_REGION || 'us-east1' }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  MAIN_SERVICE: 'supremeai-api'
  BACKUP_SERVICE: ${{ vars.BACKUP_SERVICE_NAME || 'supremeai-api-backup' }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # জব ১: Main deploy manifest পড়ুন
  # ═══════════════════════════════════════════════════════════════
  read-manifest:
    name: 📋 Main Deploy Manifest পড়ুন
    runs-on: ubuntu-latest
    outputs:
      manifest_exists: ${{ steps.read.outputs.manifest_exists }}
      last_deploy_time: ${{ steps.read.outputs.last_deploy_time }}
      image_sha: ${{ steps.read.outputs.image_sha }}
      main_revision: ${{ steps.read.outputs.main_revision }}
      hours_since_deploy: ${{ steps.read.outputs.hours_since_deploy }}
      should_update: ${{ steps.read.outputs.should_update }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Python সেটআপ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ডিপেন্ডেন্সি ইনস্টল (requests)
        run: pip install requests

      - name: 🕒 24-Hour Schedule Gap Check
        # Zero cost অপ্টিমাইজেশনের জন্য আমরা চেক করছি গত ২৪ ঘণ্টার মধ্যে কোনো রান হয়েছে কি না
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/enforce_24h_gap.py

      - name: Deploy manifest পড়ুন
        id: read
        run: |
          if [ -f "logs/deploy/latest.json" ]; then
            echo "manifest_exists=true" >> $GITHUB_OUTPUT

            LAST_DEPLOY=$(jq -r '.timestamp' logs/deploy/latest.json)
            IMAGE_SHA=$(jq -r '.image_sha' logs/deploy/latest.json)
            MAIN_REVISION=$(jq -r '.revision' logs/deploy/latest.json)

            echo "last_deploy_time=${LAST_DEPLOY}" >> $GITHUB_OUTPUT
            echo "image_sha=${IMAGE_SHA}" >> $GITHUB_OUTPUT
            echo "main_revision=${MAIN_REVISION}" >> $GITHUB_OUTPUT

            # 24h+ আগে deploy হয়েছে কিনা চেক
            DEPLOY_EPOCH=$(date -d "${LAST_DEPLOY}" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${LAST_DEPLOY}" +%s 2>/dev/null || echo "0")
            NOW_EPOCH=$(date +%s)
            HOURS_SINCE=$(( (NOW_EPOCH - DEPLOY_EPOCH) / 3600 ))

            echo "hours_since_deploy=${HOURS_SINCE}" >> $GITHUB_OUTPUT

            if [ "${{ github.event.inputs.force_update }}" = "true" ]; then
              echo "should_update=true" >> $GITHUB_OUTPUT
              echo "⚡ Force update enabled"
            elif [ "$HOURS_SINCE" -ge 24 ]; then
              echo "should_update=true" >> $GITHUB_OUTPUT
              echo "✅ Main deploy was ${HOURS_SINCE}h ago — backup update allowed"
            else
              echo "should_update=false" >> $GITHUB_OUTPUT
              echo "⏳ Main deploy was only ${HOURS_SINCE}h ago — waiting for 24h stability"
            fi
          else
            echo "manifest_exists=false" >> $GITHUB_OUTPUT
            echo "should_update=false" >> $GITHUB_OUTPUT
            echo "⚠️ No deploy manifest found"
          fi

  # ═══════════════════════════════════════════════════════════════
  # জব ২: Main server health check
  # ═══════════════════════════════════════════════════════════════
  check-main-health:
    name: 🩺 Main Server Health Check
    runs-on: ubuntu-latest
    needs: [read-manifest]
    if: needs.read-manifest.outputs.should_update == 'true'
    outputs:
      main_healthy: ${{ steps.health.outputs.main_healthy }}
      main_url: ${{ steps.health.outputs.main_url }}
    steps:
      - name: GCP অথেন্টিকেশন
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Cloud SDK সেটআপ
        uses: google-github-actions/setup-gcloud@v2

      - name: Main server health check
        id: health
        env:
          GCP_REGION: ${{ env.GCP_REGION }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          MAIN_SERVICE: ${{ env.MAIN_SERVICE }}
        run: |
          SERVICE_JSON=$(gcloud run services describe ${MAIN_SERVICE} \
            --region ${GCP_REGION} \
            --project ${GCP_PROJECT_ID} \
            --format="json")

          MAIN_URL=$(echo "$SERVICE_JSON" | jq -r '.status.url')

          if [ -n "$MAIN_URL" ]; then
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${MAIN_URL}/health" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "main_healthy=true" >> $GITHUB_OUTPUT
              echo "✅ Main server healthy"
            else
              echo "main_healthy=false" >> $GITHUB_OUTPUT
              echo "❌ Main server unhealthy (status: $RESPONSE)"
            fi
            echo "main_url=${MAIN_URL}" >> $GITHUB_OUTPUT
          else
            echo "main_healthy=false" >> $GITHUB_OUTPUT
            echo "❌ Main URL not found"
          fi

  # ═══════════════════════════════════════════════════════════════
  # জব ৩: Backup server আপডেট
  # ═══════════════════════════════════════════════════════════════
  update-backup:
    name: 🔄 Backup Server আপডেট
    runs-on: ubuntu-latest
    needs: [read-manifest, check-main-health]
    if: >-
      needs.read-manifest.outputs.should_update == 'true' &&
      needs.check-main-health.outputs.main_healthy == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      backup_status: ${{ steps.deploy.outputs.backup_status }}
      backup_revision: ${{ steps.deploy.outputs.backup_revision }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: GCP অথেন্টিকেশন
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Cloud SDK সেটআপ
        uses: google-github-actions/setup-gcloud@v2

      - name: Backup server এ deploy
        id: deploy
        env:
          IMAGE_SHA: ${{ needs.read-manifest.outputs.image_sha }}
          GCP_BACKUP_REGION: ${{ env.GCP_BACKUP_REGION }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          BACKUP_SERVICE: ${{ env.BACKUP_SERVICE }}
          GCP_REGION: ${{ env.GCP_REGION }}
        run: |
          echo "🔄 Backup server এ deploy করছি..."
          echo "  Image: ${IMAGE_SHA}"
          echo "  Backup Region: ${GCP_BACKUP_REGION}"

          # Backup service এ deploy
          gcloud run deploy ${BACKUP_SERVICE} \
            --image ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/supremeai-repo/supremeai-api:${IMAGE_SHA} \
            --region ${GCP_BACKUP_REGION} \
            --project ${GCP_PROJECT_ID} \
            --allow-unauthenticated \
            --min-instances 0 \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300s \
            --port 8000 \
            --update-env-vars "ENV=production,ROLE=backup,GCP_PROJECT_ID=${GCP_PROJECT_ID}" \
            --update-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,NVIDIA_API_KEY=NVIDIA_API_KEY:latest,FIRECRAWL_API_KEY=FIRECRAWL_API_KEY:latest,HF_API_KEY=HF_API_KEY:latest,SENTRY_DSN=SENTRY_DSN:latest,SUPREMEAI_JWT_SECRET=JWT_SECRET:latest,SUPABASE_DATABASE_URL_POOLER=DB_DATA_SOURCE:latest,DATABASE_URL=DB_DATA_SOURCE:latest,SUPABASE_DATABASE_URL=DB_DATA_SOURCE:latest"

          # Backup revision info
          BACKUP_JSON=$(gcloud run services describe ${BACKUP_SERVICE} \
            --region ${GCP_BACKUP_REGION} \
            --project ${GCP_PROJECT_ID} \
            --format="json")

          BACKUP_REVISION=$(echo "$BACKUP_JSON" | jq -r '.status.traffic[0].revisionName')
          BACKUP_URL=$(echo "$BACKUP_JSON" | jq -r '.status.url')

          echo "backup_revision=${BACKUP_REVISION}" >> $GITHUB_OUTPUT

          # Backup health check
          echo "🩺 Backup health check..."
          HEALTHY=false
          for i in {1..6}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${BACKUP_URL}/health" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Backup health check PASSED!"
              HEALTHY=true
              break
            fi
            echo "⏳ Backup health check attempt $i/6..."
            sleep 5
          done

          if [ "$HEALTHY" = "true" ]; then
            echo "backup_status=success" >> $GITHUB_OUTPUT
            echo "✅ Backup server updated successfully"
          else
            echo "backup_status=failed" >> $GITHUB_OUTPUT
            echo "❌ Backup health check failed — rollback may be needed"
          fi

      - name: Backup deploy manifest লিখুন
        if: steps.deploy.outputs.backup_status == 'success'
        run: |
          mkdir -p logs/deploy
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > logs/deploy/backup-latest.json << JSONEOF
          {
            "timestamp": "${TIMESTAMP}",
            "source_image_sha": "${{ needs.read-manifest.outputs.image_sha }}",
            "source_main_revision": "${{ needs.read-manifest.outputs.main_revision }}",
            "backup_revision": "${{ steps.deploy.outputs.backup_revision }}",
            "backup_service": "${{ env.BACKUP_SERVICE }}",
            "backup_region": "${{ env.GCP_BACKUP_REGION }}",
            "status": "success",
            "hours_since_main_deploy": "${{ needs.read-manifest.outputs.hours_since_deploy }}"
          }
          JSONEOF

          git config user.name "SupremeAI CI Bot"
          git config user.email "ci-bot@supremeai.dev"
          git add -f logs/deploy/
          git diff --cached --quiet && echo "কোনো পরিবর্তন নেই।" || { git commit -m "ci: backup update [skip ci]" && git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}; }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # জব ৪: রিপোর্ট
  # ═══════════════════════════════════════════════════════════════
  report:
    name: 📊 Backup Update Report
    runs-on: ubuntu-latest
    needs: [read-manifest, check-main-health, update-backup]
    if: always()
    steps:
      - name: রিপোর্ট জেনারেট
        run: |
          echo "📊 Backup Update Report"
          echo "======================="
          echo "Manifest exists: ${{ needs.read-manifest.outputs.manifest_exists }}"
          echo "Should update: ${{ needs.read-manifest.outputs.should_update }}"
          echo "Hours since main deploy: ${{ needs.read-manifest.outputs.hours_since_deploy }}"
          echo "Main healthy: ${{ needs.check-main-health.outputs.main_healthy }}"
          echo "Backup status: ${{ needs.update-backup.outputs.backup_status }}"
          echo "Backup revision: ${{ needs.update-backup.outputs.backup_revision }}"
