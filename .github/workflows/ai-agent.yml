name: AI Agent Context Aggregator

on:
  push:
    branches:
      - main

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # বাংলা মন্তব্য: এআই এজেন্ট রান করার পূর্বে মডিউলার কনটেক্সটগুলো জোড়া লাগানো হচ্ছে
      - name: 🧩 Build God Context from Modules
        run: python scripts/aggregate_context.py

      # বাংলা মন্তব্য: এআই এজেন্ট এক্সিকিউশন
      - name: 🤖 Run SupremeAI Agent
        run: |
          echo "Running AI Agent with supremeai_god_context.xml..."
