name: Auto Changelog

on:
  push:
    branches: [ main ]

concurrency:
  group: "changelog-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate changelog
        run: |
          bash ./scripts/ci/generate_changelog.sh
name: Auto Changelog
on:
  push:
    branches: [main]
jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to get all tags and history
      - name: Generate changelog
        uses: mikepenz/action-changelog@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output: CHANGELOG.md
          # Uncomment the next line if you want to create a GitHub Release
          # create_release: true