name: Reusable Deploy

on:
  workflow_call:
    inputs:
      firebase_project:
        type: string
        required: true
      run_id:
        type: string
        required: false
    secrets:
      FIREBASE_SERVICE_ACCOUNT:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-${{ inputs.firebase_project }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4

    - name: ⬇️ Download artifact
      uses: actions/download-artifact@v4
      with:
        name: flutter-web-build
        path: combined_deploy/admin
        run-id: ${{ inputs.run_id || github.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: ✅ Verify artifact
      run: |
        if [ ! -d "combined_deploy/admin" ] || [ -z "$(ls -A combined_deploy/admin)" ]; then
          echo "❌ Flutter artifact missing or empty"
          exit 1
        fi
        echo "✅ Artifact verified successfully"

    - name: 🚀 Deploy to Firebase
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        projectId: ${{ inputs.firebase_project }}
        channelId: live
