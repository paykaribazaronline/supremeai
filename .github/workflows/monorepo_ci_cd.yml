name: SupremeAI Monorepo CI/CD
# Trigger workflow run to check for erasableSyntaxOnly error resolution

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      studio: ${{ steps.changes.outputs.studio }}
      mobile: ${{ steps.changes.outputs.mobile }}
      webchat: ${{ steps.changes.outputs.webchat }}
      vscode: ${{ steps.changes.outputs.vscode }}
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # ✅ FIX: Changed from 0 to 1
      - name: Detect changed packages
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/shared-types/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            studio:
              - 'apps/studio-client/**'
              - 'packages/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            mobile:
              - 'apps/mobile/**'
              - '.github/workflows/**'
            webchat:
              - 'apps/web-chat/**'
              - 'packages/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            vscode:
              - 'tools/vscode-extension/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            infra:
              - 'infrastructure/**'
              - '.github/workflows/**'

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'  # ✅ Skip if no backend changes
    timeout-minutes: 15
    env:
      PYTHONPATH: ..:.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        # [2026-06-21] v2: Bumped cache key to bust corrupt 8.5GB cache (partial-write tar error).
        # Excluded torch/triton from cache path — they are huge (~2GB) and cause corruption.
        id: poetry-cache
        uses: actions/cache@v4
        continue-on-error: true  # Don't fail if cache restore is corrupt
        with:
          path: |
            backend/.venv
            ~/.cache/pypoetry/cache
            ~/.cache/pypoetry/artifacts
          key: v2-${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock', 'backend/pyproject.toml') }}
          restore-keys: |
            v2-${{ runner.os }}-poetry-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        # [2026-06-21] Always run install — avoids broken state from partial cache hits
        working-directory: backend
        run: |
          poetry install --no-interaction --no-ansi --no-root
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Run linting (Ruff)
        working-directory: backend
        run: poetry run ruff check . --output-format=github

      - name: Run type check (MyPy)
        working-directory: backend
        run: poetry run mypy core/ brain/ api/ memory/ --ignore-missing-imports --explicit-package-bases

      - name: Run tests
        working-directory: backend
        run: |
          poetry run pytest --cov=core --cov=brain --cov=tools --cov=api --cov=memory --cov-report=xml --cov-report=term-missing --cov-fail-under=90 -q

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend

  studio-build:
    name: Studio Client Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.studio == 'true'  # ✅ Skip if no studio changes
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Check lockfile
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml missing! Run 'pnpm install' locally and commit it."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build studio client
        run: pnpm turbo run build --filter=supremeai-studio-client
        env:
          NODE_ENV: production
          VITE_API_BASE: ${{ vars.CLOUD_RUN_URL || 'https://supremeai-api-565236080752.us-central1.run.app' }}
          API_URL: ${{ vars.API_URL || 'http://127.0.0.1:8000' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY || '' }}

      - name: Lint studio client
        run: pnpm turbo run lint --filter=supremeai-studio-client

      - name: Test studio client
        run: pnpm turbo run test --filter=supremeai-studio-client

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-build
          path: apps/studio-client/dist

  mobile-analyze:
    name: Mobile App Analysis
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'  # ✅ Skip if no mobile changes
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile/.dart_tool
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('apps/mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze

      - name: Test
        working-directory: apps/mobile
        run: flutter test

  webchat-build:
    name: Web Chat Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.webchat == 'true'  # ✅ Skip if no webchat changes
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Check lockfile
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml missing! Run 'pnpm install' locally and commit it."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build web chat
        run: pnpm --filter web-chat run build
        env:
          NODE_ENV: production
          API_URL: ${{ vars.API_URL || 'http://127.0.0.1:8000' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY || '' }}

  vscode-build:
    name: VS Code Extension Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.vscode == 'true'  # ✅ Skip if no vscode changes
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build extension
        run: pnpm turbo run build --filter=supremeai-vscode

  prompt-eval:
    name: LLM Prompt Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🚀 Run Promptfoo Evaluation
        # [2026-06-21] Modified by Antigravity: dynamically choose provider to avoid Missing API Key errors when only Gemini key is present.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        if: ${{ env.OPENAI_API_KEY != '' || env.GEMINI_API_KEY != '' }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            npx -y promptfoo@latest eval
          else
            npx -y promptfoo@latest eval --providers "google:gemini-1.5-flash"
          fi

  # ✅ NEW: Split deploy into backend + frontend
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: [backend-test, detect-changes]
    if: github.repository == 'paykaribazaronline/supremeai' && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.backend == 'true'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker to GAR
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          provenance: false  # ✅ FIX: Skip provenance for faster builds
          tags: |
            ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:${{ github.sha }}
            ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:latest
          cache-from: type=registry,ref=${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:cache
          cache-to: type=registry,ref=${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:cache,mode=min  # ✅ FIX: mode=min instead of mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy supremeai-api \
            --image ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api:${{ github.sha }} \
            --region ${{ vars.GCP_REGION || 'us-central1' }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --min-instances 1 \
            --cpu-boost \
            --set-env-vars "ENV=production,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }},DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }},NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }},FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }},HF_API_KEY=${{ secrets.HUGGINGFACE_API_KEY }},SENTRY_DSN=${{ secrets.SENTRY_DSN }}"


  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    needs: [studio-build, webchat-build, detect-changes]
    if: github.repository == 'paykaribazaronline/supremeai' && github.ref == 'refs/heads/main' && github.event_name == 'push' && (needs.detect-changes.outputs.studio == 'true' || needs.detect-changes.outputs.webchat == 'true')
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download studio build
        if: needs.detect-changes.outputs.studio == 'true'
        uses: actions/download-artifact@v4
        with:
          name: studio-build
          path: apps/studio-client/dist

      - name: Deploy studio to Firebase
        if: needs.detect-changes.outputs.studio == 'true'
        run: |
          cd apps/studio-client
          # Ensure supremeai-admin site is created in the project (fails silently if already exists)
          npx -y firebase-tools hosting:sites:create supremeai-admin --project ${{ secrets.GCP_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}" || true
          npx -y firebase-tools deploy --only hosting --project ${{ secrets.GCP_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}"

  staging-dispatch:
    name: Staging Dispatch Trigger
    runs-on: ubuntu-latest
    needs: [backend-test, studio-build, mobile-analyze, webchat-build, vscode-build, prompt-eval]
    if: github.repository == 'saifulhaqueniloy/supremeai' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Main Repo Deployment
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.MAIN_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type": "staging-passed"}' \
            https://api.github.com/repos/paykaribazaronline/supremeai/dispatches

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [backend-test, studio-build, mobile-analyze, webchat-build, vscode-build, prompt-eval, deploy-backend, deploy-frontend, staging-dispatch]
    if: always()
    steps:
      - name: Send Discord notification
        if: ${{ failure() }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "❌ SupremeAI CI/CD failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send Discord Success notification
        if: ${{ success() }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "✅ SupremeAI CI/CD succeeded! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

