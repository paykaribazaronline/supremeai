name: Comprehensive CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      skipTests:
        description: 'Skip tests (only for hotfixes)'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'
  GCP_REGION: us-central1
  SERVICE_NAME: supremeai

jobs:
  quality-analysis:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Configure Gradle properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties

      - name: Run SonarQube scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "SonarQube not configured, skipping..."
          else
            ./gradlew sonarqube --no-daemon
          fi
        continue-on-error: true

      - name: Check security vulnerabilities
        run: |
          ./gradlew dependencyCheckAnalyze --no-daemon 2>&1 || true
        continue-on-error: true

  build-matrix:
    name: Build (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        java: [17, 21]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.java }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.java }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Configure Gradle properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.workers.max=$(nproc)" >> gradle.properties

      - name: Build with Gradle
        run: ./gradlew clean build -x test --info --stacktrace --no-daemon --max-workers=2
        env:
          SUPREMEAI_SELFHEALING_PHOENIX_ENABLED: 'true'

      - name: Run unit tests
        if: github.event.inputs.skipTests != 'true'
        run: ./gradlew test --info --stacktrace --no-daemon --max-workers=2 --tests "*UnitTest"
        continue-on-error: true
        timeout-minutes: 20

      - name: Run integration tests
        if: github.event.inputs.skipTests != 'true'
        run: ./gradlew test --info --stacktrace --no-daemon --max-workers=2 --tests "*IntegrationTest"
        continue-on-error: true
        timeout-minutes: 20

  docker-build:
    name: Docker Build and Registry Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-analysis, build-matrix]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve GCP project
        id: project
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          if [ -z "$PROJECT" ]; then
            PROJECT=$(gcloud config get-value project 2>/dev/null)
          fi
          if [ -z "$PROJECT" ]; then
            echo "GCP_PROJECT_ID not set"
            exit 1
          fi
          echo "project_id=$PROJECT" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}" \
            -t "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Run Trivy security scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --severity HIGH,CRITICAL \
            "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}" \
            && echo "Security scan passed"
        continue-on-error: true

      - name: Push to Google Container Registry
        run: |
          docker push "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}"
          docker push "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:latest"
          echo "Images pushed successfully"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      id-token: write

    environment:
      name: staging
      url: https://staging-supremeai.run.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve GCP project
        id: project
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          echo "project_id=$PROJECT" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run (staging)
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}-staging" \
            --image="gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --max-instances=5 \
            --min-instances=0 \
            --allow-unauthenticated \
            --project="${{ steps.project.outputs.project_id }}" \
            --quiet

      - name: Run staging health check
        continue-on-error: true
        run: |
          sleep 15
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}-staging" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ steps.project.outputs.project_id }}" \
            --format='value(status.url)')
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/actuator/health" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Staging deployment healthy"
          else
            echo "Staging health check: $HTTP_CODE"
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    environment:
      name: production
      url: https://supremeai-565236080752.us-central1.run.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve GCP project
        id: project
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          echo "project_id=$PROJECT" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run (production)
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image="gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --port=8080 \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=80 \
            --max-instances=10 \
            --min-instances=1 \
            --timeout=300 \
            --cpu-boost \
            --allow-unauthenticated \
            --project="${{ steps.project.outputs.project_id }}" \
            --quiet

      - name: Run production health check
        timeout-minutes: 5
        continue-on-error: false
        run: |
          sleep 20
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ steps.project.outputs.project_id }}" \
            --format='value(status.url)')
          for i in {1..5}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/actuator/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Production deployment healthy (attempt $i)"
              exit 0
            fi
            echo "Health check failed ($HTTP_CODE), attempt $i/5"
            if [ $i -lt 5 ]; then sleep 10; fi
          done
          echo "Health check failed after 5 attempts, rolling back..."
          exit 1

      - name: Roll back on failure
        if: failure()
        continue-on-error: true
        run: |
          echo "Rolling back to previous stable version..."
          PREVIOUS_SHORT=$(git rev-parse --short HEAD^ 2>/dev/null || echo "latest")
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image="gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:$PREVIOUS_SHORT" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ steps.project.outputs.project_id }}" \
            --quiet || echo "Rollback failed, manual intervention needed"

      - name: Get service URL
        id: get-url
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ steps.project.outputs.project_id }}" \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Write deployment summary
        if: always()
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.get-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Build status
        run: |
          echo "## Pipeline Summary"
          echo "- Staging: ${{ needs.deploy-staging.result }}"
          echo "- Production: ${{ needs.deploy-production.result }}"

      - name: Send Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "SupremeAI pipeline failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
