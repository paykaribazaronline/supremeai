name: Auto Deploy (manual)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy script
        run: |
          bash ./scripts/ci/deploy.sh
name: Auto Deploy SupremeAI
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install poetry
          poetry install --no-interaction --no-ansi
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: supremeai-backend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/supremeai-backend:${{ github.sha }}
          region: us-central1
          platform: managed
          allow-unauthenticated: true
          # Use the built-in Cloud Build to build the image
          # Alternatively, we can build and push the image ourselves
      - name: Set up Node.js for frontend
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        working-directory: ./apps/studio-client
        run: |
          npm ci
          npm run build
      - name: Deploy frontend to Firebase Hosting
        run: |
          firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}