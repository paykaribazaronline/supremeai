name: SupremeAI CodeFlow Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

jobs:
  analyze:
    name: CodeFlow Repository Analysis
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Dependencies
        run: |
          npm ci
          npm run compile 2>/dev/null || true

      - name: Run CodeFlow Analyzer
        id: codeflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPREMEAI_API_URL: ${{ secrets.SUPREMEAI_API_URL }}
          SUPREMEAI_API_KEY: ${{ secrets.SUPREMEAI_API_KEY }}
        run: |
          #!/bin/bash
          set -e
          
          echo "::group::CodeFlow Analysis"
          
          # Configuration
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          BRANCH="${GITHUB_REF#refs/heads/}"
          COMMIT_SHA="${GITHUB_SHA}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          echo "Repository: ${REPO_OWNER}/${REPO_NAME}"
          echo "Branch: ${BRANCH}"
          echo "Commit: ${COMMIT_SHA}"
          echo "PR: ${PR_NUMBER}"
          
          # Create analysis report directory
          REPORT_DIR=".github/codeflow-reports"
          mkdir -p "${REPORT_DIR}"
          
          # Run local analysis using Node.js script
          if [ -f "dashboard/src/lib/codeflow-analyzer.js" ]; then
            echo "Running CodeFlow analyzer..."
            node dashboard/src/lib/codeflow-analyzer.js \
              --repo "${REPO_URL}" \
              --output "${REPORT_DIR}" \
              --format svg,json \
              --styles compact,row,minimal,hero,detailed \
              2>&1 || echo "Analyzer script not found, using fallback"
          fi
          
          # Generate SVG badges
          echo "::group::Generating Health Badges"
          
          # Calculate basic metrics
          TOTAL_FILES=$(find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.tsx" -o -name "*.jsx" -o -name "*.java" -o -name "*.go" -o -name "*.rs" -o -name "*.rb" -o -name "*.c" -o -name "*.cpp" -o -name "*.h" \) ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/dist/*" ! -path "*/build/*" | wc -l)
          TOTAL_LINES=$(find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.tsx" -o -name "*.jsx" -o -name "*.java" -o -name "*.go" -o -name "*.rs" -o -name "*.rb" -o -name "*.c" -o -name "*.cpp" -o -name "*.h" \) ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/dist/*" ! -path "*/build/*" -exec cat {} \; | wc -l)
          
          # Security scan
          SECURITY_CRITICAL=0
          SECURITY_HIGH=0
          SECURITY_MEDIUM=0
          
          # Check for common security issues
          if grep -r "password\s*=\s*['\"]" . --include="*.js" --include="*.ts" --include="*.py" --include="*.java" 2>/dev/null | grep -v node_modules | grep -v ".git" | grep -v test | head -5; then
            SECURITY_HIGH=$((SECURITY_HIGH + 1))
          fi
          
          if grep -r "eval(" . --include="*.js" --include="*.ts" 2>/dev/null | grep -v node_modules | grep -v ".git" | head -5; then
            SECURITY_CRITICAL=$((SECURITY_CRITICAL + 1))
          fi
          
          # Calculate health score (simplified)
          HEALTH_SCORE=100
          HEALTH_SCORE=$((HEALTH_SCORE - SECURITY_CRITICAL * 15))
          HEALTH_SCORE=$((HEALTH_SCORE - SECURITY_HIGH * 8))
          HEALTH_SCORE=$((HEALTH_SCORE - SECURITY_MEDIUM * 4))
          
          if [ $HEALTH_SCORE -lt 0 ]; then
            HEALTH_SCORE=0
          fi
          
          # Determine grade
          if [ $HEALTH_SCORE -ge 90 ]; then
            HEALTH_GRADE="A"
            HEALTH_COLOR="#52c41a"
          elif [ $HEALTH_SCORE -ge 80 ]; then
            HEALTH_GRADE="B"
            HEALTH_COLOR="#1890ff"
          elif [ $HEALTH_SCORE -ge 70 ]; then
            HEALTH_GRADE="C"
            HEALTH_COLOR="#faad14"
          elif [ $HEALTH_SCORE -ge 60 ]; then
            HEALTH_GRADE="D"
            HEALTH_COLOR="#ff7875"
          else
            HEALTH_GRADE="F"
            HEALTH_COLOR="#ff4d4f"
          fi
          
          echo "Health Score: ${HEALTH_SCORE}/100 (${HEALTH_GRADE})"
          echo "Security Issues - Critical: ${SECURITY_CRITICAL}, High: ${SECURITY_HIGH}, Medium: ${SECURITY_MEDIUM}"
          echo "Files: ${TOTAL_FILES}, Lines: ${TOTAL_LINES}"
          
          # Generate SVG badge
          cat > "${REPORT_DIR}/health-badge.svg" << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="110" height="20">
            <linearGradient id="b" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="a">
              <rect width="110" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#a)">
              <path fill="#555" d="M0 0h60v20H0z"/>
              <path fill="${HEALTH_COLOR}" d="M60 0h50v20H60z"/>
              <path fill="url(#b)" d="M0 0h110v20H0z"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="30" y="15" fill="#010101" fill-opacity=".3">Health</text>
              <text x="30" y="14">Health</text>
              <text x="84" y="15" fill="#010101" fill-opacity=".3">${HEALTH_SCORE}</text>
              <text x="84" y="14">${HEALTH_SCORE}</text>
            </g>
          </svg>
          EOF
          
          # Generate detailed report
          cat > "${REPORT_DIR}/analysis-report.json" << EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${BRANCH}",
            "commit": "${COMMIT_SHA}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "metrics": {
              "healthScore": ${HEALTH_SCORE},
              "healthGrade": "${HEALTH_GRADE}",
              "totalFiles": ${TOTAL_FILES},
              "totalLines": ${TOTAL_LINES},
              "security": {
                "critical": ${SECURITY_CRITICAL},
                "high": ${SECURITY_HIGH},
                "medium": ${SECURITY_MEDIUM}
              }
            },
            "analysis": {
              "status": "completed",
              "type": "automated",
              "tool": "CodeFlow"
            }
          }
          EOF
          
          echo "::endgroup::"
          
          # Output for subsequent steps
          echo "health_score=${HEALTH_SCORE}" >> $GITHUB_OUTPUT
          echo "health_grade=${HEALTH_GRADE}" >> $GITHUB_OUTPUT
          echo "security_critical=${SECURITY_CRITICAL}" >> $GITHUB_OUTPUT
          echo "security_high=${SECURITY_HIGH}" >> $GITHUB_OUTPUT
          echo "report_dir=${REPORT_DIR}" >> $GITHUB_OUTPUT

      - name: Generate SVG Cards
        if: always()
        run: |
          echo "::group::Generating SVG Cards"
          
          REPORT_DIR="${{ steps.codeflow.outputs.report_dir }}"
          HEALTH_SCORE="${{ steps.codeflow.outputs.health_score }}"
          HEALTH_GRADE="${{ steps.codeflow.outputs.health_grade }}"
          
          # Compact card
          cat > "${REPORT_DIR}/card-compact.svg" << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="300" height="80">
            <rect width="300" height="80" fill="#16161a" rx="8"/>
            <text x="10" y="25" fill="#f0f0f2" font-family="sans-serif" font-size="14">CodeFlow Analysis</text>
            <circle cx="280" cy="40" r="12" fill="${HEALTH_COLOR}"/>
            <text x="280" y="45" fill="white" font-family="sans-serif" font-size="10" text-anchor="middle">${HEALTH_GRADE}</text>
            <text x="10" y="55" fill="#a3a3a3" font-family="sans-serif" font-size="12">Score: ${HEALTH_SCORE}/100</text>
          </svg>
          EOF
          
          # Row card
          cat > "${REPORT_DIR}/card-row.svg" << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="400" height="60">
            <rect width="400" height="60" fill="#0a0a0c" rx="6"/>
            <text x="10" y="20" fill="#00ff9d" font-family="sans-serif" font-size="12">CodeFlow</text>
            <rect x="10" y="30" width="${HEALTH_SCORE}" height="8" fill="${HEALTH_COLOR}" rx="4"/>
            <rect x="10" y="30" width="100" height="8" fill="none" stroke="#262626" stroke-width="1" rx="4"/>
            <text x="115" y="36" fill="#f0f0f2" font-family="sans-serif" font-size="10">${HEALTH_SCORE}/100</text>
          </svg>
          EOF
          
          echo "::endgroup::"

      - name: Commit and Push Reports
        if: always()
        run: |
          echo "::group::Committing Reports"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all report files
          git add .github/codeflow-reports/ || true
          
          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update CodeFlow analysis reports [skip ci]" -m "Health Score: ${{ steps.codeflow.outputs.health_score }}/${{ steps.codeflow.outputs.health_grade }}" || true
            git push origin HEAD:${GITHUB_REF#refs/heads/} || true
          fi
          
          echo "::endgroup::"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const healthScore = '${{ steps.codeflow.outputs.health_score }}';
            const healthGrade = '${{ steps.codeflow.outputs.health_grade }}';
            const securityCritical = '${{ steps.codeflow.outputs.security_critical }}';
            const securityHigh = '${{ steps.codeflow.outputs.security_high }}';
            
            let color = '#52c41a';
            if (healthGrade === 'D') color = '#ff7875';
            if (healthGrade === 'F') color = '#ff4d4f';
            if (healthGrade === 'C') color = '#faad14';
            if (healthGrade === 'B') color = '#1890ff';
            
            const body = `
              ## 🔍 CodeFlow Analysis Report
              
              <div align="center">
                
              ### Health Score: **${healthScore}/100** (${healthGrade})
              
              ![Health Badge](https://img.shields.io/badge/Health-${healthScore}-${healthGrade === 'A' ? '52c41a' : healthGrade === 'B' ? '1890ff' : healthGrade === 'C' ? 'faad14' : healthGrade === 'D' ? 'ff7875' : 'ff4d4f'})
              
              </div>
              
              ### 📊 Metrics
              
              | Metric | Value |
              |--------|-------|
              | Health Grade | **${healthGrade}** |
              | Health Score | **${healthScore}/100** |
              | Security Critical | ${securityCritical || 0} |
              | Security High | ${securityHigh || 0} |
              
              ### 🔒 Security Status
              
              ${securityCritical > 0 || securityHigh > 0 ? '⚠️ **Security issues detected!** Please review the report.' : '✅ No critical security issues found.'}
              
              ### 📁 Reports
              
              - [Health Badge](.github/codeflow-reports/health-badge.svg)
              - [Analysis Report](.github/codeflow-reports/analysis-report.json)
              
              ---
              
              *Automated by SupremeAI CodeFlow*
            `;
            
            // Check for existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(c => 
              c.body.includes('CodeFlow Analysis Report')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }


  # Deploy to Firebase if on main branch
  deploy:
    name: Deploy Analysis Results
    needs: analyze
    if: github.ref == 'refs/heads/main' && always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          target: codeflow-reports

  # Notify on failure
  notify:
    name: Send Notification
    needs: [analyze, deploy]
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "🚨 CodeFlow Analysis Failed",
              "attachments": [{
                "color": "#ff4d4f",
                "fields": [{
                  "title": "Repository",
                  "value": "'"${GITHUB_REPOSITORY}"'",
                  "short": true
                },{
                  "title": "Workflow",
                  "value": "'"${GITHUB_WORKFLOW}"'",
                  "short": true
                },{
                  "title": "Run URL",
                  "value": "'"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"'",
                  "short": false
                }]
              }]
            }' $SLACK_WEBHOOK_URL || true