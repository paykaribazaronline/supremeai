name: Smart CI/CD Pipeline

on:
  push:
    branches: [ main, develop, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Secret Scanning via Gitleaks
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Gitleaks secret scan
        uses: zricethezav/gitleaks-action@v1.3.0
        with:
          args: --redact

  # 2. CodeQL Static Application Security Testing (SAST)
  codeql-scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin', 'javascript-typescript' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild Backend (Java)
        if: matrix.language == 'java-kotlin'
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # 3. Path Filter for Selective CI/CD
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'build.gradle.kts'
              - 'gradle/**'
              - 'gradlew*'
              - 'infra/Dockerfile'
              - '.github/workflows/smart-ci-cd.yml'
            frontend:
              - 'dashboard/**'
              - '.github/workflows/smart-ci-cd.yml'
            functions:
              - 'functions/**'
              - '.github/workflows/smart-ci-cd.yml'

  # 4. Backend Testing and Deployment
  backend-ci:
    name: Backend CI/CD
    needs: [detect-changes, secret-scan]
    if: ${{ needs.detect-changes.outputs.backend == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Run Spotless Code Format Check
        run: |
          chmod +x gradlew
          ./gradlew spotlessCheck --no-daemon

      - name: Run Backend Unit Tests
        run: ./gradlew clean test --no-daemon

      - name: Set up Google Cloud SDK
        uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up QEMU
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GCP
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Docker Image (with cache)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: gcr.io/${{ steps.auth.outputs.project_id }}/supremeai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Deploy to Cloud Run
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          gcloud run deploy supremeai \
            --image=gcr.io/${{ steps.auth.outputs.project_id }}/supremeai-backend:latest \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=SPRING_PROFILES_ACTIVE=cloud \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=80 \
            --timeout=300 \
            --max-instances=10 \
            --min-instances=1

      - name: Report Status to Admin Dashboard
        if: always()
        env:
          PROJECT_ID: ${{ steps.auth.outputs.project_id }}
        run: |
          if [ -n "$PROJECT_ID" ]; then
            FILES_JSON=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | jq -R . | jq -s .)
            COMMIT_MSG=$(echo "[Backend] ${{ job.status }} - ${{ github.event.head_commit.message }}" | jq -R .)
            
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "{
                \"commitMessage\": $COMMIT_MSG,
                \"changedFiles\": $FILES_JSON,
                \"author\": \"${{ github.actor }}\",
                \"branch\": \"${{ github.ref_name }}\",
                \"runId\": \"${{ github.run_id }}\"
              }" \
              "https://us-central1-$PROJECT_ID.cloudfunctions.net/analyzeDeployment" || echo "Dashboard notification failed"
          else
            echo "GCP Auth not available, skipping dashboard report"
          fi

  # 5. AI Validation Pipeline
  ai-validation-ci:
    name: AI Validation
    needs: [detect-changes, backend-ci]
    if: ${{ needs.detect-changes.outputs.backend == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
        continue-on-error: true

      - name: Run Backend for Validation
        env:
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x gradlew
          nohup ./gradlew bootRun --no-daemon > backend.log 2>&1 &
          for i in $(seq 1 90); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health | grep -q "200"; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($((i*3))s)"
            sleep 3
          done
          if ! curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health | grep -q "200"; then
            echo "ERROR: backend failed to become healthy within timeout"
            cat backend.log || true
            exit 1
          fi

      - name: Run AI validation script
        run: |
          chmod +x scripts/validate_ai.sh
          export AI_VALIDATION_BASE_URL=http://127.0.0.1:8080
          export AI_VALIDATION_ENDPOINT=/api/chat/send
          attempts=3
          backoff=5
          for i in $(seq 1 "$attempts"); do
            echo "AI validation attempt $i/$attempts"
            bash scripts/validate_ai.sh
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "AI validation succeeded"
              break
            fi
            echo "AI validation failed with exit code $rc"
            if [ "$i" -lt "$attempts" ]; then
              echo "Retrying after ${backoff}s..."
              sleep "$backoff"
            else
              echo "Exceeded retry limit ($attempts)"
              exit "$rc"
            fi
          done

      - name: Archive validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supeAI-validation-artifacts
          path: |
            backend.log
            ai_validation_report.json

  # 6. Frontend Testing and Deployment
  frontend-ci:
    name: Frontend CI/CD
    needs: [detect-changes, secret-scan]
    if: ${{ needs.detect-changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache-dependency-path: package-lock.json
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci -w dashboard

      - name: Run Frontend Lint Checks
        run: npm run lint -w dashboard

      - name: Run Frontend Tests
        run: npm run test -w dashboard -- --run || echo "No tests or test command failed"

      - name: Build Dashboard
        run: npm run build -w dashboard

      - name: Prepare Dashboard for Firebase
        run: |
          mkdir -p public
          cp -R dashboard/dist/. public/

      - name: Authenticate to Google Cloud (Firebase)
        uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Hosting (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npx firebase-tools deploy --only hosting --project ${{ steps.auth.outputs.project_id }} --non-interactive --force

      - name: Deploy to Firebase Hosting (Preview)
        if: github.event_name == 'pull_request'
        id: firebase_preview
        run: |
          PREVIEW_URL=$(npx firebase-tools hosting:channel:deploy pr-${{ github.event.number }} --project ${{ steps.auth.outputs.project_id }} --json | jq -r '.result.hosting.urls[0]')
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request' && steps.firebase_preview.outputs.preview_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.firebase_preview.outputs.preview_url }}
        run: |
          gh pr comment ${{ github.event.number }} --body "🚀 **Firebase Hosting Preview Deployment Succeeded!**
          
          🔗 Preview URL: $PREVIEW_URL
          _Built on commit \`${{ github.sha }}\`_"

      - name: Report Status to Admin Dashboard
        if: always()
        env:
          PROJECT_ID: ${{ steps.auth.outputs.project_id }}
        run: |
          if [ -n "$PROJECT_ID" ]; then
            FILES_JSON=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | jq -R . | jq -s .)
            COMMIT_MSG=$(echo "[Frontend] ${{ job.status }} - ${{ github.event.head_commit.message }}" | jq -R .)
            
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "{
                \"commitMessage\": $COMMIT_MSG,
                \"changedFiles\": $FILES_JSON,
                \"author\": \"${{ github.actor }}\",
                \"branch\": \"${{ github.ref_name }}\",
                \"runId\": \"${{ github.run_id }}\"
              }" \
              "https://us-central1-$PROJECT_ID.cloudfunctions.net/analyzeDeployment" || echo "Dashboard notification failed"
          else
            echo "GCP Auth not available, skipping dashboard report"
          fi

  # 6. Firebase Functions Deployment
  functions-ci:
    name: Functions CI/CD
    needs: [detect-changes, secret-scan]
    if: ${{ needs.detect-changes.outputs.functions == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache-dependency-path: package-lock.json
          cache: 'npm'

      - name: Install Functions Dependencies
        run: npm ci -w functions

      - name: Compile TypeScript Functions
        run: npm run build -w functions

      - name: Authenticate to Google Cloud (Firebase)
        uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Functions
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npx firebase-tools deploy --only functions --project ${{ steps.auth.outputs.project_id }} --non-interactive --force

      - name: Report Status to Admin Dashboard
        if: always()
        env:
          PROJECT_ID: ${{ steps.auth.outputs.project_id }}
        run: |
          if [ -n "$PROJECT_ID" ]; then
            FILES_JSON=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | jq -R . | jq -s .)
            COMMIT_MSG=$(echo "[Functions] ${{ job.status }} - ${{ github.event.head_commit.message }}" | jq -R .)
            
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "{
                \"commitMessage\": $COMMIT_MSG,
                \"changedFiles\": $FILES_JSON,
                \"author\": \"${{ github.actor }}\",
                \"branch\": \"${{ github.ref_name }}\",
                \"runId\": \"${{ github.run_id }}\"
              }" \
              "https://us-central1-$PROJECT_ID.cloudfunctions.net/analyzeDeployment" || echo "Dashboard notification failed"
          else
            echo "GCP Auth not available, skipping dashboard report"
          fi

  # 7. Dependabot Auto-Merge
  dependabot-merge:
    name: Dependabot Auto-Merge
    needs: [backend-ci, frontend-ci, functions-ci]
    if: github.event.pull_request.user.login == 'dependabot[bot]' && always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check CI Status
        if: |
          contains(needs.backend-ci.result, 'failure') ||
          contains(needs.frontend-ci.result, 'failure') ||
          contains(needs.functions-ci.result, 'failure')
        run: |
          echo "CI/CD checks failed, blocking auto-merge."
          exit 1

      - name: Fetch Dependabot Metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable Auto-Merge for Dependabot PR
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
