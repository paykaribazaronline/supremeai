name: CI Path-Based Trigger

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-paths:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      flutter: ${{ steps.changes.outputs.flutter }}
      mobile: ${{ steps.changes.outputs.mobile }}
      web: ${{ steps.changes.outputs.web }}
      backend: ${{ steps.changes.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            flutter: 'interfaces/supremeai-studio-client/**'
            mobile: 'interfaces/mobile/**'
            web: 'interfaces/web_chat/**'
            backend: |
              core/**
              brain/**
              tools/**
              api/**
              memory/**
              interfaces/supremeai-vscode-extension/**

  backend-lint-test:
    name: Backend
    runs-on: ubuntu-latest
    needs: analyze-paths
    if: ${{ needs.analyze-paths.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r requirements.txt
      - name: Lint
        run: |
          ruff check core brain tools api routes || true
      - name: Unit tests
        run: pytest tests

  studio-client:
    name: Studio Client
    runs-on: ubuntu-latest
    needs: analyze-paths
    if: ${{ needs.analyze-paths.outputs.flutter || needs.analyze-paths.outputs.mobile || needs.analyze-paths.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: |
          cd interfaces/supremeai-studio-client && npm ci
      - name: Build
        run: |
          cd interfaces/supremeai-studio-client && npm run build
      - name: Test
        run: |
          if [ -d interfaces/supremeai-studio-client/src/test ]; then cd interfaces/supremeai-studio-client && npm run test; fi

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    needs: analyze-paths
    if: ${{ needs.analyze-paths.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Install deps
        working-directory: interfaces/mobile
        run: flutter pub get
      - name: Analyze
        working-directory: interfaces/mobile
        run: flutter analyze
      - name: Tests
        working-directory: interfaces/mobile
        run: flutter test

  web-chat:
    name: Web Chat
    runs-on: ubuntu-latest
    needs: analyze-paths
    if: ${{ needs.analyze-paths.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - name: HTML sanity check
        run: |
          test -f interfaces/web_chat/index.html && echo 'web chat present' || echo 'web chat missing'
