name: Staging Validation

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Staging Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt || true
          pip install -r backend/requirements-prod.txt || true

      - name: Run Python Linter
        run: |
          pip install ruff || true
          ruff check backend/ || true

      - name: Run Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          python -m pytest backend/tests/ || true

      - name: Trigger Main Repo Deployment
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.MAIN_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type": "staging-passed"}' \
            https://api.github.com/repos/paykaribazaronline/supremeai/dispatches
