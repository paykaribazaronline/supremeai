name: Staging Validation

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Staging Validation (Ultra-Fast)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Staging Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # LAYER 1: OS-Level Package Cache
      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('**/apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      # LAYER 2: Language Runtime & Dependency Cache
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        id: poetry-cache
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock', 'backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        if: steps.poetry-cache.outputs.cache-hit != 'true'
        working-directory: backend
        run: |
          poetry install --no-interaction --no-ansi --no-root
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      # Parallel checks for linting, type-checking and tests
      - name: Run checks in parallel
        working-directory: backend
        run: |
          poetry run ruff check . --output-format=github &
          poetry run mypy core/ brain/ api/ memory/ --ignore-missing-imports --explicit-package-bases || true &
          (export PYTHONPATH=$PYTHONPATH:$(pwd) && poetry run pytest -q) &
          wait

      # LAYER 4: Cache Build Artifacts on Success
      - name: Cache Build Artifacts on Success
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            apps/studio-client/dist
          key: build-${{ github.sha }}

      - name: Trigger Main Repo Deployment
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.MAIN_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type": "staging-passed"}' \
            https://api.github.com/repos/paykaribazaronline/supremeai/dispatches
