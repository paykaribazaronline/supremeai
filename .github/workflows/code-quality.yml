name: Code Quality Analysis

on:
  push:
    branches: [ main, develop, feature/*, bugfix/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run quality analysis daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '17'

jobs:
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['java', 'javascript']

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🔧 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: ☕ Set up JDK 17
        if: matrix.language == 'java'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Set up Node.js 24
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 🔐 Grant execute permission
        if: matrix.language == 'java'
        run: chmod +x gradlew

      - name: 🧹 Reset Gradle state for CodeQL
        if: matrix.language == 'java'
        run: ./gradlew --stop

      - name: 🔨 Build Java code (for CodeQL)
        if: matrix.language == 'java'
        run: ./gradlew clean compileJava processResources classes -x test --stacktrace --info --no-daemon --no-build-cache --rerun-tasks

      - name: 🔎 Verify Java classes were generated
        if: matrix.language == 'java'
        run: |
          if [ ! -d build/classes/java/main ]; then
            echo "❌ CodeQL build did not produce build/classes/java/main"
            exit 1
          fi

          CLASS_COUNT=$(find build/classes/java/main -name '*.class' | wc -l)
          echo "Compiled class count: ${CLASS_COUNT}"

          if [ "${CLASS_COUNT}" -eq 0 ]; then
            echo "❌ CodeQL build completed without generating any Java class files"
            exit 1
          fi

      - name: 📊 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          wait-for-processing: true

  sonarqube:
    name: SonarQube Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📓 Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: 🔍 Build and analyze with SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ ! -z "$SONAR_TOKEN" ]; then
            ./gradlew clean build sonarqube \
              -Dsonar.projectKey=paykaribazaronline_supremeai \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=$SONAR_TOKEN \
              --stacktrace --no-daemon
          else
            echo "⚠️ SONAR_TOKEN not configured. Skipping SonarQube analysis."
            echo "To enable: Set SONAR_TOKEN secret in GitHub repository settings"
          fi
        continue-on-error: true

  linting:
    name: Code Linting & Style
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: � Set up Node.js for Markdown Linting
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: �📝 Run Gradle linting
        run: ./gradlew check -x test --stacktrace --no-daemon
        continue-on-error: true

      - name: 📋 Markdown Linting
        run: |
          npm install -g markdownlint-cli
          markdownlint '**/*.md' --ignore node_modules --ignore flutter_admin_app 2>&1 | head -50 || true
        continue-on-error: true

  test-coverage:
    name: Test Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: 📊 Run tests with coverage
        run: ./gradlew test jacocoTestReport --stacktrace --no-daemon
        continue-on-error: true

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: java
          name: Java Coverage
          fail_ci_if_error: false
        continue-on-error: true

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 🔍 Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'SupremeAI'
          path: '.'
          format: 'JSON'
          args: >
            --enable-retired
            --enableVerbose
            --suppression .github/dependencycheck-suppression.xml
        continue-on-error: true

      - name: 📤 Upload DependencyCheck results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./reports/dependency-check-report.sarif
          wait-for-processing: true
        continue-on-error: true

  quality-report:
    name: Generate Quality Summary
    runs-on: ubuntu-latest
    needs: [codeql, linting, test-coverage]
    if: always()
    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📊 Generate Quality Report
        run: |
          echo "## 📊 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Coverage | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Workflow:** Code Quality Analysis" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ **Triggered:** $(date)" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Code Quality Analysis complete! Check the workflow run for details.'
            })
        continue-on-error: true
