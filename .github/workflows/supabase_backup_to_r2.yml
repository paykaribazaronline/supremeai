name: Zero-Cost Supabase Backup to R2

on:
  schedule:
    # প্রতি রবিবার রাত ২টায় (UTC) অটোমেটিক রান করবে
    - cron: '0 2 * * 0' 
  workflow_dispatch: # গিটহাব ড্যাশবোর্ড থেকে যেকোনো সময় ম্যানুয়ালি রান করার অপশন

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump Supabase Database
        env:
          # গিটহাব সিক্রেট থেকে ডাটাবেস ইউআরএল নিবে
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          echo "Starting Supabase database backup..."
          FILENAME="supremeai_db_backup_$(date +%Y%m%d_%H%M%S).dump"
          
          # pg_dump দিয়ে কমপ্রেসড ডাম্প তৈরি
          pg_dump "$SUPABASE_DB_URL" -F c -f $FILENAME
          
          echo "Backup completed. File size:"
          ls -lh $FILENAME
          
          # পরবর্তী স্টেপের জন্য ফাইলের নাম এনভায়রনমেন্ট ভ্যারিয়েবলে সেভ করা
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV

      - name: Upload Backup to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          
          echo "Uploading $BACKUP_FILE to Cloudflare R2..."
          
          # AWS CLI ব্যবহার করে সরাসরি R2 বাকেটের database_backups ফোল্ডারে আপলোড
          aws s3 cp ${{ env.BACKUP_FILE }} s3://${BUCKET_NAME}/database_backups/ \
            --endpoint-url $ENDPOINT \
            --region auto
            
          echo "✅ Backup successfully uploaded to R2!"
