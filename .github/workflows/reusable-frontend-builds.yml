name: Reusable Frontend Builds

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '24'

jobs:
  frontend-build:
    name: 🎨 ${{ matrix.name }} Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Studio Client"
            package: "studio"
            filter: "supremeai-studio-client"
          - name: "Web Chat"
            package: "webchat"
            filter: "web-chat"
          - name: "VS Code Extension"
            package: "vscode"
            filter: "vscode-extension"
    steps:
      - name: Check if job should be skipped
        id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          cancel_others: false
          skip_after_successful_duplicate: true
          paths: "${{ (matrix.package == 'studio' && '[\'apps/studio-client/**\', \'packages/**\']') || (matrix.package == 'webchat' && '[\'apps/web-chat/**\', \'packages/**\']') || (matrix.package == 'vscode' && '[\'tools/vscode-extension/**\']') }}"
          do_not_skip: "['workflow_dispatch', 'schedule']"

      - uses: actions/checkout@v4
        if: steps.skip_check.outputs.should_skip != 'true'

      - name: Set up pnpm
        if: steps.skip_check.outputs.should_skip != 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        if: steps.skip_check.outputs.should_skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build, Lint, and Test
        if: steps.skip_check.outputs.should_skip != 'true'
        run: pnpm turbo run build lint test --filter=${{ matrix.filter }}