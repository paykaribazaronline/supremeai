name: CI/CD Production Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: supremeai

jobs:
  test-and-coverage:
    name: Test + Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests with coverage verification
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification --no-daemon

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: build/reports/jacoco/test/html/

  docker-production-build:
    name: Docker Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test-and-coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cloudrun-deploy:
    name: Deploy to Cloud Run (main only)
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: docker-production-build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trigger existing deploy workflow note
        run: |
          echo "Deployment to Cloud Run is handled by deploy-cloudrun.yml in this repository."
          echo "This job confirms CI/CD gating completed before deployment pipeline runs."
