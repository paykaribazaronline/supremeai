name: E2E Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}

      - name: Install E2E test dependencies
        run: |
          cd tests
          npm install
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Install & Start Firebase Emulators
        run: |
          npm install -g firebase-tools
          firebase emulators:start --only firestore,auth --project demo-supremeai &
          sleep 15
          echo "Firebase emulators started"
        shell: bash

      - name: Run Backend (Firebase Emulators + Spring Boot)
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8081
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x ./gradlew
          nohup ./gradlew bootRun --no-daemon > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 90); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health | grep -q "200"; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($((i*3))s)"
            sleep 3
          done
        shell: bash
        continue-on-error: true

      - name: Run Frontend (Vite Dashboard)
        env:
          VITE_API_URL: http://localhost:8080
        run: |
          cd dashboard
          npm install
          nohup npm run dev > ../frontend.log 2>&1 &
          echo $! > frontend.pid
          cd ..
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q "200"; then
              echo "Frontend is healthy"
              break
            fi
            echo "Waiting for frontend... ($((i*3))s)"
            sleep 3
          done
        shell: bash
        continue-on-error: true

      - name: Create test user in local emulator
        env:
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
        run: |
          curl -s -X POST "http://localhost:9099/identitytoolkit.googleapis.com/v1/accounts:signUp?key=test" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@supreme.ai","password":"test123","returnSecureToken":true}' || true
        shell: bash
        continue-on-error: true

      - name: Run Frontend Unit Tests
        run: |
          cd dashboard
          npm run test -- --run
        continue-on-error: true

      - name: Run E2E Tests
        run: |
          cd tests
          npx playwright test --reporter=html
        env:
          BASE_URL: http://localhost:5173
          E2E_ADMIN_EMAIL: test@supreme.ai
          E2E_ADMIN_PASSWORD: test123
          FIRESTORE_EMULATOR_HOST: localhost:8081
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload Backend Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-logs
          path: |
            backend.log
            frontend.log
          retention-days: 7
