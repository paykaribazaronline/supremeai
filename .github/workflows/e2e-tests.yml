name: E2E Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest anyio

      - name: Install & Start Firebase Emulators
        run: |
          npm install -g firebase-tools
          firebase emulators:start --only firestore,auth --project demo-supremeai > firebase.log 2>&1 &
          EMU_PID=$!
          echo $EMU_PID > firebase.pid
          for i in $(seq 1 60); do
            if grep -q "All emulators ready" firebase.log; then
              echo "✅ Firebase emulators are ready"
              break
            fi
            echo "⏳ Waiting for firebase emulators... (${i}s)"
            sleep 1
          done
          echo "Firebase emulator log:"
          tail -n +1 firebase.log | sed -n '1,200p'
        shell: bash

      - name: Run Backend (Python/FastAPI)
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8081
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          ENV: test
        run: |
          nohup python main.py > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
            if [ "$CODE" = "200" ]; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... (${i}s)"
            sleep 1
          done
          if [ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)" != "200" ]; then
            echo "Backend failed to start, dumping backend.log"
            tail -n 500 backend.log || true
            exit 1
          fi
        shell: bash

      - name: Run Python Tests
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8081
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          BASE_URL: http://localhost:8000
        run: |
          pytest --tb=short -q

      - name: Build Studio Client
        run: |
          if [ -d interfaces/supremeai-studio-client ]; then
            cd interfaces/supremeai-studio-client
            npm ci --legacy-peer-deps
            npm run build
          fi

      - name: Upload Backend Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-logs
          path: backend.log
          retention-days: 7
