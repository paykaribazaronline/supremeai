name: Java CI Build & Test

on:
  push:
    branches: [ main, develop, feature/*, bugfix/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: 🔨 Build with Gradle
        run: ./gradlew clean build -x test --info --stacktrace --no-daemon
        env:
          GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: true
          SUPREMEAI_SELFHEALING_PHOENIX_ENABLED: 'true'

      - name: ✅ Run tests
        run: ./gradlew test --info --stacktrace --no-daemon
        # NOTE: Tests will fail if any test files have errors
        # To skip: remove this step or use -x test flag in build command above
        # Disabled: continue-on-error: true (removed to ensure failures are detected)
        # TODO: Fix remaining test failures in src/test/java/ before enabling

      - name: 📊 Generate test report
        if: always()
        run: |
          # Test reports are generated automatically by ./gradlew test into build/reports/tests/
          # Just list the reports directory to confirm output
          ls -la build/reports/tests/ 2>/dev/null || echo "No test reports generated yet"
          # Check for accidentally committed credential files (not just string references in code)
          if find . -name "service-account.json" -not -path "./.git/*" -not -path "./node_modules/*" | grep -q .; then
            echo "❌ ERROR: service-account.json file found in repository!"
            find . -name "service-account.json" -not -path "./.git/*"
            exit 1
          fi
          # Check for hardcoded API key values (not variable names) in config files
          if grep -r "FIREBASE_API_KEY\|GEMINI_API_KEY" src/ --include="*.properties" --include="*.yml" --include="*.yaml" --include="*.json" --exclude-dir=.git; then
            echo "❌ ERROR: API keys found in configuration files!"
            exit 1
          fi
          echo "✅ No hardcoded credentials detected"

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: 📊 Generate coverage report
        run: ./gradlew jacocoTestReport --no-daemon
        continue-on-error: true

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: supremeai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint-docs:
    name: Documentation & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📝 Validate Markdown
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
        continue-on-error: true

      - name: ✅ Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          # Check conventional commits format
          echo "Checking PR commit messages..."
          # This would integrate with commitlint or similar

  build-result:
    name: Build Result
    runs-on: ubuntu-latest
    needs: [ build, code-coverage, docker-build, lint-docs ]
    if: always()
    
    steps:
      - name: 🎯 Check build status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed!"
            exit 1
          fi
          echo "✅ All checks passed!"

      - name: 📊 Build summary
        run: |
          echo "## Build Summary"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Coverage: ${{ needs.code-coverage.result }}"
          echo "- Docker: ${{ needs.docker-build.result }}"
          echo "- Docs: ${{ needs.lint-docs.result }}"

