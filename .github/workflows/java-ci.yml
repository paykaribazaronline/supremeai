name: Java CI Build and Test

on:
  push:
    branches: [ main, develop, feature/*, bugfix/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Configure Gradle properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.workers.max=$(nproc)" >> gradle.properties

      - name: Validate optional secrets
        run: |
          required_secrets=("GEMINI_API_KEY" "JWT_SECRET")
          for secret in "${required_secrets[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "Optional secret not set: $secret"
            else
              echo "$secret is configured"
            fi
          done
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build with Gradle
        run: |
          set +e
          for attempt in 1 2; do
            echo "Build attempt $attempt..."
            ./gradlew clean build -x test --info --stacktrace --no-daemon
            if [ $? -eq 0 ]; then
              echo "Build successful"
              exit 0
            fi
            if [ $attempt -lt 2 ]; then
              echo "Build failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "Build failed after 2 attempts"
          exit 1
        env:
          GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: true
          SUPREMEAI_SELFHEALING_PHOENIX_ENABLED: 'true'

      - name: Run tests
        run: ./gradlew test --info --stacktrace --no-daemon --max-workers=2
        continue-on-error: true
        timeout-minutes: 20
        env:
          FIREBASE_EMULATOR_HOST: localhost:9199

      - name: Generate test report
        if: always()
        run: |
          ls -la build/reports/tests/ 2>/dev/null || echo "No test reports generated yet"
          if find . -name "service-account.json" -not -path "./.git/*" -not -path "./node_modules/*" | grep -q .; then
            echo "ERROR: service-account.json file found in repository"
            find . -name "service-account.json" -not -path "./.git/*"
            exit 1
          fi
          hardcoded_keys=$( \
            grep -rEn "^[[:space:]]*(firebase\.api\.key|gemini\.api\.key|FIREBASE_API_KEY|GEMINI_API_KEY)[[:space:]]*[:=][[:space:]]*.+$" \
              src/ --include="*.properties" --include="*.yml" --include="*.yaml" --include="*.json" --exclude-dir=.git \
            | grep -Ev "\$\{[A-Z0-9_]+(:[^}]*)?\}[[:space:]]*$" \
            || true
          )
          if [ -n "$hardcoded_keys" ]; then
            echo "ERROR: Hardcoded API keys found in configuration files"
            echo "$hardcoded_keys"
            exit 1
          fi
          echo "No hardcoded credentials detected"

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Configure Gradle properties
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties

      - name: Generate coverage report
        run: ./gradlew jacocoTestReport jacocoTestCoverageVerification --no-daemon --max-workers=2
        continue-on-error: true
        timeout-minutes: 15

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: supremeai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint-docs:
    name: Documentation and Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Markdown
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
        continue-on-error: true

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking PR commit messages..."

  build-result:
    name: Build Result
    runs-on: ubuntu-latest
    needs: [ build, code-coverage, docker-build, lint-docs ]
    if: always()

    steps:
      - name: Check build status
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          COVERAGE_STATUS="${{ needs.code-coverage.result }}"
          DOCKER_STATUS="${{ needs.docker-build.result }}"
          DOCS_STATUS="${{ needs.lint-docs.result }}"

          if [ "$BUILD_STATUS" != "success" ] || [ "$COVERAGE_STATUS" != "success" ] || [ "$DOCKER_STATUS" != "success" ] || [ "$DOCS_STATUS" != "success" ]; then
            echo "One or more Java CI jobs failed or were skipped"
            echo "Build: $BUILD_STATUS"
            echo "Coverage: $COVERAGE_STATUS"
            echo "Docker: $DOCKER_STATUS"
            echo "Docs: $DOCS_STATUS"
            exit 1
          fi

          echo "All checks passed"

      - name: Build summary
        run: |
          echo "## Build Summary"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Coverage: ${{ needs.code-coverage.result }}"
          echo "- Docker: ${{ needs.docker-build.result }}"
          echo "- Docs: ${{ needs.lint-docs.result }}"
