name: Java CI Build & Test

on:
  push:
    branches: [ main, develop, feature/*, bugfix/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: 🔨 Build with Gradle
        run: ./gradlew clean build --info --stacktrace --no-daemon
        env:
          GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: true
          SUPREMEAI_SELFHEALING_PHOENIX_ENABLED: 'true'

      - name: ✅ Run tests
        run: ./gradlew test --info --stacktrace --no-daemon
        env:
          SUPREMEAI_SELFHEALING_PHOENIX_ENABLED: 'true'

      - name: 📊 Generate test report
        if: always()
        run: ./gradlew testReport

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.java }}
          path: build/reports/tests/

      - name: 🔍 Run code quality checks
        run: ./gradlew check --info --no-daemon
        continue-on-error: true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: 🔍 Dependency check
        run: ./gradlew dependencyCheckAnalyze --info --no-daemon
        continue-on-error: true

      - name: 📋 Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: 🔒 Verify .gitignore compliance
        run: |
          # Check for accidental credentials
          if grep -r "service-account.json" src/ --exclude-dir=.git; then
            echo "❌ ERROR: service-account.json found in source code!"
            exit 1
          fi
          if grep -r "FIREBASE_API_KEY\|GEMINI_API_KEY" src/ --exclude-dir=.git; then
            echo "❌ ERROR: API keys found in source code!"
            exit 1
          fi
          echo "✅ No hardcoded credentials detected"

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔐 Grant execute permission
        run: chmod +x gradlew

      - name: 📊 Generate coverage report
        run: ./gradlew jacocoTestReport --no-daemon

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: supremeai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint-docs:
    name: Documentation & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📝 Validate Markdown
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
        continue-on-error: true

      - name: ✅ Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          # Check conventional commits format
          echo "Checking PR commit messages..."
          # This would integrate with commitlint or similar

  build-result:
    name: Build Result
    runs-on: ubuntu-latest
    needs: [ build, security-scan, code-coverage, docker-build ]
    if: always()
    
    steps:
      - name: 🎯 Check build status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed!"
            exit 1
          fi
          echo "✅ All checks passed!"

      - name: 📊 Build summary
        run: |
          echo "## Build Summary"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Security: ${{ needs.security-scan.result }}"
          echo "- Coverage: ${{ needs.code-coverage.result }}"
          echo "- Docker: ${{ needs.docker-build.result }}"
          echo "- Docs: ${{ needs.lint-docs.result }}"
