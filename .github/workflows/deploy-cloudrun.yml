# Google Cloud Run — CI/CD Deployment Pipeline
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID                       - Google Cloud project ID (supremeai-a)
#   GCP_SA_KEY                           - Service account JSON key with roles:
#                                            roles/run.admin              ✅ grant via GCP IAM Console
#                                            roles/storage.admin          ✅ granted
#                                            roles/iam.serviceAccountUser ✅ granted
#                                            roles/secretmanager.admin    ✅ grant via GCP IAM Console
#   FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A - Firebase service account JSON (already configured)
#
# Firebase permissions (handled automatically by this workflow):
#   {PROJECT_NUMBER}-compute@developer.gserviceaccount.com needs:
#     roles/secretmanager.secretAccessor ← granted automatically on each run (step below)
#   This allows the Cloud Run service to read FIREBASE_SERVICE_ACCOUNT_JSON at runtime.
#
#   FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A must have:
#     roles/firebasehosting.admin        ✅ granted — for firebase-hosting-merge / PR deploy workflows

name: 🚀 Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
  GCP_REGION: us-central1
  SERVICE_NAME: supremeai

jobs:
  deploy:
    name: 🐳 Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configure Docker for Google Container Registry
        run: gcloud auth configure-docker gcr.io --quiet

      - name: 🔖 Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 🔑 Resolve GCP Project ID
        id: project
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          if [ -z "$PROJECT" ]; then
            PROJECT=$(gcloud config get-value project 2>/dev/null)
          fi
          if [ -z "$PROJECT" ]; then
            echo "❌ ERROR: GCP_PROJECT_ID secret is not set and could not be detected from gcloud config."
            exit 1
          fi
          echo "project_id=$PROJECT" >> $GITHUB_OUTPUT
          echo "✅ Using GCP project: $PROJECT"

      - name: ⚙️ Enable Artifact Registry API
        run: |
          gcloud services enable artifactregistry.googleapis.com \
            --project="${{ steps.project.outputs.project_id }}" --quiet

      - name: 🔨 Build Docker image
        run: |
          docker build \
            -t "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}" \
            -t "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:latest" \
            .

      - name: 📤 Push image to Google Container Registry
        run: |
          docker push "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}"
          docker push "gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:latest"

      - name: 🔑 Sync Firebase credentials to Secret Manager
        run: |
          FIREBASE_SA='${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}'
          if [ -z "$FIREBASE_SA" ]; then
            echo "⚠️  FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A not set — skipping Secret Manager sync"
            exit 0
          fi
          PROJECT="${{ steps.project.outputs.project_id }}"
          SECRET_NAME="firebase-service-account-json"
          if gcloud secrets describe "$SECRET_NAME" --project="$PROJECT" 2>/dev/null; then
            printf '%s' "$FIREBASE_SA" | gcloud secrets versions add "$SECRET_NAME" \
              --data-file=- --project="$PROJECT" 2>&1 | tee /tmp/sm_output.txt || {
              if grep -q "PERMISSION_DENIED" /tmp/sm_output.txt; then
                echo "❌ PERMISSION_DENIED: The service account lacks roles/secretmanager.admin."
                echo "   Fix: In GCP IAM Console → IAM, add 'Secret Manager Admin'"
                echo "        to github-action-1192200658@supremeai-a.iam.gserviceaccount.com"
              fi
              exit 1
            }
            echo "✅ Firebase SA secret version updated in Secret Manager"
          else
            printf '%s' "$FIREBASE_SA" | gcloud secrets create "$SECRET_NAME" \
              --data-file=- --replication-policy=automatic --project="$PROJECT" 2>&1 | tee /tmp/sm_output.txt || {
              if grep -q "PERMISSION_DENIED" /tmp/sm_output.txt; then
                echo "❌ PERMISSION_DENIED: The service account lacks roles/secretmanager.admin."
                echo "   Fix: In GCP IAM Console → IAM, add 'Secret Manager Admin'"
                echo "        to github-action-1192200658@supremeai-a.iam.gserviceaccount.com"
              fi
              exit 1
            }
            echo "✅ Firebase SA secret created in Secret Manager"
          fi

      - name: 🔓 Grant Cloud Run service account read access to Firebase secret
        run: |
          PROJECT="${{ steps.project.outputs.project_id }}"
          SECRET_NAME="firebase-service-account-json"

          # Only proceed if the secret exists
          if ! gcloud secrets describe "$SECRET_NAME" --project="$PROJECT" 2>/dev/null; then
            echo "⚠️  Secret $SECRET_NAME not found — skipping IAM binding"
            exit 0
          fi

          # Get the project number (needed for the default compute service account)
          PROJECT_NUMBER=$(gcloud projects describe "$PROJECT" \
            --format='value(projectNumber)' 2>/dev/null || echo "")
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "⚠️  Could not determine project number — skipping Cloud Run SA secret grant"
            exit 0
          fi

          # The default Cloud Run service account is the GCE default compute SA
          COMPUTE_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          echo "Granting secretAccessor to $COMPUTE_SA on $SECRET_NAME ..."

          gcloud secrets add-iam-policy-binding "$SECRET_NAME" \
            --member="serviceAccount:${COMPUTE_SA}" \
            --role="roles/secretmanager.secretAccessor" \
            --project="$PROJECT" 2>&1 | tee /tmp/iam_output.txt || {
            if grep -q "PERMISSION_DENIED" /tmp/iam_output.txt; then
              echo "❌ PERMISSION_DENIED: roles/secretmanager.admin is needed to set secret IAM."
              echo "   Fix: grant Secret Manager Admin to github-action-1192200658@supremeai-a.iam.gserviceaccount.com"
            fi
            echo "⚠️  Could not grant Cloud Run SA access — app may fail to read FIREBASE_SERVICE_ACCOUNT_JSON"
            exit 0
          }
          echo "✅ Cloud Run SA $COMPUTE_SA can now read $SECRET_NAME at runtime"
        continue-on-error: true

      - name: 🚀 Deploy to Cloud Run
        run: |
          PROJECT="${{ steps.project.outputs.project_id }}"
          IMAGE="gcr.io/$PROJECT/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}"

          # Reference Secret Manager secret if it exists
          SECRET_FLAG=""
          if gcloud secrets describe firebase-service-account-json \
              --project="$PROJECT" 2>/dev/null; then
            SECRET_FLAG="--update-secrets=FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account-json:latest"
          fi

          # Build GitHub App env vars (passed only when the secret is non-empty)
          GITHUB_APP_ENV=""
          if [ -n "${{ secrets.SUPREMEAI_APP_PRIVATE_KEY }}" ]; then
            GITHUB_APP_ENV="GITHUB_APP_PRIVATE_KEY_BASE64=${{ secrets.SUPREMEAI_APP_PRIVATE_KEY }},GITHUB_APP_ID=3300194,GITHUB_APP_INSTALLATION_ID=121998309"
          fi

          # Combine base env vars with optional GitHub App vars
          BASE_ENV="FIREBASE_PROJECT_ID=supremeai-a,FIREBASE_DATABASE_URL=https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/"
          FINAL_ENV="${BASE_ENV}${GITHUB_APP_ENV:+,$GITHUB_APP_ENV}"

          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image="$IMAGE" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --port=8080 \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=80 \
            --max-instances=10 \
            --min-instances=1 \
            --timeout=300 \
            --allow-unauthenticated \
            --update-env-vars="$FINAL_ENV" \
            $SECRET_FLAG \
            --project="$PROJECT" \
            --quiet 2>&1 | tee /tmp/deploy_output.txt || {
            if grep -q "PERMISSION_DENIED" /tmp/deploy_output.txt; then
              echo "❌ PERMISSION_DENIED: The service account lacks roles/run.admin."
              echo "   Currently assigned: run.viewer (read-only — cannot create/update services)"
              echo "   Fix: In GCP IAM Console → IAM, replace 'run.viewer' with"
              echo "        'Cloud Run Admin' (roles/run.admin) for:"
              echo "        github-action-1192200658@supremeai-a.iam.gserviceaccount.com"
            fi
            exit 1
          }
          echo "✅ Cloud Run deployment complete"

      - name: 🌐 Get service URL
        id: get-url
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ steps.project.outputs.project_id }}" \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "🌐 Service URL: $URL"

      - name: 🏥 Health check
        run: |
          echo "Waiting 20 seconds for the service to warm up..."
          sleep 20
          URL="${{ steps.get-url.outputs.url }}"
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            "$URL/actuator/health" || echo "000")
          echo "Health check HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Cloud Run service is healthy!"
          else
            echo "⚠️  Health check returned $HTTP_CODE — service may still be initializing"
          fi
        continue-on-error: true

      - name: 📊 Deployment summary
        if: always()
        run: |
          echo "## ☁️ Google Cloud Run Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Image | \`gcr.io/${{ steps.project.outputs.project_id }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL | ${{ steps.get-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📍 Region | ${{ env.GCP_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Project | ${{ steps.project.outputs.project_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 SHA | \`${{ github.sha }}\` (short: \`${{ steps.vars.outputs.sha_short }}\`)" >> $GITHUB_STEP_SUMMARY

