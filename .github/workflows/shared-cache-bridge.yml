# ═══════════════════════════════════════════════════════════
# Cache Maintenance — Prune stale GitHub Actions caches
# Runs weekly to prevent 10+ GB cache buildup
# ═══════════════════════════════════════════════════════════
name: Cache Maintenance

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3 AM UTC
  workflow_dispatch:

jobs:
  prune-caches:
    name: 🧹 Prune Stale Caches
    runs-on: ubuntu-latest
    steps:
      - name: Delete old caches
        run: |
          echo "🧹 Pruning stale GitHub Actions caches..."

          # Get all caches
          CACHES=$(gh cache list --repo ${{ github.repository }} --json id,key,createdAt,sizeInBytes --limit 100 2>/dev/null || echo "[]")
          TOTAL_SIZE=$(echo "$CACHES" | jq '[.[].sizeInBytes] | add // 0')
          TOTAL_COUNT=$(echo "$CACHES" | jq 'length')
          echo "📊 Total caches: $TOTAL_COUNT, Total size: $(echo "scale=2; $TOTAL_SIZE / 1073741824" | bc) GB"

          # Delete caches older than 14 days
          CUTOFF=$(date -d '14 days ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -v-14d +%Y-%m-%dT%H:%M:%S 2>/dev/null || echo "")
          DELETED=0

          if [ -n "$CUTOFF" ]; then
            echo "$CACHES" | jq -r --arg cutoff "$CUTOFF" \
              '.[] | select(.createdAt < $cutoff) | "\(.id)\t\(.key)\t\(.sizeInBytes)"' | \
            while IFS=$'\t' read -r cache_id cache_key cache_size; do
              if [ -n "$cache_id" ] && [ "$cache_id" != "null" ]; then
                SIZE_MB=$(echo "scale=1; $cache_size / 1048576" | bc 2>/dev/null || echo "?")
                echo "  🗑️  Deleting: $cache_key (${SIZE_MB} MB)"
                gh cache delete "$cache_id" --repo ${{ github.repository }} 2>/dev/null || true
                DELETED=$((DELETED + 1))
              fi
            done
          fi

          # Also delete any old-format "poetry-" prefixed caches (the bloated 10GB ones)
          echo "$CACHES" | jq -r '.[] | select(.key | startswith("poetry-")) | "\(.id)\t\(.key)"' | \
          while IFS=$'\t' read -r cache_id cache_key; do
            if [ -n "$cache_id" ] && [ "$cache_id" != "null" ]; then
              echo "  🗑️  Deleting old poetry cache: $cache_key"
              gh cache delete "$cache_id" --repo ${{ github.repository }} 2>/dev/null || true
            fi
          done

          echo "✅ Cache cleanup complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
