name: Monitoring_Setup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  setup-monitoring:
    name: Setup_Monitoring
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup GCloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}"
      
      - name: Setup_GCloud_CLI
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure_Logging_Metrics
        run: |
          echo "Setting up Cloud Logging metrics..."
          
          # Create alert policies for error rates
          gcloud logging metrics create error-rate-metric \
            --description="High error rate in application logs" \
            --log-filter='severity>=ERROR AND resource.type="cloud_run_revision"' \
            --project=supremeai-a || echo "Metric may already exist"
          
          gcloud logging metrics create latency-metric \
            --description="High latency in application" \
            --log-filter='severity>=WARNING AND jsonPayload.message:"latency"' \
            --project=supremeai-a || echo "Metric may already exist"
      
      - name: Setup_Alerts
        run: |
          echo "Setting up alert policies..."
          
          # Create uptime check for backend
          gcloud monitoring uptime-checks create http \
            --display-name="Backend Health Check" \
            --resource-type="uptime_url" \
            --period="60s" \
            --timeout="10s" \
            --path="/api/health" \
            --port=443 \
            --hostname="supremeai-lhlwyikwlq-uc.a.run.app" \
            --project=supremeai-a || echo "Uptime check may already exist"
          
          # Create uptime check for frontend
          gcloud monitoring uptime-checks create http \
            --display-name="Frontend Health Check" \
            --resource-type="uptime_url" \
            --period="60s" \
            --timeout="10s" \
            --path="/" \
            --port=443 \
            --hostname="supremeai-a.web.app" \
            --project=supremeai-a || echo "Uptime check may already exist"
      
      - name: Setup_Dashboards
        run: |
          echo "Setting up monitoring dashboards..."
          
          # Create custom dashboard for key metrics
          cat > dashboard-config.json << 'EOF'
          {
            "displayName": "SupremeAI Application Dashboard",
            "gridLayout": {
              "columns": 12,
              "widgets": [
                {
                  "title": "Request Count",
                  "xyPosition": {"x": 0, "y": 0, "h": 4, "w": 6},
                  "timeSeriesQuery": {
                    "timeSeriesFilter": {
                      "filter": "metric.type=\"run.googleapis.com/request_count\"",
                      "aggregation": {
                        "alignmentPeriod": "60s",
                        "perSeriesAligner": "ALIGN_RATE"
                      }
                    }
                  }
                },
                {
                  "title": "Error Rate",
                  "xyPosition": {"x": 6, "y": 0, "h": 4, "w": 6},
                  "timeSeriesQuery": {
                    "timeSeriesFilter": {
                      "filter": "metric.type=\"run.googleapis.com/request_count\" AND metric.labels.response_code_class=\"5xx\"",
                      "aggregation": {
                        "alignmentPeriod": "60s",
                        "perSeriesAligner": "ALIGN_RATE"
                      }
                    }
                  }
                },
                {
                  "title": "Response Latency",
                  "xyPosition": {"x": 0, "y": 4, "h": 4, "w": 12},
                  "timeSeriesQuery": {
                    "timeSeriesFilter": {
                      "filter": "metric.type=\"run.googleapis.com/request_latencies\"",
                      "aggregation": {
                        "alignmentPeriod": "60s",
                        "perSeriesAligner": "ALIGN_PERCENTILE_95"
                      }
                    }
                  }
                }
              ]
            }
          }
          EOF
          
          echo "Dashboard configuration created"
      
      - name: Export_Monitoring_Config
        run: |
          echo "Exporting monitoring configuration..."
          mkdir -p monitoring
          cp dashboard-config.json monitoring/ || true
          
          # Create alert policies configuration
          cat > monitoring/alert-policies.json << 'EOF'
          {
            "policies": [
              {
                "displayName": "High Error Rate",
                "conditions": [{
                  "displayName": "Error rate > 5%",
                  "conditionThreshold": {
                    "filter": "metric.type=\"logging.googleapis.com/user/error-rate-metric\"",
                    "comparison": "COMPARISON_GT",
                    "thresholdValue": 5,
                    "duration": "60s"
                  }
                }],
                "notificationChannels": [],
                "combiner": "OR"
              },
              {
                "displayName": "High Latency",
                "conditions": [{
                  "displayName": "P95 latency > 1s",
                  "conditionThreshold": {
                    "filter": "metric.type=\"run.googleapis.com/request_latencies\"",
                    "comparison": "COMPARISON_GT",
                    "thresholdValue": 1000,
                    "duration": "300s"
                  }
                }],
                "notificationChannels": [],
                "combiner": "OR"
              }
            ]
          }
          EOF
          
          echo "Alert policies configuration created"
      
      - name: Upload_Monitoring_Config
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-configuration
          path: monitoring/
          retention-days: 90
      
      - name: Verify_Monitoring_Setup
        run: |
          echo "Verifying monitoring setup..."
          
          # List uptime checks
          echo "Uptime checks:"
          gcloud monitoring uptime-checks list --project=supremeai-a || echo "Could not list uptime checks"
          
          # List logging metrics
          echo "Logging metrics:"
          gcloud logging metrics list --project=supremeai-a || echo "Could not list metrics"
          
          echo "Monitoring setup completed!"
