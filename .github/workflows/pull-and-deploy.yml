name: 📥 Pull from Staging & Deploy

on:
  repository_dispatch:
    types: [staging-passed]
  workflow_dispatch:

jobs:
  sync-and-deploy:
    name: 🚀 Sync & Deploy
    runs-on: ubuntu-latest
    # This workflow should only run in the production repo
    if: github.repository == 'paykaribazaronline/supremeai'

    steps:
      - name: Checkout production repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.MAIN_REPO_TOKEN }} # Use a PAT with write access

      - name: Configure Git
        run: |
          git config --global user.name 'SupremeAI Sync Bot'
          git config --global user.email 'sync-bot@supremeai.dev'

      - name: Add staging repo as remote
        run: |
          git remote add staging https://x-access-token:${{ secrets.STAGING_REPO_TOKEN }}@github.com/saifulhaqueniloy/supremeai.git

      - name: Fetch and merge from staging
        run: |
          # Get the specific commit SHA from the dispatch event
          SHA_TO_MERGE=${{ github.event.client_payload.sha }}
          if [ -z "$SHA_TO_MERGE" ]; then
            echo "No SHA provided, merging latest from main branch."
            git fetch staging main
            git merge staging/main -m "Merge remote-tracking branch 'staging/main' [CI-SYNC]"
          else
            echo "Merging specific SHA: $SHA_TO_MERGE"
            git fetch staging
            git merge $SHA_TO_MERGE -m "Merge commit '$SHA_TO_MERGE' from staging [CI-SYNC]"
          fi

      - name: Push changes to production main
        run: git push origin main

      - name: 🚀 Trigger Production Deployment
        uses: actions/github-script@v9
        with:
          script: |
            // This step can be replaced with your actual deployment job call
            console.log('Code synced. Production deployment would start here.');
            // For example, you could trigger another workflow:
            // await github.rest.actions.createWorkflowDispatch({
            //   owner: context.repo.owner,
            //   repo: context.repo.repo,
            //   workflow_id: 'deploy.yml',
            //   ref: 'main'
            // });