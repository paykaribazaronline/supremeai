name: 📚 Documentation & Linting - Auto-Fix (3-Layer System)

on:
  push:
    branches: [main, develop]
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.github/workflows/docs-lint-fix.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.md'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  BATCH_SIZE: '50'  # Files per batch (tuned to avoid "argument list too long")

jobs:
  # ========================================
  # LAYER 1: Discovery & Scan (Batched)
  # ========================================
  lint-scan:
    name: 📋 Scan Documentation (3-Layer System)
    runs-on: ubuntu-latest
    outputs:
      error_count: ${{ steps.scan.outputs.error_count }}
      scan_report: ${{ steps.scan.outputs.scan_report }}
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: 📍 Make maintenance script executable
        run: |
          chmod +x .github/scripts/doc-maintenance.sh
          echo "✅ Script ready for execution"

      - name: 🔍 Scan using 3-Layer System
        id: scan
        continue-on-error: true
        run: |
          # Run 3-layer documentation maintenance system in SCAN mode
          ./.github/scripts/doc-maintenance.sh scan ${{ env.BATCH_SIZE }}
          
          # Extract error count from report
          ERROR_COUNT=$(grep "^Total Errors" /tmp/doc_scan_report.md 2>/dev/null | grep -oE '[0-9]+' || echo "0")
          
          echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          
          # Store report for later use
          if [ -f "/tmp/doc_scan_report.md" ]; then
            REPORT=$(cat /tmp/doc_scan_report.md)
            {
              echo "scan_report<<SCANEOF"
              echo "$REPORT"
              echo "SCANEOF"
            } >> $GITHUB_OUTPUT
          fi
          
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "⚠️  Found $ERROR_COUNT documentation errors (will auto-fix via next job)"
          else
            echo "✅ No documentation errors found"
          fi

      - name: 📊 Post scan results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.scan.outputs.scan_report }}`;
            const count = '${{ steps.scan.outputs.error_count }}';
            
            if (context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📚 Documentation Scan Report\n\n**Errors Found:** ${count}\n\n\`\`\`\n${report}\n\`\`\``
              });
            }


  # ========================================
  # LAYER 2: Auto-Fix Errors (Batched)
  # ========================================
  lint-fix:
    name: ✅ Auto-Fix Linting Errors (3-Layer System)
    runs-on: ubuntu-latest
    needs: lint-scan
    if: github.event_name == 'push'
    outputs:
      fixed_count: ${{ steps.fix.outputs.fixed_count }}
      fix_report: ${{ steps.fix.outputs.fix_report }}
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: 📍 Make maintenance script executable
        run: |
          chmod +x .github/scripts/doc-maintenance.sh
          echo "✅ Script ready for execution"

      - name: 🔧 Auto-fix using 3-Layer System
        id: fix
        run: |
          # Run 3-layer documentation maintenance system in FIX mode
          ./.github/scripts/doc-maintenance.sh fix ${{ env.BATCH_SIZE }}
          
          # Count actual modified markdown files
          FIXED=$(git diff --name-only | grep '\.md$' | wc -l)
          
          echo "fixed_count=$FIXED" >> $GITHUB_OUTPUT
          
          # Show summary
          if [ "$FIXED" -gt 0 ]; then
            echo "✅ Fixed $FIXED markdown files"
            echo "📝 Modified files:"
            git diff --name-only | grep '\.md$'
          else
            echo "ℹ️  No files needed fixing"
          fi
          
          # Store report for later use (if exists)
          if [ -f "/tmp/doc_fix_report.md" ]; then
            REPORT=$(cat /tmp/doc_fix_report.md)
            {
              echo "fix_report<<FIXEOF"
              echo "$REPORT"
              echo "FIXEOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: 📤 Commit & push fixes
        if: steps.fix.outputs.fixed_count > 0
        env:
          FIXED_COUNT: ${{ steps.fix.outputs.fixed_count }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Doc Fixer"
          
          # Get all modified markdown files (from git diff)
          MODIFIED_FILES=$(git diff --name-only --diff-filter=M | grep '\.md$' || true)
          UNTRACKED_FILES=$(git ls-files --others --exclude-standard | grep '\.md$' || true)
          
          if [ -z "$MODIFIED_FILES" ] && [ -z "$UNTRACKED_FILES" ]; then
            echo "✅ No markdown files were modified by auto-fix"
            exit 0
          fi
          
          # Add all modified markdown files
          if [ -n "$MODIFIED_FILES" ]; then
            echo "📝 Found modified files:"
            echo "$MODIFIED_FILES" | while read -r file; do
              echo "  - $file"
              git add "$file"
            done
          fi
          
          # Add any untracked markdown files
          if [ -n "$UNTRACKED_FILES" ]; then
            echo "📝 Found new files:"
            echo "$UNTRACKED_FILES" | while read -r file; do
              echo "  - $file"
              git add "$file"
            done
          fi
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi
          
          # Create commit with multi-line message
          git commit -m "docs: Auto-fix markdown linting errors (3-Layer System)" \
            -m "Fixed using batched processing to avoid arg list too long error" \
            -m "Applied via 3-layer documentation maintenance system" \
            -m "Fixed markdown files: $FIXED_COUNT" \
            -m "" \
            -m "Rules Applied:" \
            -m "- MD009: Trailing spaces removed" \
            -m "- MD022: Headings surrounded by blank lines" \
            -m "- MD023: Heading level sequence" \
            -m "- MD026: Trailing punctuation in headings" \
            -m "- MD031: Fenced code blocks surrounded by blank lines" \
            -m "- MD032: Lists surrounded by blank lines"
          
          # Push changes
          git push origin ${GITHUB_REF#refs/heads/}

      - name: 📊 Create job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📚 Documentation 3-Layer Maintenance
          
          ### System Layers
          - ✅ **Layer 1**: Discovery (Batch markdown files)
          - ✅ **Layer 2**: Processing (Batch auto-fix)
          - ✅ **Layer 3**: Aggregation (Combine results)
          
          ### Results
          | Metric | Value |
          |--------|-------|
          | Scan Errors | ${{ needs.lint-scan.outputs.error_count }} |
          | Files Fixed | ${{ steps.fix.outputs.fixed_count }} |
          | Batch Size | ${{ env.BATCH_SIZE }} |
          
          ### Fixed Rules
          - **MD009**: Trailing spaces
          - **MD022**: Heading blank lines
          - **MD023**: Heading level sequence
          - **MD026**: Heading punctuation
          - **MD031**: Code block blank lines
          - **MD032**: List blank lines
          EOF

  # ========================================
  # LAYER 3: Aggregation & Reporting
  # ========================================
  lint-report:
    name: 📊 Documentation Report (3-Layer Aggregation)
    runs-on: ubuntu-latest
    needs: [lint-scan, lint-fix]
    if: always()
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: 📍 Make maintenance script executable
        run: |
          chmod +x .github/scripts/doc-maintenance.sh
          echo "✅ Script ready for execution"

      - name: 📊 Generate comprehensive report
        id: report
        run: |
          # Run in REPORT mode to generate statistics
          ./.github/scripts/doc-maintenance.sh report ${{ env.BATCH_SIZE }}
          
          # Create final summary
          cat > /tmp/final_summary.md << 'EOF'
          # 📚 Documentation Maintenance Summary
          
          **Pipeline:** 3-Layer System  
          **Run:** ${{ github.run_number }}  
          **Timestamp:** $(date -Iseconds)
          
          ## Results
          
          | Stage | Status | Details |
          |-------|--------|---------|
          | **Layer 1: Discovery** | ✅ Complete | Batched file discovery |
          | **Layer 2: Processing** | ✅ Complete | Errors scanned, fixes applied |
          | **Layer 3: Aggregation** | ✅ Complete | Results combined and reported |
          
          ## Metrics
          
          | Metric | Value |
          |--------|-------|
          | Errors Scanned | ${{ needs.lint-scan.outputs.error_count }} |
          | Files Fixed | ${{ needs.lint-fix.outputs.fixed_count }} |
          | Batch Size | ${{ env.BATCH_SIZE }} |
          | System | 3-Layer Architecture |
          
          ## Key Features
          
          ✅ Fixes "argument list too long" error via batching  
          ✅ Processes markdown files in manageable chunks  
          ✅ Aggregates results to single report  
          ✅ Provides detailed audit trail  
          ✅ Auto-commits fixes to main/develop  
          
          ---
          *Generated by 3-Layer Documentation Maintenance System*
          EOF
          
          cat /tmp/final_summary.md

      - name: 📝 Create GitHub release note
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/final_summary.md', 'utf8');
            
            // Optionally add label to indicate docs maintenance was run
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['📚 docs-auto-fixed']
            }).catch(() => {
              // Ignore if not in PR context
            });

  # ========================================
  # Optional: Detailed Batch Analysis
  # ========================================
  analytics:
    name: 📈 Documentation Analytics
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: 📊 Generate detailed analytics
        run: |
          echo "## 📈 Documentation Analytics Report" > /tmp/analytics.md
          echo "" >> /tmp/analytics.md
          
          # File statistics
          echo "### File Statistics" >> /tmp/analytics.md
          TOTAL_FILES=$(find . -name "*.md" -type f ! -path "./.git/*" ! -path "./node_modules/*" 2>/dev/null | wc -l)
          TOTAL_LINES=$(find . -name "*.md" -type f ! -path "./.git/*" ! -path "./node_modules/*" 2>/dev/null -exec wc -l {} + | tail -1 | awk '{print $1}')
          AVG_FILE_SIZE=$((TOTAL_LINES / TOTAL_FILES))
          
          echo "| Metric | Value |" >> /tmp/analytics.md
          echo "|--------|-------|" >> /tmp/analytics.md
          echo "| Total MD Files | $TOTAL_FILES |" >> /tmp/analytics.md
          echo "| Total Lines | $TOTAL_LINES |" >> /tmp/analytics.md
          echo "| Average File Size | $AVG_FILE_SIZE lines |" >> /tmp/analytics.md
          echo "| Batch Size | ${{ env.BATCH_SIZE }} |" >> /tmp/analytics.md
          echo "| Expected Batches | $(( (TOTAL_FILES + ${{ env.BATCH_SIZE }} - 1) / ${{ env.BATCH_SIZE }} )) |" >> /tmp/analytics.md
          echo "" >> /tmp/analytics.md
          
          # File breakdown
          echo "### Files by Directory" >> /tmp/analytics.md
          find . -name "*.md" -type f ! -path "./.git/*" ! -path "./node_modules/*" 2>/dev/null | sed 's|/[^/]*$||' | sort | uniq -c | sort -rn >> /tmp/analytics.md
          
          cat /tmp/analytics.md
