name: SupremeAI God Mode Security Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ai-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🏗️ Generate Project Context (XML)
        run: python supreme_context_builder.py

      - name: 🛡️ Run Gemini Security Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_security_scanner.py

      - name: 📊 Publish Report to GitHub Summary
        if: always()
        run: |
          if [ -f security_report.md ]; then
            cat security_report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No security report generated." >> $GITHUB_STEP_SUMMARY
          fi
