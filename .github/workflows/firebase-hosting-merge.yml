name: Supreme AI - Firebase Unified Hosting Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-flutter-admin:
    name: Build Flutter Admin App
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: flutter_admin_app
        run: flutter pub get

      - name: Build Flutter web
        working-directory: flutter_admin_app
        run: flutter build web --base-href "/admin/" --release

      - name: Upload Flutter artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-admin-build
          path: flutter_admin_app/build/web/
          retention-days: 1

  build-backend-and-dashboard:
    name: Build Java Backend and Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build backend
        run: ./gradlew clean build -x test --info --no-daemon

      - name: Run backend tests
        run: ./gradlew test --info --no-daemon

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dashboard/dist/
          retention-days: 1

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            build/reports/
            build/test-results/

  deploy-firebase-unified:
    name: Combine and Deploy to Firebase
    needs:
      - build-flutter-admin
      - build-backend-and-dashboard
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Flutter artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-admin-build
          path: flutter-admin-build

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: dashboard-build

      - name: Assemble hosting bundle
        run: |
          mkdir -p combined_deploy/admin
          cp -r dashboard-build/* combined_deploy/
          cp -r flutter-admin-build/* combined_deploy/admin/
          cp firebase.json combined_deploy/firebase.json
          ls -la combined_deploy
          ls -la combined_deploy/admin | head -20

      - name: Deploy to Firebase Hosting
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
          projectId: supremeai-a
          channelId: live
          entryPoint: ./

      - name: Verify deployment message
        run: |
          echo "Main dashboard: https://supremeai-a.web.app/"
          echo "Admin dashboard: https://supremeai-a.web.app/admin/"

  notify:
    name: Pipeline Summary
    needs:
      - build-flutter-admin
      - build-backend-and-dashboard
      - deploy-firebase-unified
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read

    steps:
      - name: Print summary
        run: |
          echo "Flutter build: ${{ needs.build-flutter-admin.result }}"
          echo "Backend and dashboard: ${{ needs.build-backend-and-dashboard.result }}"
          echo "Firebase deploy: ${{ needs.deploy-firebase-unified.result }}"
