# Supreme AI - Build, Test & Deploy Workflow
name: Supreme AI - Build & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# ==========================================
# STAGE 1: Build + Test (with retry)
# ==========================================
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_on: error
          command: ./gradlew clean build -x test --info

      - name: Run Tests (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: ./gradlew test --info
        continue-on-error: true

      - name: Upload Build Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: build/reports/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/test-results/
            build/reports/tests/

  # ==========================================
  # STAGE 2: Deploy to Firebase
  # ==========================================
  deploy-firebase:
    name: Deploy to Firebase
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR for Deployment
        run: ./gradlew build -x test

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
          channelId: live
          projectId: supremeai-a

      - name: Verify Firebase Deployment
        run: echo "✅ Firebase deployment completed"

  # ==========================================
  # STAGE 3: Notifications
  # ==========================================
  notify:
    name: Send Notifications
    needs: [build-and-test, deploy-firebase]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Notification
        id: notify_prep
        run: |
          BUILD_STATUS="${{ needs.build-and-test.result }}"
          DEPLOY_STATUS="${{ needs.deploy-firebase.result }}"
          
          if [ "$BUILD_STATUS" = "success" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "color=28a745" >> $GITHUB_OUTPUT
          elif [ "$BUILD_STATUS" = "success" ]; then
            echo "status=⚠️ BUILD OK, DEPLOY SKIPPED" >> $GITHUB_OUTPUT
            echo "color=ffc107" >> $GITHUB_OUTPUT
          else
            echo "status=❌ BUILD FAILED" >> $GITHUB_OUTPUT
            echo "color=dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Log Summary
        run: |
          echo "=================================================="
          echo "Supreme AI CI/CD Pipeline Summary"
          echo "=================================================="
          echo "Build Status: ${{ needs.build-and-test.result }}"
          echo "Deploy Status: ${{ needs.deploy-firebase.result }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "=================================================="
          echo ""
          echo "${{ steps.notify_prep.outputs.status }}"
          echo ""
          echo "✅ Workflow complete. View details:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

