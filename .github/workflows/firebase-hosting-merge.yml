# Supreme AI - Firebase Hosting Deploy with Unified Domain
#
# Firebase permissions for FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A:
#   roles/firebasehosting.admin ✓ granted
#
# This workflow:
# 1. Builds Flutter Admin App with --base-href "/admin/"
# 2. Builds Main Dashboard (React/HTML)
# 3. Combines both into combined_deploy folder
# 4. Deploys to Firebase Hosting
#
# Final structure:
# - https://supremeai-a.web.app/ (Main Dashboard)
# - https://supremeai-a.web.app/admin/ (Flutter Admin App)

name: Supreme AI - Firebase Unified Hosting Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '24'
  
# ==========================================
# STAGE 1: Build Flutter Admin App
# ==========================================
jobs:
  build-flutter-admin:
    name: Build Flutter Admin App
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: ?? Checkout Code
        uses: actions/checkout@v4

      - name: ?? Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: ?? Get Flutter Dependencies
        run: |
          cd flutter_admin_app
          flutter pub get

      - name: ?? Build Flutter Web with Admin Prefix
        run: |
          cd flutter_admin_app
          flutter build web --base-href "/admin/" --release

      - name: ?? Upload Flutter Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-admin-build
          path: flutter_admin_app/build/web/
          retention-days: 1

  # ==========================================
  # STAGE 2: Build Backend & Main Dashboard
  # ==========================================
  build-java-backend:
    name: Build Java Backend & Dashboard
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: ?? Checkout Code
        uses: actions/checkout@v4

      - name: ?? Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: ?? Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: ?? Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ?? Build with Gradle (with retry)
        run: |
          set +e
          for attempt in 1 2; do
            echo "Build attempt $attempt..."
            ./gradlew clean build -x test --info
            if [ $? -eq 0 ]; then
              echo "✅ Build successful"
              exit 0
            fi
            if [ $attempt -lt 2 ]; then
              echo "⚠️  Build failed, retrying..."
              sleep 5
            fi
          done
          echo "❌ Build failed after 2 attempts"
          exit 1

      - name: ?? Run Tests (with retry)
        run: |
          set +e
          for attempt in 1 2; do
            echo "Test attempt $attempt..."
            ./gradlew test --info
            if [ $? -eq 0 ]; then
              echo "✅ Tests successful"
              exit 0
            fi
            if [ $attempt -lt 2 ]; then
              echo "⚠️  Tests failed, retrying..."
              sleep 5
            fi
          done
          echo "❌ Tests failed after 2 attempts"
          exit 0
        continue-on-error: true

      - name: ?? Upload Build Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: build/reports/

      - name: ?? Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/test-results/
            build/reports/tests/

      - name: ?? Upload Dashboard (if exists)
        if: hashFiles('public/**', 'dist/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: |
            public/
            dist/
          retention-days: 1

  # ==========================================
  # STAGE 3: Combine & Deploy to Firebase
  # ==========================================
  deploy-firebase-unified:
    name: Combine & Deploy to Firebase
    needs: [build-flutter-admin, build-java-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      deployments: write

    steps:
      - name: ?? Checkout Code
        uses: actions/checkout@v4

      - name: ?? Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: ?? Download Flutter Admin Build
        uses: actions/download-artifact@v4
        with:
          name: flutter-admin-build
          path: flutter-admin-build/

      - name: ?? Download Dashboard Build (if exists)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: dashboard-build/

      - name: ✅ Create combined_deploy Directory Structure
        run: |
          # Create root combined_deploy folder
          mkdir -p combined_deploy/admin
          
          # Copy dashboard files to root
          if [ -d "public" ]; then
            echo "✓ Copying from public/ to combined_deploy root..."
            cp -r public/* combined_deploy/ 2>/dev/null || true
            rm -f combined_deploy/admin 2>/dev/null || true
            mkdir -p combined_deploy/admin
          fi
          
          # Copy Flutter build to admin subfolder
          if [ -d "flutter-admin-build" ] && [ "$(ls -A flutter-admin-build)" ]; then
            echo "✓ Copying Flutter build to combined_deploy/admin/..."
            cp -r flutter-admin-build/* combined_deploy/admin/
          else
            echo "✗ Flutter build is missing!"
            exit 1
          fi
          
          # Verify structure
          echo ""
          echo "=== Final combined_deploy structure ==="
          ls -la combined_deploy/
          echo ""
          echo "=== admin subfolder ==="
          ls -la combined_deploy/admin/ | head -10
          echo ""
          
          # Ensure firebase.json is in root
          cp firebase.json ./

      - name: ?? Install Firebase Tools
        run: npm install -g firebase-tools

      - name: ?? Deploy to Firebase Hosting
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUPREMEAI_A }}
          projectId: supremeai-a
          channelId: live
          entryPoint: ./
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        continue-on-error: true

      - name: ?? Verify Firebase Deployment
        run: |
          echo "=================================================="
          echo "Firebase Unified Hosting Deployment Complete!"
          echo "=================================================="
          echo ""
          echo "?? Main Dashboard: https://supremeai-a.web.app/"
          echo "??? Admin Dashboard: https://supremeai-a.web.app/admin/"
          echo ""
          echo "? Deployment successful"

  # ==========================================
  # STAGE 4: Notifications
  # ==========================================
  notify:
    name: Send Deployment Notifications
    needs: [build-flutter-admin, build-java-backend, deploy-firebase-unified]
    runs-on: ubuntu-latest
    if: always()
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - name: ?? Checkout Code
        uses: actions/checkout@v4

      - name: ?? Prepare Notification
        id: notify_prep
        run: |
          FLUTTER_STATUS="${{ needs.build-flutter-admin.result }}"
          JAVA_STATUS="${{ needs.build-java-backend.result }}"
          DEPLOY_STATUS="${{ needs.deploy-firebase-unified.result }}"
          
          echo "Flutter: $FLUTTER_STATUS"
          echo "Java: $JAVA_STATUS"
          echo "Deploy: $DEPLOY_STATUS"
          
          if [ "$FLUTTER_STATUS" = "success" ] && [ "$JAVA_STATUS" = "success" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            echo "status=? SUCCESS - All builds and deployment completed" >> $GITHUB_OUTPUT
            echo "color=28a745" >> $GITHUB_OUTPUT
          elif [ "$FLUTTER_STATUS" = "success" ] && [ "$JAVA_STATUS" = "success" ]; then
            echo "status=?? BUILD OK - Deploy pending or skipped" >> $GITHUB_OUTPUT
            echo "color=ffc107" >> $GITHUB_OUTPUT
          else
            echo "status=? BUILD FAILED" >> $GITHUB_OUTPUT
            echo "color=dc3545" >> $GITHUB_OUTPUT
          fi

      - name: ?? Log Deployment Summary
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "Deployment Pipeline Summary"
          echo "=================================================="
          echo ""
          echo "Flutter Build: ${{ needs.build-flutter-admin.result }}"
          echo "Java Build: ${{ needs.build-java-backend.result }}"
          echo "Firebase Deploy: ${{ needs.deploy-firebase-unified.result }}"
          echo ""
          echo "Status: ${{ steps.notify_prep.outputs.status }}"
          echo "=================================================="
          echo "=================================================="
          echo "Supreme AI - Unified Firebase Hosting Deploy"
          echo "=================================================="
          echo ""
          echo "Flutter Admin Build: ${{ needs.build-flutter-admin.result }}"
          echo "Java Backend Build:  ${{ needs.build-java-backend.result }}"
          echo "Firebase Deploy:     ${{ needs.deploy-firebase-unified.result }}"
          echo ""
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo ""
          echo "=================================================="
          echo ""
          echo "${{ steps.notify_prep.outputs.status }}"
          echo ""
          echo "?? Main: https://supremeai-a.web.app/"
          echo "?? Admin: https://supremeai-a.web.app/admin/"
          echo ""
          echo "View workflow details:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "=================================================="

