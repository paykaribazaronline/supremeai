name: Simulator Runtime CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'infra/Dockerfile.simulator'
      - 'src/main/java/com/supremeai/simulator/**'
      - 'src/main/java/com/supremeai/websocket/**'
      - '.github/workflows/simulator-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  RUNTIME_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/simulator-runtime:latest

jobs:
  build-and-push:
    name: Build & Push Simulator Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - run: chmod +x ./gradlew

      - name: Check Formatting
        run: ./gradlew spotlessCheck --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Verify JAR
        run: ls -la build/libs/

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: oauth2accesstoken
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build Simulator Runtime Image
        run: |
          docker build -f infra/Dockerfile -t ${{ env.RUNTIME_IMAGE }} .
          docker push ${{ env.RUNTIME_IMAGE }}

      - name: Verify Image Pushed
        run: |
          gcloud auth activate-service-account --key-file=<(echo '${{ secrets.GCP_SA_KEY }}')
          gcloud container images list --repository=gcr.io/${{ secrets.GCP_PROJECT_ID }}
