name: Simulator Runtime CI/CD

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-java-backend:
    name: Verify Java Backend Exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "⚠️ This workflow targets a Java/Spring Boot simulator runtime (src/main/java/com/supremeai/simulator/**)."
          echo "   No Java backend was found in this repository."
          echo "   The simulator is served by the Python/FastAPI backend at api/routes/simulator.py"
          echo "   Disabling this workflow until a Java simulator is added."
