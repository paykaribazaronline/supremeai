name: CodeQL_Scheduled_Analysis

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL_Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup_Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: ""
      - name: CodeQL_Init
        uses: github/codeql-action/init@v3
        with:
          languages: "java"
          build-mode: "manual"
      - name: Clean_Build_For_CodeQL
        run: |
          ./gradlew clean compileJava --no-build-cache --refresh-dependencies
      - name: Run_CodeQL
        uses: github/codeql-action/analyze@v3
