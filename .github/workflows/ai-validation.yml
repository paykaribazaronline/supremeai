name: AI Validation Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and run unit tests with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean test --no-daemon

      - name: Run Backend for Validation
        env:
          SPRING_PROFILES_ACTIVE: test
        run: |
          nohup ./gradlew bootRun --no-daemon > backend.log 2>&1 &
          for i in $(seq 1 90); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health | grep -q "200"; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($((i*3))s)"
            sleep 3
          done

      - name: Run AI validation script
        run: bash scripts/validate_ai.sh
        env:
          POCKETLAB_URL: ${{ secrets.POCKETLAB_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supeAI-test-reports
          path: build/reports/tests/**
