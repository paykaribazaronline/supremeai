name: AI Validation Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run unit tests
        run: mvn -B clean verify

      - name: Run AI validation script
        # Assuming a script exists at scripts/validate_ai.sh that checks model integration
        run: bash scripts/validate_ai.sh
        env:
          POCKETLAB_URL: ${{ secrets.POCKETLAB_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supeAI-test-reports
          path: target/surefire-reports/**
