name: AI Validation Pipeline

on:
  push:
    branches: [ main, develop, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build and run unit tests with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean test --no-daemon

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run Backend for Validation
        env:
          SPRING_PROFILES_ACTIVE: test
        run: |
          nohup ./gradlew bootRun --no-daemon > backend.log 2>&1 &
          for i in $(seq 1 90); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health | grep -q "200"; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($((i*3))s)"
            sleep 3
          done

      - name: Run AI validation script
        run: bash scripts/validate_ai.sh
        env:
          POCKETLAB_URL: ${{ secrets.SUPREMEAI_BASE_URL }}

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supeAI-test-reports
          path: build/reports/tests/**
