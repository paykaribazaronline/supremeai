name: AI Validation Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and run unit tests with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean test --no-daemon

      - name: Run AI validation script
        # Assuming a script exists at scripts/validate_ai.sh that checks model integration
        run: bash scripts/validate_ai.sh
        env:
          POCKETLAB_URL: ${{ secrets.POCKETLAB_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supeAI-test-reports
          path: target/surefire-reports/**
