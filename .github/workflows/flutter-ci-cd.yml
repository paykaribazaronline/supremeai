name: Flutter Admin App - Build and Deploy

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - 'flutter_admin_app/**'
      - '.github/workflows/flutter-ci-cd.yml'
      - 'firebase.json'
      - '.firebaserc'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'flutter_admin_app/**'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.0'
  FIREBASE_PROJECT: 'supremeai-a'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  flutter-build:
    name: Flutter Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build-status: ${{ job.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Check Flutter version
        run: flutter --version

      - name: Clean pub cache and lockfile
        working-directory: flutter_admin_app
        run: |
          echo "Clearing pub cache..."
          flutter pub cache clean --force || true
          rm -f pubspec.lock || true
          echo "Cache cleaned"

      - name: Install dependencies
        working-directory: flutter_admin_app
        run: |
          echo "Getting dependencies..."
          flutter pub get
          echo "Dependencies installed"

      - name: Analyze code
        working-directory: flutter_admin_app
        run: flutter analyze --no-pub

      - name: Run unit tests
        working-directory: flutter_admin_app
        run: flutter test --no-pub

      - name: Build web app for release
        working-directory: flutter_admin_app
        run: |
          echo "Building web app..."
          # Build with --base-href /admin/ to match unified hosting structure
          flutter build web --release --no-pub --base-href /admin/
          echo "Web build completed"
          du -sh build/web/
          find build/web/ -type f | wc -l
          echo "Files built:"
          ls -la build/web/

      - name: Create web artifact
        run: |
          mkdir -p web-build
          cp -r flutter_admin_app/build/web/* web-build/
          ls -la web-build/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: web-build/
          retention-days: 30
          if-no-files-found: warn

      - name: Build summary
        if: success()
        run: |
          echo "Flutter web build completed successfully"
          echo ""
          echo "Build artifacts:"
          ls -lh flutter_admin_app/build/web/ | head -20

  deploy-android:
    name: Build and Release Android APK
    needs: flutter-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    outputs:
      has-signing-secrets: ${{ steps.signing-mode.outputs.has_signing_secrets }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Detect Android signing mode
        id: signing-mode
        run: |
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_STORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing signing secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "has_signing_secrets=true" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets found; signed APK and AAB build enabled"
          else
            echo "has_signing_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets not configured; building trial APK with debug signing only"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Create Android keystore and properties
        if: steps.signing-mode.outputs.has_signing_secrets == 'true'
        run: |
          mkdir -p flutter_admin_app/android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > flutter_admin_app/android/keystore/release-keystore.jks

          cat > flutter_admin_app/android/keystore.properties <<EOF
          storeFile=../keystore/release-keystore.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

          echo "Android release signing files prepared"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Validate Android minSdk policy
        run: |
          min_sdk=$(grep -Eo 'minSdk\s*=\s*[0-9]+' flutter_admin_app/android/app/build.gradle.kts | head -1 | grep -Eo '[0-9]+')
          if [ -z "$min_sdk" ]; then
            echo "Could not detect minSdk from build.gradle.kts"
            exit 1
          fi

          if [ "$min_sdk" -lt 24 ]; then
            echo "minSdk policy violation: found $min_sdk, required >= 24"
            exit 1
          fi

          echo "minSdk validation passed: $min_sdk"

      - name: Install Flutter dependencies
        working-directory: flutter_admin_app
        run: flutter pub get

      - name: Build Android APK
        working-directory: flutter_admin_app
        run: |
          echo "Building Android APK (split per ABI)..."
          flutter build apk --release --no-pub --split-per-abi
          echo "APK build completed"
          ls -lh build/app/outputs/flutter-apk/
        env:
          REQUIRE_RELEASE_SIGNING: ${{ steps.signing-mode.outputs.has_signing_secrets }}

      - name: Build app bundle
        if: steps.signing-mode.outputs.has_signing_secrets == 'true'
        working-directory: flutter_admin_app
        run: |
          echo "Building App Bundle for Google Play..."
          flutter build appbundle --release --no-pub
          echo "AAB build completed"
          ls -lh build/app/outputs/bundle/release/
        env:
          REQUIRE_RELEASE_SIGNING: 'true'

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.signing-mode.outputs.has_signing_secrets == 'true' && 'flutter-android-release' || 'flutter-android-trial-apk' }}
          path: |
            flutter_admin_app/build/app/outputs/flutter-apk/
            ${{ steps.signing-mode.outputs.has_signing_secrets == 'true' && 'flutter_admin_app/build/app/outputs/bundle/release/' || '' }}
          retention-days: 30
          if-no-files-found: warn

      - name: Summarize Android build mode
        run: |
          if [ "${{ steps.signing-mode.outputs.has_signing_secrets }}" = "true" ]; then
            echo "Signed Android release build completed (APK and AAB)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Trial Android build completed with debug signing only (APK only, not Play Store ready)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create release on tags
        if: startsWith(github.ref, 'refs/tags/') && steps.signing-mode.outputs.has_signing_secrets == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter_admin_app/build/app/outputs/flutter-apk/*.apk
            flutter_admin_app/build/app/outputs/bundle/release/*.aab
          body: |
            ## SupremeAI Admin App - Release Build

            ### Artifacts:
            - Android APK (arm64-v8a, armeabi-v7a, x86, x86_64)
            - App Bundle (AAB) for Google Play Store

            **Ref:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality-checks:
    name: Code Quality and Notifications
    needs: [flutter-build, deploy-android]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_admin_app
        run: flutter pub get

      - name: Analyze code
        working-directory: flutter_admin_app
        run: flutter analyze --no-pub

      - name: Generate summary report
        run: |
          WEB_STATUS="${{ needs.flutter-build.result }}"
          ANDROID_STATUS="${{ needs.deploy-android.result }}"

          echo "## Flutter CI/CD Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** Flutter Admin App CI/CD" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Flutter SDK: ${{ env.FLUTTER_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web Build Job: $WEB_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- Android Build Job: $ANDROID_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Live Web App: https://supremeai-a.web.app/admin/" >> $GITHUB_STEP_SUMMARY
          echo "- Web deployment is handled by 'Supreme AI - Firebase Unified Hosting Deploy' workflow" >> $GITHUB_STEP_SUMMARY
          echo "- Firebase Project: ${{ env.FIREBASE_PROJECT }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- flutter-web-build (web app)" >> $GITHUB_STEP_SUMMARY
          echo "- flutter-android-release (APK + AAB)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Documentation" >> $GITHUB_STEP_SUMMARY
          echo "See [CI_CD_AUTOMATION.md](flutter_admin_app/CI_CD_AUTOMATION.md) for detailed setup" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Flutter build successful.\n\nArtifacts generated:\n- Web app build\n- Android APK and AAB files\n\nPreview: https://supremeai-a.web.app/admin/'
            })
        continue-on-error: true
