name: Supreme PR Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      config_changed: ${{ steps.changes.outputs.config }}
      docker_changed: ${{ steps.changes.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            config:
              - '**/.env*'
              - '**/config/**'
            docker:
              - '**/Dockerfile*'
              - '**/docker-compose*'

  config-audit:
    needs: detect-changes
    if: needs.detect-changes.outputs.config_changed == 'true'
    uses: ./.github/workflows/supreme-config-audit.yml

  docker-gate:
    needs: detect-changes
    if: needs.detect-changes.outputs.docker_changed == 'true'
    uses: ./.github/workflows/supreme-docker-gatekeeper.yml

  supreme-approval:
    needs: [detect-changes, config-audit, docker-gate]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Supreme Decision
        run: |
          if [ "${{ needs.config-audit.result }}" == "failure" ] || \
             [ "${{ needs.docker-gate.result }}" == "failure" ]; then
            echo "::error::❌ SUPREME GATE: Blocked"
            exit 1
          fi
          echo "✅ SUPREME GATE: Approved"
