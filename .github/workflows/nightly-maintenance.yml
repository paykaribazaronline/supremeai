name: 🛠️ SupremeAI Nightly Maintenance

on:
  schedule:
    - cron: '0 2 * * 0'       # Supabase Backup & Cloud Cleanup (Sundays 2 AM UTC)
    - cron: '0 0 * * *'       # Prompt Evaluation & Auto-Coverage (Midnight UTC)
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Select maintenance job to run'
        required: true
        type: choice
        options:
          - all
          - db-backup
          - ai-evaluation
          - cleanup

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ----------------------------------------------------
  # 🗄️ DATABASE BACKUP TO CLOUDFLARE R2
  # ----------------------------------------------------
  db-backup:
    name: 🗄️ Supabase Backup to R2
    if: github.event_name == 'schedule' || github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'db-backup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Dump & Upload to R2
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          FILENAME="supremeai_db_backup_$(date +%Y%m%d_%H%M%S).dump"
          pg_dump "$SUPABASE_DB_URL" -F c -f $FILENAME
          aws s3 cp $FILENAME s3://${BUCKET_NAME}/database_backups/ --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --region auto

  # ----------------------------------------------------
  # 🤖 AI PROMPT EVALUATION & COVERAGE
  # ----------------------------------------------------
  ai-evaluation:
    name: 🧪 AI Evaluation & Tests
    if: github.event_name == 'schedule' || github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'ai-evaluation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install Dependencies
        run: |
          pip install poetry
          cd backend && poetry install --with dev --without ml
      - name: Auto-Generate Missing Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd backend
          poetry run pytest --cov=core --cov-report=xml || true
          poetry run python -m tools.auto_test_generator --report-path coverage.xml --min-coverage 75

  # ----------------------------------------------------
  # 🧹 CLOUD & CACHE CLEANUP
  # ----------------------------------------------------
  cleanup:
    name: 🧹 Cloud Run & Cache Cleanup
    if: github.event_name == 'schedule' || github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'cleanup'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Delete old Cloud Run revisions
        run: |
          gcloud run revisions list --service=supremeai-api --region=${{ vars.GCP_REGION || 'us-central1' }} --format="value(name)" --sort-by="~createTime" | tail -n +6 | xargs -r -I {} gcloud run revisions delete {} --region=${{ vars.GCP_REGION || 'us-central1' }} --quiet
      - name: Prune stale GitHub caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list --repo ${{ github.repository }} --limit 100 | awk '{print $1}' | xargs -r -I {} gh cache delete {} --repo ${{ github.repository }}
