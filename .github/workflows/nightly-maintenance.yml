name: 🛠️ SupremeAI Nightly Maintenance

on:
  schedule:
    - cron: '0 0 * * *'       # AI Validation (Midnight UTC)
    - cron: '0 4 * * *'       # AI Code Review (4 AM UTC)
    - cron: '0 2 * * 0'       # Cloud Cleanup (Sundays 2 AM)
    - cron: '0 3 * * 0'       # Cache Prune (Sundays 3 AM)
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Select maintenance job to run'
        required: true
        type: choice
        options:
          - all
          - ai-validation
          - ai-code-review
          - cloud-cleanup
          - cache-prune

env:
  PYTHON_VERSION: '3.11'

jobs:
  ai-code-review:
    name: 🤖 AI Code Review
    if: github.event_name == 'schedule' || github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'ai-code-review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install google-generativeai
      - name: Gemini Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/review.py

  ai-validation:
    name: 🧪 AI Validation (DeepEval)
    if: github.event_name == 'schedule' || github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'ai-validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install deepeval google-generativeai openai
      - name: DeepEval Validation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python .github/scripts/test_ai_reviewer.py

  cleanup-cloud:
    name: 🧹 Cloud Run Revision Cleanup
    if: github.event_name == 'schedule' || github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'cloud-cleanup'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Delete old Cloud Run revisions (keep newest 5)
        run: |
          gcloud run revisions list --service=supremeai-api --region=${{ vars.GCP_REGION || 'us-central1' }} --format="value(name)" --sort-by="~createTime" | tail -n +6 | xargs -r -I {} gcloud run revisions delete {} --region=${{ vars.GCP_REGION || 'us-central1' }} --quiet
      - name: Delete old GCR images (keep newest 10)
        run: |
          gcloud container images list-tags ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api --format='value(digest)' --limit=999999 | tail -n +11 | xargs -r -I {} gcloud container images delete ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supremeai-repo/supremeai-api@{} --quiet

  cache-maintenance:
    name: 🗂️ GitHub Actions Cache Prune
    if: github.event_name == 'schedule' || github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'cache-prune'
    runs-on: ubuntu-latest
    steps:
      - name: Prune stale caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Purging caches older than 14 days
          gh cache list --repo ${{ github.repository }} --limit 100 | awk '{print $1}' | xargs -r -I {} gh cache delete {} --repo ${{ github.repository }}
