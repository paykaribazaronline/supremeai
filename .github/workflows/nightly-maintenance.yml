name: 🛠️ SupremeAI Nightly Maintenance

on:
  schedule:
    - cron: '0 0 * * *'       # AI Validation (Midnight UTC)
    - cron: '0 2 * * 0'       # Supabase Backup & Cloud Cleanup (Sundays 2 AM)
    - cron: '0 3 * * *'       # Auto Test Coverage (3 AM UTC)
    - cron: '0 4 * * *'       # AI Code Review & Failover Update (4 AM UTC)
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # 1. Existing Jobs
  ai-code-review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: 'pip' }
      - run: pip install google-generativeai
      - env: { GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}' }
        run: python .github/scripts/review.py

  ai-validation:
    name: 🧪 AI Validation (DeepEval)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: 'pip' }
      - run: pip install deepeval google-generativeai openai
      - env: { GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}', OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}' }
        run: python .github/scripts/test_ai_reviewer.py

  cleanup-cloud:
    name: 🧹 Cloud Run Revision Cleanup
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with: { credentials_json: '${{ secrets.GCP_SA_KEY }}' }
      - uses: google-github-actions/setup-gcloud@v3
      - run: |
          gcloud run revisions list --service=supremeai-api --region=${{ vars.GCP_REGION || 'us-central1' }} --format="value(name)" --sort-by="~createTime" | tail -n +6 | xargs -r -I {} gcloud run revisions delete {} --region=${{ vars.GCP_REGION || 'us-central1' }} --quiet

  # 2. NEW: Database Backup to R2 (From supabase_backup_to_r2.yml)
  db-backup:
    name: 🗄️ Supabase Backup to R2
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Dump Database & Upload
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          FILENAME="supremeai_db_backup_$(date +%Y%m%d_%H%M%S).dump"
          pg_dump "$SUPABASE_DB_URL" -F c -f $FILENAME
          aws s3 cp $FILENAME s3://${BUCKET_NAME}/database_backups/ --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com --region auto

  # 3. NEW: Failover Update (From backup-update.yml)
  failover-update:
    name: 🔄 24h Failover Server Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify 24h Stability and Deploy
        env:
          GCP_BACKUP_REGION: ${{ vars.GCP_BACKUP_REGION || 'us-east1' }}
          BACKUP_SERVICE: ${{ vars.BACKUP_SERVICE_NAME || 'supremeai-api-backup' }}
        run: |
          python .github/scripts/enforce_24h_gap.py
          # Logic to deploy to backup service will be processed by script

  # 4. NEW: Auto Test Coverage (From auto_coverage.yml)
  auto-coverage:
    name: 🧬 AI Auto Test Generation
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '${{ env.PYTHON_VERSION }}', cache: 'pip' }
      - name: Run Test Generator
        env: { GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}' }
        run: |
          pip install poetry
          cd backend && poetry install --with dev --without ml
          poetry run pytest --cov=core --cov-report=xml
          poetry run python -m tools.auto_test_generator --report-path coverage.xml --min-coverage 75
          git config user.name "SupremeAI CI Bot"
          git config user.email "ci-bot@supremeai.dev"
          git add tests/ && git commit -m "feat(tests): ✨ Auto-generate missing test coverage" || true
          git push
