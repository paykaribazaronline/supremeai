name: Nightly AI Validation

on:
  schedule:
    - cron: '0 0 * * *' # Run once a day at midnight UTC
  workflow_dispatch: # Enable manual execution

jobs:
  ai-validation:
    name: Run DeepEval Code Review Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install deepeval google-generativeai openai

      - name: Run DeepEval Validation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python .github/scripts/test_ai_reviewer.py
