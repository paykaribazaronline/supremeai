name: Knowledge Reseed

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  workflow_dispatch:

jobs:
  reseed:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger remote knowledge reseed if configured
        env:
          SUPREMEAI_BASE_URL: ${{ secrets.SUPREMEAI_BASE_URL }}
          SUPREMEAI_SETUP_TOKEN: ${{ secrets.SUPREMEAI_SETUP_TOKEN }}
        run: |
          if [ -z "$SUPREMEAI_BASE_URL" ] || [ -z "$SUPREMEAI_SETUP_TOKEN" ]; then
            echo "Skipping reseed: SUPREMEAI_BASE_URL or SUPREMEAI_SETUP_TOKEN secret is not configured."
            exit 0
          fi

          echo "Triggering knowledge reseed on $SUPREMEAI_BASE_URL"
          curl --fail --show-error --silent \
            -X POST "$SUPREMEAI_BASE_URL/api/learning/reseed" \
            -H "X-Setup-Token: $SUPREMEAI_SETUP_TOKEN" \
            -H "Content-Type: application/json"