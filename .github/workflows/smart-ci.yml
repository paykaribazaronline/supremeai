name: Smart CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name }}"
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install ruff and mypy (fallback)
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy || true
      - name: Run ruff
        run: |
          if [ -f scripts/ci/run_tests.sh ]; then
            bash scripts/ci/run_tests.sh || true
          else
            ruff check . --output-format=github || true
          fi

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run tests
        run: |
          bash ./scripts/ci/run_tests.sh

  build_desktop:
    name: Build Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build desktop (placeholder)
        run: |
          echo "Building desktop app (placeholder)"

  build_mobile:
    name: Build Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
      - name: Build mobile (placeholder)
        run: |
          echo "Building mobile app (placeholder)"

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build web (placeholder)
        run: |
          echo "Building web app (placeholder)"

  changelog:
    name: Changelog
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        run: |
          bash ./scripts/ci/generate_changelog.sh

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          bash ./scripts/ci/deploy.sh
