name: SupremeAI Smart CI Auto-Fix & Retry

on:
  workflow_run:
    workflows: ["SupremeAI Smart CI"]
    types: [completed]
    branches: [main, master, develop]
  workflow_job:
    types: [completed]

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  analyze-and-fix:
    name: "Analyze Failed Jobs & Auto-Fix"
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch != '') ||
      (github.event_name == 'workflow_job' && github.event.workflow_job.conclusion == 'failure' && github.event.workflow_job.workflow_name == 'SupremeAI Smart CI')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      issues: write
    env:
      TRIGGER_RUN_ID: ${{ github.event.workflow_run.id || github.event.workflow_job.run_id }}
      TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch || github.event.workflow_job.head_branch }}
    steps:
      - name: Checkout triggering branch
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.TRIGGER_BRANCH }}
          fetch-depth: 1

      - name: Download CI Report Artifact
        id: download-report
        uses: actions/download-artifact@v7
        with:
          name: ci-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ env.TRIGGER_RUN_ID }}
        continue-on-error: true

      - name: Parse failed jobs from artifact
        id: parse-artifact
        if: steps.download-report.outcome == 'success'
        run: |
          if [ -f failure-report.md ]; then
            FAILED=$(grep "❌" failure-report.md | sed 's/.*| \*\*//' | sed 's/\*\*.*//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "failed_jobs=$FAILED" >> $GITHUB_OUTPUT
            echo "Detected from artifact: $FAILED"
          else
            echo "failed_jobs=[]" >> $GITHUB_OUTPUT
          fi

      - name: Parse failed jobs via GitHub API (fallback)
        id: parse-api
        if: steps.download-report.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ env.TRIGGER_RUN_ID }}"
          if [ -z "$RUN_ID" ]; then
            echo "failed_jobs=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          FAILED=$(gh run view "$RUN_ID" --json jobs | jq -c '[.jobs[] | select(.conclusion == "failure") | .name]')
          echo "failed_jobs=$FAILED" >> $GITHUB_OUTPUT
          echo "Detected from API: $FAILED"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node & PNPM
        uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Flutter (for mobile fixes)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true
        continue-on-error: true

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry install --no-interaction --no-ansi --no-root --with dev --without ml,tools
        continue-on-error: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        continue-on-error: true

      - name: Run Auto-Fix Engine
        id: auto-fix
        env:
          FAILED_JOBS: ${{ steps.parse-artifact.outputs.failed_jobs || steps.parse-api.outputs.failed_jobs }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          python .github/scripts/ci-auto-fix.py
          echo "fixes_committed=$?" >> $GITHUB_OUTPUT

      - name: Create issue if auto-fix failed
        if: steps.auto-fix.outputs.fixes_committed != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_JOBS: ${{ steps.parse-artifact.outputs.failed_jobs || steps.parse-api.outputs.failed_jobs }}
        run: |
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          ISSUE_TITLE="🚨 Auto-Fix Failed: CI jobs still failing after automated attempt"
          ISSUE_BODY="The following CI jobs failed and could not be auto-fixed:\n\n$(echo $FAILED_JOBS | jq -r '.[]' | sed 's/^/- /' | paste -sd '\n' -)\n\nOriginal run: $RUN_URL\n\nPlease investigate manually."
          gh issue create --title "$ISSUE_TITLE" --body "$ISSUE_BODY" --label "bug,ci-cd,auto-fix-failed" || true

      - name: Re-trigger Smart CI for fixed jobs
        if: steps.auto-fix.outputs.fixes_committed == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_JOBS: ${{ steps.parse-artifact.outputs.failed_jobs || steps.parse-api.outputs.failed_jobs }}
        run: |
          echo "🚀 Re-triggering SupremeAI Smart CI with forced_jobs..."
          gh workflow run supreme-ci.yml --ref ${{ github.event.workflow_run.head_branch }} -f forced_jobs="$FAILED_JOBS" -f is_retry="true"
          echo "✅ Re-triggered."
