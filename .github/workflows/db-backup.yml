name: SupremeAI Automated DB Backup

on:
  schedule:
    - cron: '0 2 * * 0' # Every Sunday at 2:00 AM UTC
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  backup:
    name: ?? Backup Database to R2
    runs-on: ubuntu-latest
    
    steps:
      - name: ?? Set Timestamp
        id: timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV
        
      - name: ?? Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
      - name: ?? Dump Database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Error: SUPABASE_DB_URL secret is not set!"
            exit 1
          fi
          echo "Starting database backup..."
          pg_dump "$SUPABASE_DB_URL" -Fc > backup_${{ env.TIMESTAMP }}.dump
          echo "Backup created successfully."
          
      - name: ?? Upload Backup to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ]; then
            echo "Error: R2_ACCOUNT_ID secret is not set!"
            exit 1
          fi
          echo "Uploading to R2 Bucket: $R2_BUCKET_NAME..."
          aws s3 cp backup_${{ env.TIMESTAMP }}.dump s3://$R2_BUCKET_NAME/supremeai_db_backup_${{ env.TIMESTAMP }}.dump \
            --endpoint-url https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com
          echo "? Backup successfully uploaded to R2!"
