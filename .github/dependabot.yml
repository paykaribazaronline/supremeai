# ডিপেন্ডাবট কনফিগারেশন
# রুল ১৬ (Zero Cost) অনুযায়ী সাপ্তাহিক আপডেট সোমবার সকাল ৬টায় (UTC) একসাথে চেক হবে
# PR এর সংখ্যা এবং সিআই (CI) রান কমানোর জন্য প্রতিটি ইকোসিস্টেমের সব আপডেটকে একটি একক গ্রুপ পিআর (Single Grouped PR)-এ নেওয়া হয়েছে।
version: 2
updates:
  # Node.js / pnpm (Frontend, WebChat, VS Code Extension)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      node-deps:
        patterns:
          - "*"

  # Python / Poetry (Backend)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      python-deps:
        patterns:
          - "*"

  # Flutter / Dart (Mobile App)
  - package-ecosystem: "pub"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      flutter-deps:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      github-actions-deps:
        patterns:
          - "*"

  # Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      docker-deps:
        patterns:
          - "*"

