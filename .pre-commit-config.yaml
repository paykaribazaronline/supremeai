# SupremeAI 2.0 — Pre-commit Configuration
# Install: pre-commit install
# Run all:  pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-ast
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
            - "types-redis"
            - "types-requests"

  - repo: local
    hooks:
      - id: supremeai-ai-gate
        name: SupremeAI AI Gate
name: Learn from Human Fixes
on:
  push:
    branches: [main, master, develop]

jobs:
  create-training-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check if this push fixes a previous failure
        # This script would use the GitHub API to see if the previous
        # commit on this branch had a 'failure' or 'cancelled' CI status.
        id: check_fix
        run: python .github/scripts/check_if_fix.py

      - name: Generate fine-tuning example
        if: steps.check_fix.outputs.is_fix == 'true'
        run: |
          # Get the diff from the broken commit to this one
          git fetch origin ${{ github.event.before }}
          git diff ${{ github.event.before }} ${{ github.sha }} > fix.diff
          
          # Create a JSONL file for fine-tuning
          # { "prompt": "[BROKEN_CODE] + [ERROR_LOG]", "completion": "[FIX_DIFF]" }
          python .github/scripts/create_finetune_pair.py fix.diff
