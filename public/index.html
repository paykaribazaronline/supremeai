<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>SupremeAI - User Login</title>
    <script defer src="/__/firebase/10.7.1/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .logo { font-size: 28px; font-weight: bold; color: #1e3c72; margin-bottom: 10px; text-align: center; }
        .logo span { color: #4299e1; }
        .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.1); }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(30,60,114,0.4); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 5px; margin-bottom: 20px; display: none; border-left: 4px solid #d32f2f; }
        .error.show { display: block; }
        .loading { display: none; text-align: center; margin-bottom: 10px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4299e1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading.show { display: block; }
    </style>
</head>
<body>
        <div class="logo">Supreme<span>AI</span></div>
        <div class="subtitle" id="subtitle">Customer Login</div>
        <div class="error" id="error"></div>
        <div class="loading" id="loading"><div class="spinner"></div></div>
        <form id="form">
            <div class="form-group" id="name-group" style="display: none;">
                <label for="display-name">Full Name</label>
                <input type="text" id="display-name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="customer@example.com" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="btn" disabled>Sign In</button>
        </form>
        <div style="margin-top: 20px; text-align: center; font-size: 14px; color: #666;">
            <span id="toggle-text">Don't have an account?</span>
            <a href="#" id="toggle-link" style="color: #4299e1; font-weight: 600; text-decoration: none; margin-left: 5px;">Sign Up</a>
        </div>
    </div>

    <script>
        // Initialize all variables at the top to avoid ReferenceError
        let auth = null;
        let db = null;
        let firebaseReady = false;
        let isLogin = true;
        
        const errorEl = document.getElementById('error');
        const loadingEl = document.getElementById('loading');
        const btn = document.getElementById('btn');
        const form = document.getElementById('form');
        const subtitleEl = document.getElementById('subtitle');
        const nameGroup = document.getElementById('name-group');
        const toggleText = document.getElementById('toggle-text');
        const toggleLink = document.getElementById('toggle-link');

        function showError(msg) { 
            console.error('Auth error:', msg);
            errorEl.textContent = msg; 
            errorEl.classList.add('show'); 
        }
        
        function hideError() { 
            errorEl.classList.remove('show'); 
        }
        
        function setLoading(loading) { 
            loadingEl.classList.toggle('show', loading); 
            btn.disabled = loading || !firebaseReady; 
        }

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            subtitleEl.textContent = isLogin ? 'Customer Login' : 'Create Account';
            btn.textContent = isLogin ? 'Sign In' : 'Sign Up';
            toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleLink.textContent = isLogin ? "Sign Up" : "Sign In";
            nameGroup.style.display = isLogin ? 'none' : 'block';
            hideError();
        });

        function initFirebase() {
            try {
                // Check if Firebase SDK is loaded
                if (typeof firebase === 'undefined') {
                    console.warn('Firebase SDK not loaded yet');
                    return false;
                }
                
                // Check if already initialized
                if (firebase.apps && firebase.apps.length > 0) {
                    console.log('Firebase already initialized');
                }
                
                // Initialize Firebase services
                auth = firebase.auth();
                db = firebase.firestore();
                firebaseReady = true;
                btn.disabled = false;
                console.log('Firebase initialized successfully');
                return true;
            } catch (err) {
                console.error('Firebase initialization error:', err);
                showError('Failed to initialize authentication system');
                return false;
            }
        }

        // Initialize Firebase as soon as the page loads
        // Use DOMContentLoaded to ensure all elements are available
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded, checking Firebase...');
            
            // Try to initialize immediately
            if (!initFirebase()) {
                // If Firebase SDK isn't loaded yet, wait for it
                const maxAttempts = 20; // 10 seconds max
                let attempts = 0;
                
                const checkFirebase = setInterval(() => {
                    attempts++;
                    console.log(`Checking Firebase (${attempts}/${maxAttempts})...`);
                    
                    if (initFirebase()) {
                        clearInterval(checkFirebase);
                        console.log('Firebase initialized after polling');
                    } else if (attempts >= maxAttempts) {
                        clearInterval(checkFirebase);
                        console.error('Firebase failed to load after', maxAttempts, 'attempts');
                        showError('Authentication system failed to load. Please refresh the page.');
                        btn.disabled = true;
                    }
                }, 500);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('display-name').value.trim();

            // Basic validation
            if (!email || !password) { 
                showError('Enter both email and password'); 
                return; 
            }
            if (!isLogin && !displayName) { 
                showError('Please enter your full name'); 
                return; 
            }
            
            // Check if Firebase is ready
            if (!firebaseReady || !auth) {
                showError('Authentication system not ready. Please refresh the page.');
                console.error('Firebase not ready:', { firebaseReady, auth: !!auth });
                return; 
            }

            setLoading(true);
            
            try {
                let user;
                if (isLogin) {
                    // Sign in
                    console.log('Attempting login for:', email);
                    const cred = await auth.signInWithEmailAndPassword(email, password);
                    user = cred.user;
                    console.log('Login successful for user:', user.uid);
                } else {
                    // Sign up
                    console.log('Attempting signup for:', email);
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    user = cred.user;
                    
                    if (displayName) {
                        await user.updateProfile({ displayName: displayName });
                        console.log('Profile updated with display name:', displayName);
                    }
                    console.log('Signup successful for user:', user.uid);
                }

                const uid = user.uid;
                const token = await user.getIdToken();
                
                // Store user info in sessionStorage
                sessionStorage.setItem('supremeai_token', token);
                sessionStorage.setItem('supremeai_user', JSON.stringify({
                    email: user.email,
                    uid: uid,
                    displayName: user.displayName || displayName || email.split('@')[0]
                }));
                
                console.log('User data stored, redirecting...');
                
                // Redirect to the main application
                window.location.href = '/android-generator.html';
                
            } catch (err) {
                console.error('Authentication error:', err);
                
                // Provide user-friendly error messages
                let errorMessage = 'Authentication failed';
                if (err.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address';
                } else if (err.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email';
                } else if (err.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password';
                } else if (err.code === 'auth/email-already-in-use') {
                    errorMessage = 'Email already registered';
                } else if (err.code === 'auth/weak-password') {
                    errorMessage = 'Password should be at least 6 characters';
                } else if (err.code === 'auth/network-request-failed') {
                    errorMessage = 'Network error. Please check your connection';
                } else if (err.message) {
                    errorMessage = err.message;
                }
                
                showError(errorMessage);
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
