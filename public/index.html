<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeAI - Admin Login</title>
    <script defer src="/__/firebase/12.11.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/12.11.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/12.11.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .logo { font-size: 28px; font-weight: bold; color: #1e3c72; margin-bottom: 10px; text-align: center; }
        .logo span { color: #4299e1; }
        .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.1); }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(30,60,114,0.4); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 5px; margin-bottom: 20px; display: none; border-left: 4px solid #d32f2f; }
        .error.show { display: block; }
        .loading { display: none; text-align: center; margin-bottom: 10px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4299e1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">Supreme<span>AI</span></div>
        <div class="subtitle">Admin Dashboard Login</div>
        <div class="error" id="error"></div>
        <div class="loading" id="loading"><div class="spinner"></div></div>
        <form id="form">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" placeholder="admin@supremeai.com" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="btn" disabled>Sign In</button>
        </form>
    </div>

    <script>
        let auth, db, firebaseReady = false;
        const errorEl = document.getElementById('error');
        const loadingEl = document.getElementById('loading');
        const btn = document.getElementById('btn');
        const form = document.getElementById('form');

        function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); }
        function hideError() { errorEl.classList.remove('show'); }
        function setLoading(loading) { loadingEl.classList.toggle('show', loading); btn.disabled = loading; }

        function initFirebase() {
            if (typeof firebase === 'undefined' || !firebase.apps.length) return false;
            auth = firebase.auth();
            db = firebase.firestore();
            firebaseReady = true;
            btn.disabled = false;
            return true;
        }

        // Wait for Firebase to load via Hosting auto-config
        function waitForFirebase() {
            const check = setInterval(() => {
                if (initFirebase()) clearInterval(check);
            }, 500);
        }

        waitForFirebase();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) { showError('Enter both email and password'); return; }
            if (!firebaseReady) { showError('Firebase not loaded. Refresh.'); return; }

            setLoading(true);
            try {
                // Sign in with Firebase Auth
                const cred = await auth.signInWithEmailAndPassword(email, password);
                const user = cred.user;
                const uid = user.uid;

                // Check admin status in Firestore
                const userDoc = await db.collection('users').doc(uid).get();
                
                if (!userDoc.exists) {
                    // Fallback: check Firebase custom claims if user doc not yet created
                    const idTokenResult = await user.getIdTokenResult();
                    const isAdmin = idTokenResult.claims.admin === true || idTokenResult.claims.role === 'ADMIN';
                    
                    if (!isAdmin) {
                        await auth.signOut();
                        throw new Error('Access denied: Admin only');
                    }
                } else {
                    const data = userDoc.data();
                    const isAdmin = data.isAdmin === true || data.role === 'admin';
                    if (!isAdmin) {
                        await auth.signOut();
                        throw new Error('Access denied: Admin only');
                    }
                }

                // Store auth state and redirect
                sessionStorage.setItem('supremeai_admin', 'true');
                sessionStorage.setItem('supremeai_user', JSON.stringify({
                    email: user.email,
                    uid: uid,
                    displayName: user.displayName || email.split('@')[0]
                }));

                window.location.href = '/admin-console.html';
            } catch (err) {
                console.error(err);
                showError(err.message || 'Login failed');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
