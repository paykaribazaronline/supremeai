<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeAI - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .logo span {
            color: #4299e1;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
            background: #f8f9ff;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #d32f2f;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #388e3c;
            background: #e8f5e9;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #388e3c;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-bottom: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4299e1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading.show {
            display: block;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .remember-me input {
            margin-right: 8px;
            width: auto;
        }

        .remember-me label {
            margin: 0;
            font-weight: normal;
            color: #666;
        }

        .footer-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        .localhost-badge {
            display: inline-block;
            background: #4299e1;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">Supreme<span>AI</span></div>
            <div class="subtitle">Admin Dashboard</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="text" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your Firebase Auth email"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <button type="submit" class="login-button" id="loginButton">Sign In</button>
        </form>

        <div class="localhost-badge">
            🏠 Access on localhost:8001 and web host
        </div>

        <div class="footer-text">
            <p>© 2026 SupremeAI - Automated App Generator</p>
            <p>Advanced Authentication System v1.0</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const loginButton = document.getElementById('loginButton');
        const rememberMe = document.getElementById('rememberMe');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        const STORAGE_KEY = 'supremeai_remembered_username';
        const STORAGE_EXPIRY_KEY = 'supremeai_remembered_expiry';
        const STORAGE_PERSISTENCE_KEY = 'supremeai_token_persistence_enabled';
        const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;

        const firebaseConfig = {
            apiKey: "AIzaSyCib1UPogwLoAshIWm9YQJB_RR0UxC07i8",
            authDomain: "supremeai-a.firebaseapp.com",
            databaseURL: "https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "supremeai-a",
            storageBucket: "supremeai-a.firebasestorage.app",
            messagingSenderId: "565236080752",
            appId: "1:565236080752:web:572bb9313db9afb355d4b5"
        };

        let firebaseAuth = null;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            firebaseAuth = firebase.auth();
        } catch (err) {
            console.warn('Firebase Auth init failed:', err.message);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem(STORAGE_KEY);
            const savedExpiry = localStorage.getItem(STORAGE_EXPIRY_KEY);

            if (savedEmail && savedExpiry && Date.now() < parseInt(savedExpiry, 10)) {
                emailInput.value = savedEmail;
                rememberMe.checked = true;
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            await loginUser(email, password);
        });

        async function loginUser(email, password) {
            try {
                loading.classList.add('show');
                loginButton.disabled = true;

                if (!firebaseAuth) {
                    throw new Error('Firebase Auth is not initialized');
                }

                const credential = await firebaseAuth.signInWithEmailAndPassword(email, password);
                const idToken = await credential.user.getIdToken();

                const response = await fetch('/api/auth/firebase-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || 'Firebase login failed');
                }

                localStorage.setItem('supremeai_token', data.token);
                localStorage.setItem('supremeai_refresh_token', data.refreshToken || '');
                localStorage.setItem('supremeai_user', JSON.stringify(data.user || {}));

                if (rememberMe.checked) {
                    localStorage.setItem(STORAGE_KEY, email);
                    localStorage.setItem(STORAGE_EXPIRY_KEY, (Date.now() + THIRTY_DAYS_MS).toString());
                    localStorage.setItem(STORAGE_PERSISTENCE_KEY, 'true');
                } else {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem(STORAGE_EXPIRY_KEY);
                    localStorage.removeItem(STORAGE_PERSISTENCE_KEY);
                }

                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);
            } catch (error) {
                showError(error.message || 'Login failed. Please try again.');
                loginButton.disabled = false;
            } finally {
                loading.classList.remove('show');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }

        function clearMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement !== loginButton) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
