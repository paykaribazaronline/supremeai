<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeAI - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .logo span {
            color: #4299e1;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
            background: #f8f9ff;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #d32f2f;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #388e3c;
            background: #e8f5e9;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #388e3c;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-bottom: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4299e1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading.show {
            display: block;
        }

        .demo-credentials {
            background: #e3f2fd;
            border-left: 4px solid #4299e1;
            padding: 15px;
            border-radius: 5px;
            margin-top: 30px;
            font-size: 13px;
            color: #1565c0;
        }

        .demo-credentials p {
            margin-bottom: 8px;
        }

        .demo-credentials code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            color: #d32f2f;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .remember-me input {
            margin-right: 8px;
            width: auto;
        }

        .remember-me label {
            margin: 0;
            font-weight: normal;
            color: #666;
        }

        .footer-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        .localhost-badge {
            display: inline-block;
            background: #4299e1;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">Supreme<span>AI</span></div>
            <div class="subtitle">Admin Dashboard</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <button type="submit" class="login-button" id="loginButton">Sign In</button>
        </form>

        <div class="demo-credentials">
            <p><strong>🔐 Demo Credentials:</strong></p>
            <p>Username: <code>admin</code></p>
            <p>Password: <code>supremeai123</code></p>
            <p style="margin-bottom: 0; margin-top: 10px; font-style: italic;">First login required to initialize system</p>
        </div>

        <div class="localhost-badge">
            🏠 Access on localhost:8001 and web host
        </div>

        <div class="footer-text">
            <p>© 2026 SupremeAI - Automated App Generator</p>
            <p>Advanced Authentication System v1.0</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const loginButton = document.getElementById('loginButton');
        const rememberMe = document.getElementById('rememberMe');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Load remembered credentials if remember me was checked
        window.addEventListener('DOMContentLoaded', () => {
            const savedUsername = localStorage.getItem('supremeai_remembered_username');
            const savedPassword = localStorage.getItem('supremeai_remembered_password');
            
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberMe.checked = true;
            }
            
            if (savedPassword) {
                passwordInput.value = savedPassword;
            }
            
            if (savedUsername) {
                passwordInput.focus();
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            await loginUser(username, password);
        });

        async function loginUser(username, password) {
            try {
                loading.classList.add('show');
                loginButton.disabled = true;

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Save token to localStorage
                localStorage.setItem('supremeai_token', data.token);
                localStorage.setItem('supremeai_refresh_token', data.refreshToken);
                localStorage.setItem('supremeai_user', JSON.stringify(data.user));

                // Save credentials if remember me is checked (with security warning)
                if (rememberMe.checked) {
                    localStorage.setItem('supremeai_remembered_username', username);
                    localStorage.setItem('supremeai_remembered_password', password);
                    console.warn('⚠️ Credentials saved locally. Only use on trusted devices!');
                } else {
                    localStorage.removeItem('supremeai_remembered_username');
                    localStorage.removeItem('supremeai_remembered_password');
                }

                showSuccess('Login successful! Redirecting...');
                
                // Redirect to admin dashboard after 1 second
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);

            } catch (error) {
                showError(error.message || 'Login failed. Please try again.');
                loginButton.disabled = false;
            } finally {
                loading.classList.remove('show');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }

        function clearMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        // Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement !== loginButton) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
