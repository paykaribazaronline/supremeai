# Render.com deployment configuration
# https://docs.render.com/render-yaml-spec
#
# Required secrets (set in Render Dashboard → Environment):
#   FIREBASE_SERVICE_ACCOUNT_JSON  - Firebase service account JSON string
#   TAVILY_API_KEY                 - Tavily search API key
#   OPENAI_API_KEY                 - OpenAI API key
#   GEMINI_API_KEY                 - Google Gemini API key
#   ADMIN_TOKEN                    - Admin bearer token for protected endpoints
#   API_BASE_URL                   - Base URL of this service (set after first deploy)

services:
  - type: web
    name: supremeai
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /actuator/health
    autoDeploy: yes
    envVars:
      # PORT is injected automatically by Render; explicitly set for clarity
      - key: PORT
        value: "8080"
      # Firebase project configuration (non-secret)
      - key: FIREBASE_PROJECT_ID
        value: supremeai-a
      - key: FIREBASE_DATABASE_URL
        value: https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/
      # Secrets — set values in the Render dashboard (sync: false = not synced from render.yaml)
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: API_BASE_URL
        sync: false
