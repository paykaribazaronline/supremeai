# Test Profile Configuration
spring.application.name=supremeai-test
server.port=8080

# Allow bean definition overriding in tests (for mock beans)
spring.main.allow-bean-definition-overriding=true

# Disable unnecessary auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Logging
logging.level.root=INFO
logging.level.org.example=DEBUG
logging.level.org.springframework=WARN
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot.test=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Security - Test tokens
supremeai.api.tokens=test-token,valid-token,admin-token,dev-token

# Firebase Admin SDK Configuration for tests
# Webhook Secret
github.webhook.secret=test-webhook-secret

# Firebase - Mock for tests
firebase.project-id=test-project
firebase.database-url=https://test-project.firebaseio.com

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true

# Cache
cache.ttl.minutes=30
cache.max-size=10000

# Rate Limiting
rate-limit.requests-per-minute=60
rate-limit.enabled=true

# Phoenix Self-Healing Configuration
# DISABLE Phoenix agents in tests - they have external dependencies not available in test context
# (AIAgentOrchestrator, DeploymentService, GitRepositoryService)
# Tests validate core functionality; Phoenix can be tested separately with integration tests
supremeai.selfhealing.phoenix.enabled=false

# Message Queue
message-queue.batch-size=50
message-queue.batch-timeout-seconds=5
message-queue.capacity=10000

# Webhook Settings
webhook.deduplication-window-seconds=30
webhook.retry-count=3
webhook.retry-delay-ms=1000

# Test Timeouts
test.await-timeout-ms=5000
