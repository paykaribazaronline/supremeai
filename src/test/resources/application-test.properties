# Test Profile Configuration
spring.application.name=supremeai-test
server.port=8080

# Allow bean definition overriding in tests (for mock beans)
spring.main.allow-bean-definition-overriding=true

# Disable unnecessary auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Logging
logging.level.root=INFO
logging.level.org.example=DEBUG
logging.level.org.springframework=WARN
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot.test=DEBUG
logging.level.com.supremeai=DEBUG
logging.level.reactor.core=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Security - Test tokens
supremeai.api.tokens=test-token,valid-token,admin-token,dev-token

# Firebase Admin SDK Configuration for tests
github.webhook.secret=test-webhook-secret

# Firebase / Firestore — tests
spring.cloud.gcp.firestore.enabled=false
spring.cloud.gcp.firestore.host=localhost:8081
spring.cloud.gcp.firestore.project-id=supremeai-a
spring.cloud.gcp.project-id=supremeai-a
spring.cloud.gcp.credentials.location=
firebase.project.id=supremeai-a
firebase.project-id=supremeai-a
firebase.enabled=true

# JWT for tests
security.jwt.secret=test-secret-key-for-testing-only
security.jwt.expiration=86400000

# JWT for tests
security.jwt.secret=test-secret-key-for-testing-only
security.jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true

# Datasource (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Redis (test)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=1

# Cache
cache.ttl.minutes=30
cache.max-size=10000

# Rate Limiting
rate-limit.requests-per-minute=60
rate-limit.enabled=true

# Phoenix Self-Healing Configuration (disabled)
supremeai.selfhealing.phoenix.enabled=false

# Message Queue
message-queue.batch-size=50
message-queue.batch-timeout-seconds=5
message-queue.capacity=10000

# Webhook Settings
webhook.deduplication-window-seconds=30
webhook.retry-count=3
webhook.retry-delay-ms=1000

# Test Timeouts
test.await-timeout-ms=5000
test.long-running=30000
