# Local development configuration
# This file overrides settings for local development when using the "local" profile

# JWT Secret for local development (base64 encoded 32-byte key)
JWT_SECRET=mySuperSecretKeyForLocalDevelopment12345678901234567890

# Override app.jwtSecret to use the JWT_SECRET property
app.jwtSecret=${JWT_SECRET}

# Redis configuration for local development
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000

# Firestore settings
# Default to enabled so reactive Firestore repositories can be created locally.
# Override with LOCAL_FIRESTORE_ENABLED=false if you explicitly want to disable it.
spring.cloud.gcp.firestore.enabled=${LOCAL_FIRESTORE_ENABLED:true}

# Firebase settings for local development
firebase.project.id=supremeai-local
firebase.database.url=https://supremeai-local.firebaseio.com
# firebase.credentials.path=classpath:firebase-service-account-local.json

# Local database (H2 for fast local startup)
spring.datasource.url=jdbc:h2:mem:supremeai_local;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Logging - more verbose for local development
logging.level.com.supremeai=DEBUG
logging.level.org.springframework.web=DEBUG

# Disable security for easier local testing (optional)
# spring.security.enabled=false

# Virtual threads (if supported by JDK)
spring.threads.virtual.enabled=false
