# Local development configuration overrides

# JWT Secret for local development (32+ chars required for HS256)
JWT_SECRET=${LOCAL_JWT_SECRET:this_is_a_32_char_very_secret_local_key_12345}
app.jwtSecret=${JWT_SECRET}

# Server configuration
server.port=8080

# Firestore configuration (Using Cloud Firestore — real production instance)
spring.cloud.gcp.project-id=supremeai-a
spring.cloud.gcp.firestore.enabled=true
spring.cloud.gcp.firestore.project-id=supremeai-a
# IMPORTANT: emulator.enabled MUST remain false for production/local-cloud usage
# Only set to true when running the Firebase emulator suite locally
spring.cloud.gcp.firestore.emulator.enabled=false
# DO NOT set spring.cloud.gcp.firestore.host here — leaving it unset forces Spring Cloud GCP
# to connect to real Cloud Firestore. Setting it to 127.0.0.1:8081 (even as a fallback)
# causes gRPC "UNAVAILABLE: io exception / Connection refused" when emulator is not running.
spring.cloud.gcp.project-id=supremeai-a
spring.cloud.gcp.firestore.project-id=supremeai-a
spring.cloud.gcp.firestore.database-id=(default)

# Credentials
spring.cloud.gcp.credentials.location=file:service-account.json
spring.cloud.gcp.firestore.credentials.location=${spring.cloud.gcp.credentials.location}

# Firebase settings
firebase.project.id=supremeai-a
firebase.database.url=https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/

# Redis & Rate Limiting (Enabled for local dev using Docker)
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=true
rate-limit.distributed=true

# Logging
logging.level.com.supremeai=DEBUG
logging.level.com.google.cloud.spring=DEBUG
logging.level.io.grpc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.google.firebase=DEBUG

# Database (H2 for fast local startup)
spring.datasource.url=jdbc:h2:mem:supremeai_local;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update