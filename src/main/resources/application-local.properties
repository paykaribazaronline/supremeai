# Local development configuration overrides

# JWT Secret for local development (32+ chars required for HS256)
# JWT_SECRET must be provided via LOCAL_JWT_SECRET env var (no default - fail fast if missing)

# Server configuration
server.port=8080

# Enable Spring Boot auto-config for GCP credentials and Firestore in local mode when
# the environment provides valid credentials (service-account.json or GOOGLE_APPLICATION_CREDENTIALS).
# If no credentials are available, let Firestore fail-fast instead of silently starting in a broken state.
spring.cloud.gcp.firestore.enabled=${FIRESTORE_ENABLED:true}

# Base project ID; override with GCP_PROJECT_ID or GOOGLE_CLOUD_PROJECT
spring.cloud.gcp.project-id=${GCP_PROJECT_ID:supremeai-a}
spring.cloud.gcp.firestore.project-id=${GCP_PROJECT_ID:supremeai-a}

# Do NOT enable the emulator by default. It should only be turned on when the developer
# explicitly sets FIRESTORE_EMULATOR_ENABLED=true and has the emulator running.
spring.cloud.gcp.firestore.emulator.enabled=${FIRESTORE_EMULATOR_ENABLED:false}
spring.cloud.gcp.firestore.host=127.0.0.1:8081
spring.cloud.gcp.firestore.database-id=(default)

# Emulator endpoints (used only when emulator is enabled)
FIRESTORE_EMULATOR_HOST=127.0.0.1:8081
FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099

GCP_PROJECT_ID=${GCP_PROJECT_ID:supremeai-a}
GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID:supremeai-a}

# Redis & Rate Limiting (Enabled for local dev using Docker)
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=true
rate-limit.distributed=true

# Logging
logging.level.com.supremeai=DEBUG
logging.level.com.google.cloud.spring=DEBUG
logging.level.io.grpc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.google.firebase=DEBUG

# Database (H2 for fast local startup)
spring.datasource.url=jdbc:h2:file:./data/supremeai_local;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Optional Firestore collections (only loaded when Firestore is enabled)
firestore.collection.solution-memories=solution_memories
firestore.collection.system-learning=system_learning
firestore.collection.database-knowledge=database_knowledge