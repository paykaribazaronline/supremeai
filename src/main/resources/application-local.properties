# Local development configuration overrides

# JWT Secret for local development (32+ chars required for HS256)
JWT_SECRET=${LOCAL_JWT_SECRET:this_is_a_32_char_very_secret_local_key_12345}
app.jwtSecret=${JWT_SECRET}

# Server configuration
server.port=8080

# Disable problematic GCP auto-configs locally so unknown env vars do not block startup
spring.autoconfigure.exclude=\
com.google.cloud.spring.autoconfigure.core.GcpCredentialsProviderAutoConfiguration,\
com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration,\
com.google.cloud.logging.logback.LoggingAutoConfiguration

# Firestore configuration (Using Cloud Firestore — real production instance)
spring.cloud.gcp.project-id=supremeai-a
spring.cloud.gcp.firestore.enabled=true
spring.cloud.gcp.firestore.project-id=supremeai-a
# IMPORTANT: emulator.enabled MUST remain false for production/local-cloud usage
# Only set to true when running the Firebase emulator suite locally
spring.cloud.gcp.firestore.emulator.enabled=true
# Firestore emulator
spring.cloud.gcp.firestore.host=127.0.0.1:8081
spring.cloud.gcp.firestore.database-id=(default)

# Emulator endpoints
FIRESTORE_EMULATOR_HOST=127.0.0.1:8081
FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099
GCP_PROJECT_ID=supremeai-test
GOOGLE_CLOUD_PROJECT=supremeai-test
GOOGLE_API_KEY=test


# Redis & Rate Limiting (Enabled for local dev using Docker)
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=true
rate-limit.distributed=true

# Logging
logging.level.com.supremeai=DEBUG
logging.level.com.google.cloud.spring=DEBUG
logging.level.io.grpc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.google.firebase=DEBUG

# Database (H2 for fast local startup)
spring.datasource.url=jdbc:h2:file:./data/supremeai_local;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true