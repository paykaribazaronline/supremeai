# Local development configuration overrides

# JWT Secret for local development (32+ chars required for HS256)
JWT_SECRET=${LOCAL_JWT_SECRET:this_is_a_32_char_very_secret_local_key_12345}
app.jwtSecret=${JWT_SECRET}

# Server configuration
server.port=8080

# Firestore configuration (Using Cloud Firestore)
spring.cloud.gcp.project-id=supremeai-a
spring.cloud.gcp.firestore.enabled=true
spring.cloud.gcp.firestore.project-id=supremeai-a
spring.cloud.gcp.firestore.emulator.enabled=${FIRESTORE_EMULATOR_ENABLED:false}
spring.cloud.gcp.firestore.host=${FIRESTORE_EMULATOR_HOST:127.0.0.1:8081}
spring.cloud.gcp.credentials.location=classpath:firebase-service-account.json

# Firebase settings
firebase.project.id=supremeai-a
firebase.database.url=https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/

# Logging
logging.level.com.supremeai=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.google.firebase=DEBUG

# Database (H2 for fast local startup)
spring.datasource.url=jdbc:h2:mem:supremeai_local;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update