# This file stores dynamically loadable AI and Cloud feature quotas.
# Format: ServiceName.FeatureName.Limit=Value and ServiceName.FeatureName.Period=Value

# Example of adding a completely new AI service without touching Java code!
Anthropic.Claude3.Limit=50000
Anthropic.Claude3.Period=DAILY

HuggingFace.Inference.Limit=100000
HuggingFace.Inference.Period=MONTHLY

# Custom user feature 
Midjourney.ImageGen.Limit=200
Midjourney.ImageGen.Period=DAILY
