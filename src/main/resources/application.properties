# ========================================
# AI Multi-Agent App Generator - Configuration
# ========================================
# All values can be overridden by environment variables
# Environment variable format: UPPERCASE_WITH_UNDERSCORES

# ========== SECURITY ==========
api.encryption.key=${API_ENCRYPTION_KEY:}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
bruteforce.max-attempts=${BRUTE_FORCE_MAX_ATTEMPTS:5}
bruteforce.lock-duration-minutes=${BRUTE_FORCE_LOCK_DURATION:15}

# ========== FILE UPLOAD ==========
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ========== WEB CLIENT & TELEGRAM/TELDRIVE ==========
# WebClient timeouts
spring.webflux.timeout=5m
spring.webflux.connect-timeout=10s

# Resilience4j — Telegram/Teldrive
resilience4j.circuitbreaker.instances.teldrive.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.teldrive.sliding-window-size=10
resilience4j.circuitbreaker.instances.teldrive.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.teldrive.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.teldrive.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.teldrive.max-attempts=3
resilience4j.retry.instances.teldrive.wait-duration=500ms
resilience4j.retry.instances.teldrive.retry-exceptions=org.springframework.web.reactive.function.client.WebClientRequestException,org.springframework.web.reactive.function.client.WebClientResponseException

# Telegram specific
telegram.upload.max-size=100MB
telegram.upload.compression=gzip
telegram.upload.connect-timeout=10s
telegram.upload.read-timeout=5m

# ========== SPRING CORE ==========
spring.application.name=supremeai
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.main.allow-bean-definition-overriding=true
spring.aop.auto=true
spring.aop.proxy-target-class=true
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.jpa.hibernate.ddl-auto=none
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========== KUBERNETES ==========
spring.cloud.kubernetes.enabled=false
spring.cloud.kubernetes.readiness-probe.initial-delay=10
spring.cloud.kubernetes.liveness-probe.initial-delay=20

# ========== SERVER ==========
server.port=${PORT:8080}
server.servlet.context-path=/
spring.cloud.function.scan.enabled=false
server.shutdown=graceful

# ========== SPRING MVC ==========
# NoResourceFoundException is handled in GlobalExceptionHandler — do NOT disable add-mappings
# (that would break serving of /admin/assets/*.js and *.css files)

# ========== JWT ==========
# JWT secret MUST be set via environment variable - never use a default
jwt.secret=${JWT_SECRET:${LOCAL_JWT_SECRET:}}

# ========== MANAGEMENT ==========
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# ========== SUPREMEAI (Cloud-Only Multi-Orchestrated Mode) ==========
# All AI providers are dynamically loaded from Firestore api_providers.
# No single hardcoded AI model. Any available cloud provider will work.
supremeai.orchestration.simple-mode=true
supremeai.orchestration.cloud-only=false
supremeai.offline.mode.enabled=${OFFLINE_MODE_ENABLED:false}
supremeai.local-first.enabled=${LOCAL_FIRST_ENABLED:true}
supremeai.semantic-router.url=${SEMANTIC_ROUTER_URL:}
supremeai.selfhealing.phoenix.enabled=true

# ========== SOLO MODE FALLBACK ==========
# Provider name used for local fallback when all cloud providers fail
supremeai.solo-mode.fallback-provider=hybrid_tiny

# ========== RATE LIMITING ==========
rate-limit.enabled=true
rate-limit.distributed=true
rate-limit.window-seconds=60
rate-limit.authenticated-requests-per-minute=500
rate-limit.anonymous-requests-per-minute=100
rate-limit.admin-requests-per-minute=5000
rate-limit.ai-provider-requests-per-minute=500

# ========== PERFORMANCE ==========
# Virtual Threads (Java 21+ Loom) - Optimal for high-concurrency I/O
performance.virtual-threads.enabled=true
spring.threads.virtual.enabled=true
performance.async.core-pool-size=200
performance.async.max-pool-size=2000
performance.async.queue-capacity=20000
performance.rate-limit=20000.0
performance.io-timeout-seconds=60
performance.cache.default-ttl-minutes=120
performance.cache.scraper-ttl-minutes=10

# ========== CIRCUIT BREAKER ==========
circuit.breaker.failure-threshold=3
circuit.breaker.success-threshold=3
circuit.breaker.wait-duration-seconds=15

# ========== RETRY & BACKOFF ==========
max.retries=2
initial.backoff.ms=200
backoff.multiplier=1.5

# ========== API TIMEOUT ==========
api.timeout.seconds=45

# ========== CACHE ==========
cache.default-ttl-minutes=120
cache.scraper-ttl-minutes=10

# ========== LOGGING ==========
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.level.com.google.firebase=WARN
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.level.com.supremeai=INFO
logging.level.reactor.core=WARN
logging.pattern.console=%d{HH:mm:ss} - %msg%n
log.level=WARN

# ========== DATASOURCE ==========
# (HikariCP pool sizing is defined in application.yml — HikariCPConfig.java defaults
#  are used for the conditional bean; override here ONLY via profile-specific file)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# ========== REDIS ==========
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:3000}
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX:500}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_IDLE_MAX:250}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_IDLE_MIN:50}
spring.data.redis.lettuce.pool.test-on-borrow=true
spring.data.redis.lettuce.pool.test-on-return=true
spring.data.redis.lettuce.pool.test-while-idle=true
spring.data.redis.lettuce.pool.min-evictable-idle-time-millis=15000
spring.data.redis.lettuce.pool.time-between-eviction-runs-millis=10000
redis.cache.ai_responses.ttl=7200
redis.cache.user_sessions.ttl=172800
redis.cache.api_keys.ttl=900
redis.cache.db_queries.ttl=1800
redis.cache.user_profiles.ttl=14400
supremeai.redis.mock-online=${REDIS_MOCK_ONLINE:true}

# ========== FIREBASE & FIRESTORE ==========
# Credentials are loaded in this order:
#   1. spring.cloud.gcp.credentials.location (env var or property below)
#   2. GOOGLE_APPLICATION_CREDENTIALS environment variable (Google SDK standard)
#   3. service-account.json in project root (placed by start-supremeai.sh)
#   4. GCP_CREDENTIALS_JSON — raw JSON string in env var
# If none are available, Firestore stays disabled and the app starts in standalone-H2 mode.
firebase.project.id=${FIREBASE_PROJECT_ID:supremeai-test}
# firebase.api.key and firebase.database.url removed as requested
firebase.auth.domain=${FIREBASE_AUTH_DOMAIN:}
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}
firebase.messaging.sender.id=${FIREBASE_MESSAGING_SENDER_ID:}
firebase.app.id=${FIREBASE_APP_ID:}
# Preferred credential location (set by start-supremeai.sh)
spring.cloud.gcp.credentials.location=${GCP_CREDENTIALS_LOCATION:file:service-account.json}
# Firestore is enabled only when credentials are available — no crash if missing
spring.cloud.gcp.firestore.enabled=${FIRESTORE_ENABLED:true}
spring.cloud.gcp.firestore.project-id=${firebase.project.id}
spring.cloud.gcp.firestore.enable-enhancements=false
# Google Secret Manager: enabled=true in cloud; falls back to env vars locally
secret.manager.enabled=${SECRET_MANAGER_ENABLED:false}
# ========== FIRESTORE COLLECTIONS ==========
firestore.collection.solution-memories=solution_memories
firestore.collection.system-learning=system_learning
firestore.collection.database-knowledge=database_knowledge

# ========== OLLAMA (DISABLED — cloud-only mode) ==========
# Ollama/local providers are disabled in cloud-only mode.
# All AI providers must be configured via Firestore api_providers collection.
ai.providers.ollama.endpoint=${OLLAMA_ENDPOINT:}
ai.providers.ollama.health-check-url=${OLLAMA_HEALTHCHECK_URL:}
ai.providers.ollama.api-key=${OLLAMA_API_KEY:}
ai.providers.ollama.model=${OLLAMA_MODEL:}
ai.providers.ollama.rate-limit-per-minute=${OLLAMA_RATE_LIMIT_PER_MINUTE:0}

# ========== SIMULATOR ==========
simulator.max.installs.per.user=${SIMULATOR_MAX_INSTALLS:5}
simulator.session.timeout.minutes=${SIMULATOR_SESSION_TIMEOUT:30}
simulator.deployment.timeout.seconds=${SIMULATOR_DEPLOY_TIMEOUT:120}
simulator.auto.cleanup.enabled=${SIMULATOR_AUTO_CLEANUP:true}
simulator.app.expiry.days=${SIMULATOR_APP_EXPIRY_DAYS:7}
simulator.preview.domain=${SIMULATOR_DOMAIN:localhost:8080}
simulator.preview.url.format=http://{domain}/simulator/preview/{appId}?device={device}

# ========== BROWSER AUTOMATION ==========
supremeai.browser.automation-url=${BROWSER_AUTOMATION_URL:http://localhost:3001}

# ========== MESSAGE QUEUE ==========
message-queue.batch-size=50
message-queue.batch-timeout-seconds=5
message-queue.capacity=10000

# ========== WEBHOOK ==========
webhook.deduplication-window-seconds=30
webhook.retry-count=3
webhook.retry-delay-ms=1000

# ========== GITHUB APP ==========
github.app.id=${GITHUB_APP_ID:}
github.app.client-id=${GITHUB_APP_CLIENT_ID:}
github.app.installation-id=${GITHUB_APP_INSTALLATION_ID:}
github.app.webhook-url=${GITHUB_APP_WEBHOOK_URL:https://njel.com.bd/webhook/github}

# ========== METRICS & AUDIT ==========
enable.metrics=true
enable.audit.log=true

# ========== CONSENSUS ==========
consensus.threshold=0.60
medium.approval.timeout.min=10

# ========== TEST (shared) ==========
test.await-timeout-ms=5000
test.long-running=30000

# ========== n8n AUTOMATION CORE ==========
n8n.url=${N8N_URL:}
n8n.api.key=${N8N_API_KEY:}

