# ========================================
# AI Multi-Agent App Generator - Configuration
# ========================================
# All values can be overridden by environment variables
# Environment variable format: UPPERCASE_WITH_UNDERSCORES

# ========== SECURITY ==========
api.encryption.key=${API_ENCRYPTION_KEY:}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
bruteforce.max-attempts=${BRUTE_FORCE_MAX_ATTEMPTS:5}
bruteforce.lock-duration-minutes=${BRUTE_FORCE_LOCK_DURATION:15}

# ========== SPRING CORE ==========
spring.application.name=supremeai
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.main.allow-bean-definition-overriding=true
spring.aop.auto=true
spring.aop.proxy-target-class=true
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.jpa.hibernate.ddl-auto=none
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========== KUBERNETES ==========
spring.cloud.kubernetes.enabled=true
spring.cloud.kubernetes.readiness-probe.initial-delay=30
spring.cloud.kubernetes.liveness-probe.initial-delay=60

# ========== SERVER ==========
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful

# ========== SPRING MVC ==========
# NoResourceFoundException is handled in GlobalExceptionHandler — do NOT disable add-mappings
# (that would break serving of /admin/assets/*.js and *.css files)

# ========== JWT ==========
jwt.secret=${JWT_SECRET:supremeai_super_secret_key_change_in_production}

# ========== MANAGEMENT ==========
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# ========== SUPREMEAI ==========
supremeai.providers.openai=${OPENAI_API_KEY:}
supremeai.providers.gemini=${GEMINI_API_KEY:}
supremeai.providers.anthropic=${ANTHROPIC_API_KEY:}
supremeai.providers.cohere=${COHERE_API_KEY:}
supremeai.providers.perplexity=${PERPLEXITY_API_KEY:}
supremeai.providers.mistral=${MISTRAL_API_KEY:}
supremeai.providers.llama=${LLAMA_API_KEY:}
supremeai.providers.deepseek=${DEEPSEEK_API_KEY:}
supremeai.providers.grok=${GROK_API_KEY:}
supremeai.providers.groq=${GROQ_API_KEY:}
supremeai.providers.custom-supreme-ai=${CUSTOM_SUPREME_AI_KEY:}
supremeai.orchestration.simple-mode=true
supremeai.selfhealing.phoenix.enabled=true

# ========== RATE LIMITING ==========
rate-limit.enabled=true
rate-limit.distributed=true
rate-limit.window-seconds=60
rate-limit.authenticated-requests-per-minute=100
rate-limit.anonymous-requests-per-minute=10
rate-limit.admin-requests-per-minute=1000
rate-limit.ai-provider-requests-per-minute=50

# ========== PERFORMANCE ==========
performance.virtual-threads.enabled=true
performance.async.core-pool-size=50
performance.async.max-pool-size=500
performance.async.queue-capacity=5000
performance.rate-limit=5000.0
performance.io-timeout-seconds=30
performance.cache.default-ttl-minutes=30
performance.cache.scraper-ttl-minutes=30

# ========== CIRCUIT BREAKER ==========
circuit.breaker.failure-threshold=5
circuit.breaker.success-threshold=2
circuit.breaker.wait-duration-seconds=30

# ========== RETRY & BACKOFF ==========
max.retries=3
initial.backoff.ms=500
backoff.multiplier=2.0

# ========== API TIMEOUT ==========
api.timeout.seconds=30

# ========== CACHE ==========
cache.default-ttl-minutes=30
cache.scraper-ttl-minutes=30

# ========== LOGGING ==========
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.level.com.google.firebase=WARN
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.level.com.supremeai=DEBUG
logging.level.reactor.core=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
log.level=INFO

# ========== DATASOURCE ==========
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=10000

# ========== REDIS ==========
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000}
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX:100}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_IDLE_MAX:50}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_IDLE_MIN:10}
spring.data.redis.lettuce.pool.test-on-borrow=true
spring.data.redis.lettuce.pool.test-on-return=true
spring.data.redis.lettuce.pool.test-while-idle=true
spring.data.redis.lettuce.pool.min-evictable-idle-time-millis=60000
spring.data.redis.lettuce.pool.time-between-eviction-runs-millis=30000
redis.cache.ai_responses.ttl=1800
redis.cache.user_sessions.ttl=86400
redis.cache.api_keys.ttl=300
redis.cache.db_queries.ttl=600
redis.cache.user_profiles.ttl=3600

# ========== FIREBASE & FIRESTORE ==========
firebase.project.id=${FIREBASE_PROJECT_ID:supremeai-a}
firebase.database.url=${FIREBASE_DATABASE_URL:https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/}
spring.cloud.gcp.firestore.enabled=true
spring.cloud.gcp.firestore.project-id=${firebase.project.id}
spring.cloud.gcp.firestore.enable-enhancements=false
spring.cloud.gcp.credentials.location=${GCP_CREDENTIALS_LOCATION:}
firestore.collection.solution-memories=solution_memories
firestore.collection.system-learning=system_learning
firestore.collection.database-knowledge=database_knowledge

# ========== OLLAMA ==========
ai.providers.ollama.endpoint=${OLLAMA_ENDPOINT:http://localhost:11434/api/generate}
ai.providers.ollama.health-check-url=${OLLAMA_HEALTHCHECK_URL:http://localhost:11434/api/tags}
ai.providers.ollama.api-key=${OLLAMA_API_KEY:}
ai.providers.ollama.model=${OLLAMA_MODEL:qwen2.5-coder:1.5b-base}
ai.providers.ollama.rate-limit-per-minute=${OLLAMA_RATE_LIMIT_PER_MINUTE:30}

# ========== SIMULATOR ==========
simulator.max.installs.per.user=${SIMULATOR_MAX_INSTALLS:5}
simulator.session.timeout.minutes=${SIMULATOR_SESSION_TIMEOUT:30}
simulator.deployment.timeout.seconds=${SIMULATOR_DEPLOY_TIMEOUT:120}
simulator.auto.cleanup.enabled=${SIMULATOR_AUTO_CLEANUP:true}
simulator.app.expiry.days=${SIMULATOR_APP_EXPIRY_DAYS:7}
simulator.preview.domain=${SIMULATOR_DOMAIN:localhost:8080}
simulator.preview.url.format=http://{domain}/simulator/preview/{appId}?device={device}

# ========== MESSAGE QUEUE ==========
message-queue.batch-size=50
message-queue.batch-timeout-seconds=5
message-queue.capacity=10000

# ========== WEBHOOK ==========
webhook.deduplication-window-seconds=30
webhook.retry-count=3
webhook.retry-delay-ms=1000

# ========== GITHUB APP ==========
github.app.id=${GITHUB_APP_ID:3300194}
github.app.client-id=${GITHUB_APP_CLIENT_ID:Iv23liZY31q8QhovvzQt}
github.app.installation-id=${GITHUB_APP_INSTALLATION_ID:121998309}
github.app.webhook-url=${GITHUB_APP_WEBHOOK_URL:https://njel.com.bd/webhook/github}

# ========== METRICS & AUDIT ==========
enable.metrics=true
enable.audit.log=true

# ========== CONSENSUS ==========
consensus.threshold=0.60
medium.approval.timeout.min=10

# ========== TEST (shared) ==========
test.await-timeout-ms=5000
test.long-running=30000
