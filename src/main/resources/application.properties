# ========================================
# AI Multi-Agent App Generator - Configuration
# ========================================
# All values can be overridden by environment variables
# Environment variable format: UPPERCASE_WITH_UNDERSCORES
# Example: consensus.threshold -> CONSENSUS_THRESHOLD

# ========== SERVER CONFIGURATION ==========
# Reads PORT env variable (set by Cloud Run / Render), defaults to 8080
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========== CLOUD RUN OPTIMIZATION ==========
# Reduce startup time
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.jpa.hibernate.ddl-auto=none

# ========== LOGGING ==========
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.level.com.google.firebase=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== CORE SETTINGS ==========
consensus.threshold=0.60
medium.approval.timeout.min=10
log.level=INFO

# ========== ERROR HANDLING & RESILIENCE ==========
max.retries=3
initial.backoff.ms=500
backoff.multiplier=2.0
api.timeout.seconds=30
circuit.breaker.failure.threshold=50

# ========== RATE LIMITING ==========
rate.limit.per.minute=100

# ========== PHOENIX SELF-HEALING ==========
# Enable Level 5 Phoenix self-healing layer:
# - AutoCodeRepairAgent: Auto-repair failing components
# - AdaptiveThresholdEngine: ML-based failure prediction & threshold tuning
# - ComponentRegenerator: Complete service rebuild from scratch
# Set to 'false' for basic self-healing only (circuit breaker + retry)
supremeai.selfhealing.phoenix.enabled=true

# ========== MONITORING & DIAGNOSTICS ==========
enable.metrics=true
enable.audit.log=true

# ========== FIREBASE SETTINGS ==========
firebase.project.id=supremeai-a
firebase.database.url=https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/

# ========== API PROVIDER SETTINGS ==========
# Note: Use Google Cloud Secret Manager for actual keys
# These are just configuration, keys should come from SecretManager
deepseek.primary.model=deepseek-coder
groq.primary.model=mixtral-8x7b-32768
claude.primary.model=claude-3-sonnet-20240229
gpt4.primary.model=gpt-4

# ========== QUOTA SETTINGS ==========
# Daily/monthly quotas for each API provider
deepseek.daily.quota=1000
deepseek.monthly.quota=20000

groq.daily.quota=unlimited
groq.monthly.quota=unlimited

claude.daily.quota=100
claude.monthly.quota=2000

gpt4.daily.quota=50
gpt4.monthly.quota=1000

# ========== NOTIFICATION SETTINGS ==========
notification.enabled=true
notification.email.enabled=true
notification.push.enabled=true

# ========== PERFORMANCE TUNING ==========
# Connection pool sizes
firebase.connection.pool.size=20
http.connection.pool.size=20

# Cache settings
cache.ttl.minutes=60
cache.max.size=1000

# ========== SECURITY SETTINGS ==========
# API key rotation (days)
api.key.rotation.days=30

# Password/token expiration (days)
token.expiration.days=90

# IP whitelist (comma-separated, empty = allow all)
ip.whitelist=

# ========== FEATURE FLAGS ==========
# Enable BETA features
feature.v2.ranking.algorithm=false
feature.auto.rotation=true
feature.cost.optimization=true

# ========== LOGGING CONFIGURATION ==========
# Log format: SIMPLE (default) or JSON
log.format=SIMPLE

# Log retention (days)
log.retention.days=30

# Audit log settings
audit.log.enabled=true
audit.log.retention.days=90

# ========== DEPLOYMENT SETTINGS ==========
# Environment: local, staging, production
environment=local

# ========== OBSERVABILITY ==========
# Prometheus metrics endpoint
metrics.enabled=true
metrics.endpoint=/metrics

# Tracing
tracing.enabled=false
tracing.sample.rate=0.1

# ========== ADVANCED SETTINGS ==========
# Thread pool sizes
executor.core.pool.size=10
executor.max.pool.size=50
executor.queue.size=100

# Database transaction timeout (seconds)
transaction.timeout.seconds=10

# Dead letter queue enabled
dlq.enabled=true

# Graceful shutdown timeout (seconds)
shutdown.timeout.seconds=30

# ========== SPRING BOOT CONFIGURATION (Phase 5) ==========
# Server
server.port=${PORT:8080}
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Spring Web
spring.mvc.throw-exception-if-no-handler-found=true
spring.resources.add-mappings=false

# Jackson (JSON)
spring.jackson.serialization.indent-output=true
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator (Monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.enable.jvm=true
