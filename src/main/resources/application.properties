# ========================================
# AI Multi-Agent App Generator - Configuration
# ========================================
# All values can be overridden by environment variables
# Environment variable format: UPPERCASE_WITH_UNDERSCORES
# Example: consensus.threshold -> CONSENSUS_THRESHOLD

# Active Spring profile for local/cloud AirLLM switching
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ========== SPRING AOP SETTINGS ==========
# Enable AspectJ-based AOP (required for @Aspect beans like KingModeAuditAspect)
spring.aop.auto=true
spring.aop.proxy-target-class=true

# ========== SERVER CONFIGURATION ==========
# Reads PORT env variable (set by Cloud Run / Render), defaults to 8080
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========== CLOUD RUN OPTIMIZATION ==========
# Reduce startup time
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.jpa.hibernate.ddl-auto=none

# ========== LOGGING ==========
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.level.com.google.firebase=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== CORE SETTINGS ==========
consensus.threshold=0.60
medium.approval.timeout.min=10
log.level=INFO

# ========== ERROR HANDLING & RESILIENCE ==========
max.retries=3
initial.backoff.ms=500
backoff.multiplier=2.0
api.timeout.seconds=30
circuit.breaker.failure.threshold=50

# ========== RATE LIMITING ==========
rate.limit.per.minute=100

# ========== PHOENIX SELF-HEALING ==========
# Enable Level 5 Phoenix self-healing layer:
# - AutoCodeRepairAgent: Auto-repair failing components
# - AdaptiveThresholdEngine: ML-based failure prediction & threshold tuning
# - ComponentRegenerator: Complete service rebuild from scratch
# Set to 'false' for basic self-healing only (circuit breaker + retry)
supremeai.selfhealing.phoenix.enabled=true

# ========== MONITORING & DIAGNOSTICS ==========
enable.metrics=true
enable.audit.log=true

# ========== GITHUB APP SETTINGS ==========
# Public identifiers (non-secret). Set SUPREMEAI_APP_PRIVATE_KEY GitHub Secret
# to supply GITHUB_APP_PRIVATE_KEY_BASE64 at runtime (Cloud Run env var).
github.app.id=${GITHUB_APP_ID:3300194}
github.app.client-id=${GITHUB_APP_CLIENT_ID:Iv23liZY31q8QhovvzQt}
github.app.installation-id=${GITHUB_APP_INSTALLATION_ID:121998309}
github.app.webhook-url=${GITHUB_APP_WEBHOOK_URL:https://njel.com.bd/webhook/github}
# GITHUB_APP_PRIVATE_KEY_BASE64 is injected from the SUPREMEAI_APP_PRIVATE_KEY
# GitHub Secret via deploy-cloudrun.yml; no default here (no secrets in config).


# Firebase Admin SDK configuration
firebase.project.id=${FIREBASE_PROJECT_ID:supremeai-a}
firebase.database.url=${FIREBASE_DATABASE_URL:https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/}

# Firestore Emulator (set FIRESTORE_EMULATOR_HOST=localhost:8812 for local testing)
# Example: FIRESTORE_EMULATOR_HOST=localhost:8812

# Firebase Credentials Path (optional - uses Application Default Credentials if not set)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}

# Firestore Settings
spring.cloud.gcp.firestore.project-id=${FIREBASE_PROJECT_ID:supremeai-a}
spring.cloud.gcp.firestore.enable-enhancements=true

# Teaching System Collections
firebase.teaching.apps.collection=teaching/apps/generated
firebase.teaching.performance.collection=teaching/performance/ai
firebase.teaching.errors.collection=teaching/errors/patterns

# ========== API PROVIDER SETTINGS ==========
# Note: Use Google Cloud Secret Manager for actual keys
# These are just configuration, keys should come from SecretManager
deepseek.primary.model=deepseek-coder
groq.primary.model=mixtral-8x7b-32768
claude.primary.model=claude-3-sonnet-20240229
gpt4.primary.model=gpt-4

# ========== QUOTA SETTINGS ==========
# Daily/monthly quotas for each API provider
deepseek.daily.quota=1000
deepseek.monthly.quota=20000

groq.daily.quota=unlimited
groq.monthly.quota=unlimited

claude.daily.quota=100
claude.monthly.quota=2000

gpt4.daily.quota=50
gpt4.monthly.quota=1000

# ========== NOTIFICATION SETTINGS ==========
notification.enabled=true
notification.email.enabled=true
notification.push.enabled=true

# ========== PERFORMANCE TUNING ==========
# Connection pool sizes
firebase.connection.pool.size=20
http.connection.pool.size=20

# Cache settings
cache.ttl.minutes=60
cache.max.size=1000

# ========== SECURITY SETTINGS ==========
app.jwtSecret=${JWT_SECRET:dev-secret-key-at-least-32-characters-long-for-hmac}
app.jwtExpiration=86400000
# API key rotation (days)
api.key.rotation.days=30

# Password/token expiration (days)
token.expiration.days=90

# IP whitelist (comma-separated, empty = allow all)
ip.whitelist=${IP_WHITELIST:127.0.0.1,::1}

# Local dev test tokens (safe for local use only - NOT for production)
supreme.admin.test.token=dev-admin-token-local

# ========== FEATURE FLAGS ==========
# Enable BETA features
feature.v2.ranking.algorithm=false
feature.auto.rotation=true
feature.cost.optimization=true

# ========== LOGGING CONFIGURATION ==========
# Log format: SIMPLE (default) or JSON
log.format=SIMPLE

# Log retention (days)
log.retention.days=30

# Audit log settings
audit.log.enabled=true
audit.log.retention.days=90

# ========== DEPLOYMENT SETTINGS ==========
# Environment: local, staging, production
environment=local

# ========== OBSERVABILITY ==========
# Prometheus metrics endpoint
metrics.enabled=true
metrics.endpoint=/metrics

# Tracing
tracing.enabled=false
tracing.sample.rate=0.1

# ========== ADVANCED SETTINGS ==========
# Thread pool sizes
executor.core.pool.size=20
executor.max.pool.size=100
executor.queue.size=200

# Database transaction timeout (seconds)
transaction.timeout.seconds=10

# Dead letter queue enabled
dlq.enabled=true

# Graceful shutdown timeout (seconds)
shutdown.timeout.seconds=30

# ========== SPRING BOOT CONFIGURATION (Phase 5) ==========
# Server
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Spring Web
spring.mvc.throw-exception-if-no-handler-found=true
spring.resources.add-mappings=false

# Jackson (JSON)
spring.jackson.serialization.indent-output=true
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator (Monitoring)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.livenessState.enabled=true
management.endpoint.health.readinessState.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.enable.jvm=true
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

# ========== SECRET MANAGER (MULTI-CLOUD) ==========
# Supported: env, gcp, aws, azure, vault
secret.manager.backend=${SECRET_MANAGER_BACKEND:env}
secret.manager.gcp.project-id=${GCP_PROJECT_ID:${FIREBASE_PROJECT_ID:supremeai-a}}
secret.manager.gcp.location=${GCP_SECRET_LOCATION:global}
secret.manager.aws.region=${AWS_REGION:us-east-1}
secret.manager.azure.vault-url=${AZURE_KEY_VAULT_URL:}

# ========== AI API KEYS (ENV-DRIVEN) ==========
# Keep empty defaults to avoid committing secrets.
ai.kimi.api-key=${KIMI_API_KEY:}
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.deepseek.api-key=${DEEPSEEK_API_KEY:}

# ========== FIREBASE CONFIG (COMPATIBILITY) ==========
firebase.config.path=${FIREBASE_CREDENTIALS_FILE:service-account.json}

# ========== RUNTIME FLAGS ==========
king.mode.enabled=${KING_MODE_ENABLED:true}
feature.key-rotation.enabled=${KEY_ROTATION_ENABLED:true}

# ========== RATE LIMITING (RPM/TPM compatibility) ==========
rate.limit.rpm=${RATE_LIMIT_RPM:200}
rate.limit.tpm=${RATE_LIMIT_TPM:100000}

# ========== AI COST CONTROL & RESILIENCE ==========
# Cheap -> Mid -> Premium routing priority
ai.fallback.default=GROQ,DEEPSEEK,CLAUDE,GPT4

# Keep external API calls short and non-blocking via queue fallback
ai.timeout.ms=${AI_TIMEOUT_MS:7000}

# Retry policy: max 2 retries with exponential backoff
ai.retry.max=${AI_RETRY_MAX:2}
ai.retry.base.backoff.ms=${AI_RETRY_BASE_BACKOFF_MS:250}

# Prompt/output caps to control token cost
ai.prompt.max.tokens=${AI_PROMPT_MAX_TOKENS:2000}
ai.output.max.tokens=${AI_OUTPUT_MAX_TOKENS:1500}

# Local provider rate limiter
ai.rate.limit.per.minute=${AI_RATE_LIMIT_PER_MINUTE:60}

# ========== AIRLLM SIDE-CAR CONFIGURATION ==========
ai.providers.airllm.endpoint=${AIRLLM_ENDPOINT:https://unsymmetrical-unrepugnant-lilah.ngrok-free.dev/v1/chat/completions}
ai.providers.airllm.health-check-url=${AIRLLM_HEALTHCHECK_URL:https://unsymmetrical-unrepugnant-lilah.ngrok-free.dev/health}
ai.providers.airllm.api-key=${AIRLLM_API_KEY:}
ai.providers.airllm.model=${AIRLLM_MODEL:mistralai/Mistral-7B-Instruct-v0.3}
ai.providers.airllm.compression=${AIRLLM_COMPRESSION:4bit}
ai.providers.airllm.rate-limit-per-minute=${AIRLLM_RATE_LIMIT_PER_MINUTE:10}

# Circuit breaker behavior
ai.circuit.failure.threshold=${AI_CIRCUIT_FAILURE_THRESHOLD:3}
ai.circuit.open.ms=${AI_CIRCUIT_OPEN_MS:30000}

# Slow-request queue for non-blocking recovery path
ai.queue.capacity=${AI_QUEUE_CAPACITY:500}

# Response cache
ai.cache.ttl.minutes=${AI_CACHE_TTL_MINUTES:30}
ai.cache.max.size=${AI_CACHE_MAX_SIZE:5000}

# ========== LOCAL DEV DATASOURCE ==========
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# ========== OLLAMA CONFIGURATION ==========
ai.providers.ollama.endpoint=ai.providers.ollama.health-check-url=ai.providers.ollama.api-key=
ai.providers.ollama.model=ai.providers.ollama.rate-limit-per-minute=