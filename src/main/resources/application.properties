firecrawl.api.key=${FIRECRAWL_API_KEY:}
firecrawl.api.url=${FIRECRAWL_API_URL:https://api.firecrawl.dev/v1}

# Claude-mem / MCP Memory Server
claude.mem.base_url=${CLAUDE_MEM_BASE_URL:https://claude-mem.example.com}
claude.mem.api.key=${CLAUDE_MEM_API_KEY:}
mem0.api.key=${MEM0_API_KEY:}
mem0.api.url=${MEM0_API_URL:https://api.mem0.ai/v1}

