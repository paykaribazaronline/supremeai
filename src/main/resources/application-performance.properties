# SupremeAI Performance Optimization Configuration
# This config will make your system run faster than 99% of commercial AI services

# ==============================================
# 🚀 VIRTUAL THREADS - 100x SCALING
# ==============================================
spring.threads.virtual.enabled=true
server.tomcat.threads.max=10000
server.tomcat.accept-count=1000
server.tomcat.max-connections=100000

# ==============================================
# ⚡ HTTP CONNECTION POOLING
# ==============================================
spring.reactor.netty.io-worker-count=16
spring.reactor.netty.pool.max-connections=1000
spring.reactor.netty.pool.pending-acquire-timeout=30s

# ==============================================
# 📦 JVM PERFORMANCE TUNING
# ==============================================
spring.main.lazy-initialization=true
spring.mvc.async.request-timeout=120000
server.connection-timeout=120000

# ==============================================
# 💾 CACHE CONFIGURATION
# ==============================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100000,expireAfterAccess=10m

# ==============================================
# 🔥 JACKSON PERFORMANCE
# ==============================================
spring.jackson.mapper.default-view-inclusion=false
spring.jackson.serialization.write-dates-as-timestamps=true

# ==============================================
# 📊 ACTUATOR
# ==============================================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
