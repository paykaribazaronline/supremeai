# ========================================
# SupremeAI Cloud Run Configuration
# ========================================
# This profile is activated on Cloud Run deployment
# All values can be overridden by environment variables

# ========== SERVER CONFIGURATION ==========
# Force servlet web application type (avoid reactive auto-detection conflicts)
spring.main.web-application-type=servlet
spring.main.allow-bean-definition-overriding=false
server.port=${PORT:8080}
server.forward-headers-strategy=native

# ========== CLOUD RUN OPTIMIZATION ==========
# Reduce startup time and resource usage
spring.main.lazy-initialization=true
spring.main.banner-mode=off
server.tomcat.threads.max=50
server.compression.enabled=true
server.compression.min-response-size=1024

# ========== DATASOURCE (Disabled for Cloud Profile) ==========
# We use Firestore in the cloud, so no need for H2 or JDBC
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.initialization-fail-timeout=1

# ========== PERSISTENCE (FIRESTORE) ==========
# Exclude JPA auto-configuration to prevent DataSource errors when only using Firestore
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Explicitly disable emulator in cloud profile
spring.cloud.gcp.firestore.emulator.enabled=false
spring.cloud.gcp.firestore.project-id=${GOOGLE_CLOUD_PROJECT:supremeai-a}
spring.cloud.gcp.storage.enabled=true
spring.cloud.gcp.firestore.enabled=true

# ========== LOGGING CONFIGURATION ==========
logging.level.root=INFO
logging.level.com.supremeai=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== HEALTH MONITORING & PROBES ==========
management.endpoints.web.exposure.include=health,info,status
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=false
management.health.db.enabled=false
management.health.redis.enabled=false
management.health.diskspace.enabled=false
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ========== SECURITY & ERROR HANDLING ==========
server.error.include-message=never
server.error.include-binding-errors=never

# ========== CLOUD-SPECIFIC SETTINGS ==========
# These are custom properties used by the application
supremeai.cache.enabled=false
supremeai.offline.mode.enabled=false
supremeai.ai.orchestration.simple-mode=true
