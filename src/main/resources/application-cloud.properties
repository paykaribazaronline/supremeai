# ========================================
# SupremeAI Cloud Run Configuration
# ========================================
# This profile is activated on Cloud Run deployment
# All values can be overridden by environment variables

# ========== SERVER CONFIGURATION ==========
# Cloud Run automatically provides PORT environment variable
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Force servlet web application type (avoid reactive auto-detection conflicts)
spring.main.web-application-type=servlet

# ========== CLOUD RUN OPTIMIZATION ==========
# Reduce startup time and resource usage
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.jpa.hibernate.ddl-auto=none
server.tomcat.threads.max=50
server.compression.enabled=true
server.compression.min-response-size=1024

# ========== PERSISTENCE (FIRESTORE) ==========
# Disable in-memory H2 for production to prevent data loss
spring.datasource.url=
spring.datasource.driverClassName=
spring.jpa.database-platform=
spring.cloud.gcp.firestore.project-id=${FIREBASE_PROJECT_ID:supremeai-a}
spring.cloud.gcp.firestore.enable-enhancements=true

# ========== FIREBASE CONFIGURATION (Cloud Run) ==========
logging.level.root=WARN
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.level.com.google.firebase=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== FIREBASE CONFIGURATION (Cloud Run) ==========
# Cloud Run uses Application Default Credentials (ADC)
# No need to set FIREBASE_CREDENTIALS_PATH - ADC takes precedence
firebase.project.id=${FIREBASE_PROJECT_ID:supremeai-a}
firebase.database.url=${FIREBASE_DATABASE_URL:https://supremeai-a-default-rtdb.asia-southeast1.firebasedatabase.app/}
firebase.credentials.path=

# ========== FIRESTORE SETTINGS ==========
spring.cloud.gcp.firestore.project-id=${FIREBASE_PROJECT_ID:supremeai-a}
spring.cloud.gcp.firestore.enable-enhancements=true

# ========== ACTUATOR & HEALTH CHECK ==========
# Enable health check endpoint for Cloud Run
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ========== CORE SETTINGS ==========
consensus.threshold=0.60
medium.approval.timeout.min=10
log.level=WARN
enable.metrics=true
enable.audit.log=true

# ========== ERROR HANDLING & RESILIENCE ==========
max.retries=3
initial.backoff.ms=500
backoff.multiplier=2.0
api.timeout.seconds=30
circuit.breaker.failure.threshold=50

# ========== RATE LIMITING ==========
rate.limit.per.minute=100

# ========== PHOENIX SELF-HEALING ==========
supremeai.selfhealing.phoenix.enabled=true

# ========== CLOUD-SPECIFIC SETTINGS ==========
# Disable local caching, use cloud services only
supremeai.cache.enabled=false
supremeai.offline.mode.enabled=false
