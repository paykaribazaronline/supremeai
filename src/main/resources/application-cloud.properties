# ========================================
# SupremeAI Cloud Run Configuration
# ========================================
# This profile is activated on Cloud Run deployment
# All values can be overridden by environment variables

# ========== SERVER CONFIGURATION ==========
# Cloud Run automatically provides PORT environment variable

# Force servlet web application type (avoid reactive auto-detection conflicts)
spring.main.web-application-type=servlet

# ========== CLOUD RUN OPTIMIZATION ==========
# Reduce startup time and resource usage
server.tomcat.threads.max=50
server.compression.enabled=true
server.compression.min-response-size=1024

# ========== DATASOURCE (Dummy for HikariCPConfig) ==========
# Provide empty datasource properties to satisfy HikariCPConfig when not using JDBC
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=
spring.datasource.hikari.maximum-pool-size=0
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ========== PERSISTENCE (FIRESTORE) ==========
# Exclude JPA auto-configuration to prevent DataSource errors when only using Firestore
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ========== FIREBASE CONFIGURATION (Cloud Run) ==========
logging.level.root=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=INFO
logging.level.com.google.firebase=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== FIREBASE CONFIGURATION (Cloud Run) ==========
# Cloud Run uses Application Default Credentials (ADC)
# No need to set FIREBASE_CREDENTIALS_PATH - ADC takes precedence


# ========== ACTUATOR & HEALTH CHECK ==========
# Enable health check endpoint for Cloud Run

# ========== CORE SETTINGS ==========

# ========== ERROR HANDLING & RESILIENCE ==========

# ========== RATE LIMITING ==========

# ========== PHOENIX SELF-HEALING ==========

# ========== CLOUD-SPECIFIC SETTINGS ==========
# Disable local caching, use cloud services only
supremeai.cache.enabled=false
supremeai.offline.mode.enabled=false
