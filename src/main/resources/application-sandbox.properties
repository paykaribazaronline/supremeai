# Sandbox / Demo Mode Configuration overrides
# This profile runs the system completely local with H2 database and diverts Firestore requests locally

# JWT Secret for sandbox development (32+ chars required for HS256)
JWT_SECRET=${LOCAL_JWT_SECRET:this_is_a_32_char_very_secret_sandbox_key_12345}
app.jwtSecret=${JWT_SECRET}

# Server configuration
server.port=8080

# Firestore configuration (Diverted to local loopback/emulator to avoid cloud authentication block)
spring.cloud.gcp.project-id=supremeai-sandbox-mock
spring.cloud.gcp.firestore.enabled=true
spring.cloud.gcp.firestore.project-id=supremeai-sandbox-mock
spring.cloud.gcp.firestore.database-id=(default)

# Force Firestore to connect to local loopback emulator port (which doesn't require real credential handshake)
spring.cloud.gcp.firestore.emulator.enabled=true
spring.cloud.gcp.firestore.host=localhost:8081

# Credentials
spring.cloud.gcp.credentials.location=file:service-account.json
spring.cloud.gcp.firestore.credentials.location=${spring.cloud.gcp.credentials.location}

# Firebase settings
firebase.project.id=supremeai-sandbox-mock
# firebase.database.url removed as requested

# Disable Redis and other cloud specific integrations if not needed, using in-memory fallbacks
rate-limit.distributed=false
spring.data.redis.repositories.enabled=false

# Logging
logging.level.com.supremeai=INFO
logging.level.com.google.cloud.spring=INFO
logging.level.io.grpc=WARN
logging.level.org.springframework.web=INFO
logging.level.com.google.firebase=INFO

# Database (H2 for fast local startup)
spring.datasource.url=jdbc:h2:mem:supremeai_sandbox;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
