spring:
  application:
    name: supremeai
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:}
      pubsub:
        enabled: true
      firestore:
        enabled: true
    kubernetes:
      enabled: true
      readiness-probe:
        initial-delay: 30
      liveness-probe:
        initial-delay: 60
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:testdb}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    hikari:
      # Single source of truth for all HikariCP pool sizing.
      # Override per-profile in application-{profile}.yml only; never in .properties or code.
      maximum-pool-size: 200
      minimum-idle: 50
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      initialization-fail-timeout: 1
      pool-name: SupremeAIHikariPool
      register-mbeans: true
      connection-test-query: SELECT 1
      validation-timeout: 5000

jwt:
  secret: ${JWT_SECRET:supremeai-test-secret-key-long-enough-for-hs256-algorithm-32ch}

# Management endpoints for K8s probes
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

supremeai:
  providers:
    openai: ${OPENAI_API_KEY:}
    gemini: ${GEMINI_API_KEY:}
    anthropic: ${ANTHROPIC_API_KEY:}
    cohere: ${COHERE_API_KEY:}
    perplexity: ${PERPLEXITY_API_KEY:}
    mistral: ${MISTRAL_API_KEY:}
    llama: ${LLAMA_API_KEY:}
    deepseek: ${DEEPSEEK_API_KEY:}
    grok: ${GROK_API_KEY:}
    groq: ${GROQ_API_KEY:}
    supreme-cloud: ${SUPREME_CLOUD_API_KEY:}
    custom-supreme-ai: ${CUSTOM_SUPREME_AI_KEY:}
    hf_api_key: ${HF_API_KEY:}
    # Render endpoints (set these after deploying)
    render_tinyllama_url: ${RENDER_TINYLLAMA_URL:}
    render_phi3_url: ${RENDER_PHI3_URL:}
    render_qwen_url: ${RENDER_QWEN_URL:}

ai:
  providers:
    ollama:
      endpoint: ${AI_PROVIDERS_OLLAMA_ENDPOINT:http://127.0.0.1:11434}
      api-key: ${AI_PROVIDERS_OLLAMA_API_KEY:ollama}
    huggingface:
      api-key: ${HUGGINGFACE_API_KEY:}
      model: ${HUGGINGFACE_MODEL:meta-llama/Llama-3.3-70B-Instruct}

# Rate limiting configuration
rate-limit:
  enabled: true
  distributed: true
  window-seconds: 60
  authenticated-requests-per-minute: 100
  anonymous-requests-per-minute: 10
  admin-requests-per-minute: 1000
  ai-provider-requests-per-minute: 50

logging:
  level:
    com.supremeai: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: true

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 1.0
  environment: ${SPRING_PROFILES_ACTIVE:development}
  exception-resolver-order: -2147483647

otel:
  service:
    name: supremeai-backend
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://127.0.0.1:4317}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:otlp}
