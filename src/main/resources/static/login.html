<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>SupremeAI - Login</title>
    <script type="module" src="/js/auth-helper.js?v=4"></script>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">Supreme<span>AI</span></div>
            <div class="subtitle">Admin Dashboard</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="text" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me for 30 days</label>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <button type="submit" class="login-button" id="loginButton">Sign In</button>
        </form>

        <div class="localhost-badge">
            ☁️ Cloud Mode Active (Cloud Firebase)
        </div>

        <div class="footer-text">
            <p>© 2026 SupremeAI - Automated App Generator</p>
            <p>Advanced Authentication System v1.0</p>
        </div>
    </div>

    <script type="module" src="/js/login.js?v=3"></script>
</body>
</html>
