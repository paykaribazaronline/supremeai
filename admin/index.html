<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupremeAI Admin Redirect</title>
    <meta http-equiv="refresh" content="0; url=/admin.html">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #e2e8f0;
            font-family: Georgia, serif;
        }

        .panel {
            max-width: 560px;
            padding: 32px;
            border: 1px solid #334155;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.92);
            text-align: center;
        }

        a {
            color: #7dd3fc;
        }
    </style>
    <script>
        window.location.replace('/admin.html');
    </script>
</head>
<body>
    <div class="panel">
        <h1>Redirecting to SupremeAI Admin</h1>
        <p>This workspace now uses the canonical admin dashboard served at <a href="/admin.html">/admin.html</a>.</p>
        <p>If the redirect does not fire automatically, open the link above while the Spring application is running.</p>
    </div>
</body>
</html>
