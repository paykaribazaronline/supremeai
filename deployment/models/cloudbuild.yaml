steps:
  # Build the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--build-arg', 'MODEL_NAME=${_MODEL_NAME}', '-t', 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}', '-f', 'deployment/models/Dockerfile', '.']

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}'
      - '--region'
      - 'us-central1'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'OLLAMA_HOST=0.0.0.0:8080'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}'
