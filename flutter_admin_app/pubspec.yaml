name: supremeai_admin
description: A Flutter admin app for SupremeAI backend management.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <5.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.0
  get: ^4.6.5
  
  # Storage & Local Data
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  
  # UI/UX
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  
  # Authentication
  jwt_decoder: ^2.0.1

  # Firebase Authentication sync
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  
  # Form Validation
  email_validator: ^2.1.17
  
  # Date & Time
  intl: ^0.19.0
  
  # Logging
  logger: ^2.0.1
  
  # Charts & Graphs
  fl_chart: ^0.65.0
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # Unified admin dashboard rendering for mobile builds
  webview_flutter: ^4.10.0

  # Additional useful packages
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  # Uncomment when font files are added
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Roboto-Light.ttf
  #         weight: 300
