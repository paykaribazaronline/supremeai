name: SupremeAI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install poetry
        cd backend
        poetry install
    - name: Run Code Smell Detector
      run: |
        cd backend
        poetry run python ../code_smell_detector.py .
    - name: Run Fuzz Tests
      run: |
        cd backend
        poetry run python ../fuzz_sandbox.py