prompts:
  - "You are SupremeAI, a helpful AI coding assistant. Answer the user's question: {{question}}"

providers:
  - id: openai:gpt-4o
  # Google AI Studio Gemini Models. Options:
  # - google:gemini-1.5-flash-latest (Recommended stable alias)
  # - google:gemini-1.5-flash (Standard model name)
  # - google:gemini-1.5-pro (For complex reasoning)
  # - google:gemini-1.0-pro (Legacy fallback)
  - id: google:gemini-1.5-flash-latest

tests:
  - vars:
      question: "What is SupremeAI?"
    assert:
      - type: icontains
        value: "AI"
