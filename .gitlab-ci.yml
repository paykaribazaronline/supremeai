stages:
  - security
  - test
  - deploy
  - validation
  - summary

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

# 1. Secret Scanning via Gitleaks
secret-scan:
  stage: security
  image: zricethezav/gitleaks
  script:
    - gitleaks detect --redact --verbose --source .

# 2. GitLab SAST (Replaces CodeQL)
include:
  - template: Security/SAST.gitlab-ci.yml

# 3. Backend Testing
backend-test:
  stage: test
  image: eclipse-temurin:21-jdk
  services:
    - name: redis:7-alpine
      alias: redis
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - src/**/*
        - build.gradle.kts
        - gradle/**/*
        - gradlew*
        - infra/Dockerfile
        - .gitlab-ci.yml
  script:
    - chmod +x gradlew
    - ./gradlew spotlessCheck --no-daemon
    - ./gradlew clean test --no-daemon
  artifacts:
    when: on_failure
    paths:
      - build/test-results/test/
    expire_in: 1 day

# 4. Frontend Testing
frontend-test:
  stage: test
  image: node:22
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - dashboard/**/*
        - .gitlab-ci.yml
  script:
    - npm install -w dashboard
    - npm run lint -w dashboard
    - npm run test -w dashboard -- --run || echo "No tests or test command failed"
    - npm run build -w dashboard
  artifacts:
    paths:
      - dashboard/dist/
    expire_in: 1 day

# 5. Functions Testing
functions-test:
  stage: test
  image: node:22
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - functions/**/*
        - .gitlab-ci.yml
  script:
    - npm install -w functions
    - npm run build -w functions
  artifacts:
    paths:
      - functions/lib/
      - functions/package.json
      - functions/package-lock.json
    expire_in: 1 day

# 6. Backend Deployment
backend-deploy:
  stage: deploy
  image: google/cloud-sdk:latest
  services:
    - docker:dind
  needs: ["backend-test"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo $GCP_SA_KEY > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - PROJECT_ID=$(gcloud config get-value project || grep project_id /tmp/gcp-key.json | cut -d '"' -f 4)
    - gcloud auth configure-docker --quiet
    - apt-get update && apt-get install -y openjdk-21-jdk
    - chmod +x gradlew
    - ./gradlew bootJar -x test --no-daemon
    - docker build -f infra/Dockerfile -t gcr.io/$PROJECT_ID/supremeai-backend:latest .
    - docker push gcr.io/$PROJECT_ID/supremeai-backend:latest
    - |
      gcloud run deploy supremeai \
        --image=gcr.io/$PROJECT_ID/supremeai-backend:latest \
        --region=us-central1 \
        --platform=managed \
        --allow-unauthenticated \
        --set-env-vars=SPRING_PROFILES_ACTIVE=cloud \
        --cpu=1 \
        --memory=512Mi \
        --concurrency=80 \
        --timeout=300 \
        --max-instances=10 \
        --min-instances=1

# 7. Frontend Deployment
frontend-deploy:
  stage: deploy
  image: node:22
  needs: ["frontend-test"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm install -g firebase-tools
    - mkdir -p public
    - cp -R dashboard/dist/. public/
    - echo $GCP_SA_KEY > /tmp/gcp-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
    - PROJECT_ID=$(node -e "console.log(require('/tmp/gcp-key.json').project_id)")
    - firebase deploy --only hosting --project $PROJECT_ID --non-interactive --force

# 8. Functions Deployment
functions-deploy:
  stage: deploy
  image: node:22
  needs: ["functions-test"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm install -g firebase-tools
    - npm install -w functions
    - echo $GCP_SA_KEY > /tmp/gcp-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
    - PROJECT_ID=$(node -e "console.log(require('/tmp/gcp-key.json').project_id)")
    - firebase deploy --only functions --project $PROJECT_ID --non-interactive --force --debug

# 9. AI Validation
ai-validation-ci:
  stage: validation
  image: eclipse-temurin:21-jdk
  services:
    - name: redis:7-alpine
      alias: redis
  needs: ["backend-test"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - src/**/*
        - build.gradle.kts
        - gradle/**/*
        - gradlew*
        - infra/Dockerfile
        - .gitlab-ci.yml
  variables:
    SPRING_PROFILES_ACTIVE: test
  script:
    - echo $GCP_SA_KEY > /tmp/gcp-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
    - apt-get update && apt-get install -y curl jq
    - PROJECT_ID=$(cat /tmp/gcp-key.json | jq -r .project_id)
    - export FIREBASE_PROJECT_ID=$PROJECT_ID
    - export JWT_SECRET=${JWT_SECRET:-"dummy_secret_key_for_ci_cd_validation_123456"}
    - chmod +x gradlew
    - ./gradlew bootJar -x test --no-daemon
    - JAR_FILE=$(find .gradle/build/libs -name "*.jar" | grep -v "plain.jar" | head -n 1)
    - nohup java -jar "$JAR_FILE" > backend.log 2>&1 &
    - |
      for i in $(seq 1 60); do
        if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health | grep -q "200"; then
          echo "Backend is healthy"
          break
        fi
        echo "Waiting for backend... ($((i*3))s)"
        sleep 3
      done
    - chmod +x scripts/validate_ai.sh
    - export AI_VALIDATION_BASE_URL=http://127.0.0.1:8080
    - export AI_VALIDATION_ENDPOINT=/api/chat/send
    - bash scripts/validate_ai.sh
  artifacts:
    when: always
    paths:
      - backend.log
      - ai_validation_report.json
    expire_in: 1 day

# 10. Global Summary
workflow-summary:
  stage: summary
  image: curlimages/curl:latest
  needs: ["backend-deploy", "frontend-deploy", "functions-deploy", "ai-validation-ci"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
  script:
    - echo "Smart Workflow Summary 🚀"
    - echo $GCP_SA_KEY > /tmp/gcp-key.json
    - PROJECT_ID=$(grep project_id /tmp/gcp-key.json | cut -d '"' -f 4 || echo "")
    - |
      if [ -n "$PROJECT_ID" ]; then
        COMMIT_MSG=$(echo "Workflow Summary: GitLab Deployment - $CI_COMMIT_MESSAGE" | sed 's/"/\\"/g' | tr '\n' ' ')
        curl -s -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"commitMessage\": \"$COMMIT_MSG\",
            \"author\": \"$GITLAB_USER_LOGIN\",
            \"branch\": \"$CI_COMMIT_REF_NAME\",
            \"runId\": \"$CI_PIPELINE_ID\"
          }" \
          "https://us-central1-$PROJECT_ID.cloudfunctions.net/analyzeDeployment" || echo "Dashboard notification failed"
      fi
