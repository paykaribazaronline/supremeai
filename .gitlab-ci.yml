# ==============================================================================
# SupremeAI - GitLab CI/CD Configuration with Dynamic Runner Routing
# ==============================================================================
# Smart CI/CD Optimization (Tip 3):
# - Routes to 'local-pc' runner when available (completely free, unlimited run minutes)
# - Falls back to GitLab Cloud SaaS Runner when local PC is offline
# ==============================================================================

stages:
  - test
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

cache:
  paths:
    - .gradle/wrapper/
    - .gradle/caches/

# 1. Local PC Runner (Tag: local-pc) - Zero Cost Verification
test_on_local_pc:
  stage: test
  tags:
    - local-pc
  script:
    - echo "Executing tests on LOCAL PC runner (nazifarabbu) to save Cloud minutes..."
    - ./gradlew test --no-daemon
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      # Set to allow failure so if local PC is offline/unregistered, it doesn't block the rest of pipeline
      allow_failure: true

# 2. Cloud Fallback Runner - SaaS Execution
test_on_cloud:
  stage: test
  image: gradle:8.5-jdk17-jammy
  script:
    - echo "Executing tests on Cloud SaaS Runner..."
    - ./gradlew test --no-daemon
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      # Run only if local tests did not succeed or as a parallel verification
      when: on_success
