services:
  supremeai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supremeai
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-local}
      - AIRLLM_ENDPOINT=${AIRLLM_ENDPOINT:-https://unsymmetrical-unrepugnant-lilah.ngrok-free.dev/v1/chat/completions}
      - AIRLLM_HEALTHCHECK_URL=${AIRLLM_HEALTHCHECK_URL:-https://unsymmetrical-unrepugnant-lilah.ngrok-free.dev/health}
      - AIRLLM_RATE_LIMIT_PER_MINUTE=${AIRLLM_RATE_LIMIT_PER_MINUTE:-277}
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SECRET_MANAGER_BACKEND=${SECRET_MANAGER_BACKEND:-env}
      - KEY_ROTATION_ENABLED=${KEY_ROTATION_ENABLED:-true}
      - KING_MODE_ENABLED=${KING_MODE_ENABLED:-true}
      - GOOGLE_APPLICATION_CREDENTIALS=/service-account.json
    volumes:
      - ./service-account.json:/service-account.json:ro
    restart: unless-stopped
    depends_on:
      - redis

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    container_name: supremeai-dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - supremeai

  redis:
    image: redis:7-alpine
    container_name: supremeai-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped

  airllm:
    image: ${AIRLLM_IMAGE:-gcr.io/supremeai-a/airllm-sidecar:latest}
    container_name: airllm-sidecar
    profiles:
      - airllm
    ports:
      - "8081:8081"
    environment:
      - MODEL=${AIRLLM_MODEL:-meta-llama/Llama-3.3-70B-Instruct}
      - COMPRESSION=${AIRLLM_COMPRESSION:-4bit}
      - BATCH_SIZE=${AIRLLM_BATCH_SIZE:-12}
      - PREFETCH_LAYERS=${AIRLLM_PREFETCH_LAYERS:-4}
      - CONTINUOUS_BATCHING=true
      - PORT=8081
    restart: unless-stopped

  teldrive:
    build:
      context: ./scripts
      dockerfile: Dockerfile.teldrive
    container_name: supremeai-teldrive
    ports:
      - "8082:8080"
    environment:
      - DB_DATA_SOURCE=${DB_DATA_SOURCE:-postgres://postgres:njel.com.bd123@db.knqoqjnwpgmrsezgqgpg.supabase.co:5432/postgres}
      - JWT_SECRET=${JWT_SECRET:-903924ce71426c6fc666e3d5c3736cebec27ec07fe511f9da5fab0532581ba01}
      - TG_APP_ID=${TG_APP_ID}
      - TG_APP_HASH=${TG_APP_HASH}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
    restart: unless-stopped

  reverse-engineering:
    build:
      context: ./reverse-engineering
      dockerfile: Dockerfile
    container_name: supremeai-reveng
    ports:
      - "8083:8080"
    environment:
      - GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID:-supremeai-a}
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/secrets/firebase-service-account.json
    volumes:
      - ./service-account.json:/etc/secrets/firebase-service-account.json:ro
    restart: unless-stopped

volumes:
  redis_data:
