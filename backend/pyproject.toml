[tool.poetry]
name = "supremeai-backend"
version = "2.0.0"
description = "SupremeAI 2.0 — FastAPI AI Backend"
authors = ["SupremeAI Team <team@supremeai.dev>"]
readme = "README.md"
package-mode = false
packages = [{include = "core"}, {include = "brain"}, {include = "api"}, {include = "memory"}, {include = "tools"}]

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.30.0"}
httpx = "^0.27.0"
loguru = "^0.7.2"
pydantic = "^2.7.0"
pydantic-settings = "^2.2.0"
python-dotenv = "^1.0.1"
pyyaml = "^6.0.1"
tenacity = "^9.0.0"
beautifulsoup4 = "^4.12.0"
lxml = "^5.3.0"
sentry-sdk = {extras = ["fastapi"], version = "^2.0.0"}
discord-py = "^2.3.0"
easyocr = "^1.7.0"
pandas = "^2.2.0"
openpyxl = "^3.1.0"
chromadb = "^0.4.0"
sentence-transformers = "^2.2.0"
sympy = "^1.13.0"
pillow = "^10.0.0"
matplotlib = "^3.8.0"
playwright = "^1.60.0"
typer = "^0.12.0"
rich = "^13.0.0"
celery = "^5.4.0"
redis = "^5.0.0"
openai = "^1.35.0"
supabase = "^2.5.0"
upstash-redis = "^1.1.0"
google-cloud-firestore = "^2.16.0"
google-cloud-pubsub = "^2.27.0"
python-jose = {extras = ["cryptography"], version = "^3.3.0"}
bcrypt = "^4.1.0"
alembic = "^1.13.0"
psycopg2-binary = "^2.9.9"
pinecone-client = "^5.0.0"
qdrant-client = "^1.9.0"
sse-starlette = "^1.8.0"
prometheus-client = "^0.20.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
anyio = "^4.0.0"
pytest-cov = "^5.0.0"
httpx = "^0.27.0"
ruff = "^0.4.0"
mypy = "^1.10.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F821", "F841", "E402"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
