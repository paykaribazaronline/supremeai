spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/supremeai}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  server:
    port: 9090
    security:
      enabled: false # Ensure secure connection setup in production

server:
  port: 8080 # For health checks and metrics via standard HTTP
