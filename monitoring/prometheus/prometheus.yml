global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: supremeai-prod

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: supremeai-app
    metrics_path: /actuator/prometheus
    # SUPREMEAI_APP_HOST is set in .env:
    #   Docker Desktop (Windows/Mac) → host.docker.internal:8080
    #   Linux host network           → 172.17.0.1:8080  (or actual VM IP)
    #   Kubernetes sidecar           → localhost:8080
    static_configs:
      - targets:
          - "${SUPREMEAI_APP_HOST:-host.docker.internal:8080}"
    relabel_configs:
      - source_labels: [__address__]
        target_label: application
        replacement: supremeai

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
