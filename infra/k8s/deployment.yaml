apiVersion: apps/v1
kind: Deployment
metadata:
  name: supremeai
  labels:
    app: supremeai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supremeai
  template:
    metadata:
      labels:
        app: supremeai
    spec:
      containers:
      - name: supremeai
        image: gcr.io/supremeai-a/supremeai:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: GCP_CREDENTIALS_LOCATION
          value: /var/secrets/gcp-service-account.json
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        volumeMounts:
        - name: gcp-credentials
          mountPath: /var/secrets
          readOnly: true
      volumes:
      - name: gcp-credentials
        secret:
          secretName: gcp-service-account
---
apiVersion: v1
kind: Service
metadata:
  name: supremeai-service
spec:
  selector:
    app: supremeai
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer