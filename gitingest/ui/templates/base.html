"""
Jinja2 templates for Gitingest web UI
"""
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gitingest - LLM-Friendly Repo Digests{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-orange: #FCA847;
            --off-white: #FFFDF8;
            --light-blue: #E8F0FE;
            --cream: #fff4da;
            --dark-text: #333;
            --medium-text: #666;
        }
        
        body {
            background-color: var(--off-white);
            color: var(--dark-text);
        }
        
        .btn-primary {
            background-color: var(--primary-orange);
            border: 4px solid #333;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
        }
        
        .shadow-offset {
            position: relative;
        }
        
        .shadow-offset::before {
            content: '';
            position: absolute;
            inset: 0;
            transform: translate(8px, 8px);
            background: #333;
            border-radius: inherit;
            z-index: 0;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        .sparkle {
            animation: sparkle 2s ease-in-out infinite;
        }
        
        .sparkle-delay-1 { animation-delay: 0.3s; }
        .sparkle-delay-2 { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="sticky top-0 bg-white border-b-4 border-zinc-900 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-[#FCA847]" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.82-.255.82-.57-.015-2.205.285-3.495.285-3.495-.405-.675-.81-1.065-1.335-1.275-1.335-.885-.315-2.4-.465-2.925-.045-.63-.39-1.59-.615-2.88-.63-1.425-.015-2.835.285-3.735.915-.285.795-.33 1.68-.285 2.535.075.975.285 1.89.675 2.7.735 1.545 1.89 2.565 3.285 2.835.075.015.15.015.225.015.555 0 1.065-.225 1.41-.645.12-.285.18-.63.18-.975 0-.555-.225-1.065-.645-1.41-.855-.63-1.71-1.26-1.71-2.52s.855-1.89 1.71-2.52c.42-.315.87-.555 1.35-.69.48-.135.99-.195 1.5-.18.51.015 1.005.135 1.47.36.465.225.885.555 1.26 1.005.315.39.555.84.69 1.35.135.51.195 1.005.18 1.5-.015.51-.135 1.005-.36 1.47-.225.465-.555.885-1.005 1.26-.39.315-.84.555-1.35.69-.51.135-1.005.195-1.5.18-.51-.015-1.005-.135-1.47-.36-.465-.225-.885-.555-1.26-1.005-.315-.39-.555-.84-.69-1.35-.135-.51-.195-1.005-.18-1.5.015-.51.135-1.005.36-1.47.225-.465.555-.885 1.005-1.26.39-.315.84-.555 1.35-.69.51-.135 1.005-.195 1.5-.18z"/>
                </svg>
                <span class="text-xl font-bold">Gitingest</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="https://github.com" target="_blank" class="hover:text-[#FCA847] transition-colors">GitHub</a>
                <a href="https://discord.com" target="_blank" class="hover:text-[#FCA847] transition-colors">Discord</a>
                <span class="text-sm text-[#666]">v1.0.0</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-4 py-8 border-t-4 border-zinc-900 mt-12">
        <div class="flex justify-center gap-6">
            <a href="/contributing" class="text-sm text-[#666] hover:text-[#FCA847] transition-colors">Contributing</a>
            <a href="/security" class="text-sm text-[#666] hover:text-[#FCA847] transition-colors">Security Policy</a>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
